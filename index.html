<script type="text/plain" id="app-source">
// [NOVO 19/07] URL do Web App configuravel, pra permitir que uma copia deste
// mesmo arquivo aponte pra outro backend (outra pessoa, outra instancia)
// sem precisar editar codigo -- so colar a URL certa no proprio app (botao
// "⚙ Servidor" no cabecalho). Sem nenhuma configuracao salva, usa o padrao
// abaixo (o Web App do Marcus) -- comportamento identico ao de antes.
const APPS_URL_PADRAO="https://script.google.com/macros/s/AKfycbzWLTDLglaG1wKYzQ-6hk0SgVcp18KDAUTUw-dIcFmcXQbGXBmaz4NqU1YawlgfUYYO/exec";
function getApiUrl(){
  try{ return localStorage.getItem("tesouraria_apps_url")||APPS_URL_PADRAO; }
  catch(e){ return APPS_URL_PADRAO; }
}


const C={bg:"#F3F1EA",surface:"#FFF",border:"#E5E7EB",borderLight:"#F3F4F6",
  text:"#111827",textSub:"#6B7280",textMuted:"#9CA3AF",
  accent:"#1E3A8A",accentLight:"#DBEAFE",
  red:"#DC2626",redLight:"#FEF2F2",orange:"#EA580C",orangeLight:"#FFF7ED",
  yellow:"#CA8A04",yellowLight:"#FEFCE8",purple:"#7C3AED",purpleLight:"#F5F3FF",
  blue:"#2563EB",blueLight:"#EFF6FF",green:"#16A34A",greenLight:"#F0FDF4",
  teal:"#0D9488",tealLight:"#F0FDFA",dark:"#111827"};
// BASAIS agora e calculado dinamicamente (ver Dashboard) a partir das
// recorrencias DESPESA FIXA ativas + orcamento do DCP -- nao mais um numero
// fixo digitado uma vez, que ficava defasado assim que um recorrente mudava.
const fmt=v=>{
  const n=v||0;
  const s=new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL"}).format(Math.abs(n));
  return n<0 ? s.replace(/(\s)/,"$1-") : s;
};
const fmtK=v=>Math.abs(v)>=1000?(v/1000).toFixed(0)+"k":Math.abs(v).toFixed(0);
const hoje=()=>new Date().toISOString().slice(0,10);
// Janela de datas (inicio/fim, formato ISO) de um ciclo deslocado N meses a
// partir do ciclo atual -- deslocamento 0 = ciclo atual, 1 = proximo, 2 =
// o seguinte. Usa CONFIG.CICLO_INICIO (sempre dia 16) como ancora.
function janelaCiclo(cicloInicioStr,deslocamento){
  const [ano,mes]=String(cicloInicioStr||"").split("-").map(Number);
  const inicio=new Date(ano,(mes-1)+deslocamento,16);
  const fim=new Date(ano,mes+deslocamento,15);
  const toISO=d=>d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  return {inicio:toISO(inicio),fim:toISO(fim)};
}
const fmtD=s=>{const m=String(s||"").match(/^(\d{4})-(\d{2})-(\d{2})/);return m?m[3]+"/"+m[2]+"/"+m[1].slice(2):""};
// [NOVO 19/07] "Nome fantasia" do cartao -- so exibicao, nunca muda o TIPO
// interno ("CARTAO PF"/"CARTAO PJ" continuam sendo os mesmos em toda
// comparacao/calculo). Cai pro nome padrao "Cartão PF/PJ" se nao
// configurado em CONFIG.NOME_CARTAO_PF / NOME_CARTAO_PJ.
function nomeCartao(sigla,data){
  const custom=data&&data.config&&data.config["NOME_CARTAO_"+sigla];
  return custom&&custom.trim()?custom.trim():"Cartão "+sigla;
}
// [NOVO 20/07] Fechamento e vencimento de fatura configuraveis, desacoplados
// um do outro -- mesmo raciocinio do backend (_configFatura/_calcVencimentoFatura
// em Tesouraria_v3.txt). Padrao sem config: fechamento=31 (ultimo dia real do
// mes, clampado), vencimento=7 -- reproduz o comportamento fixo de antes.
function configFatura(data){
  const cfg=(data&&data.config)||{};
  const f=parseInt(cfg.CARTAO_DIA_FECHAMENTO);
  const v=parseInt(cfg.CARTAO_DIA_VENCIMENTO);
  return { fechamento:(f>=1&&f<=31)?f:31, vencimento:(v>=1&&v<=31)?v:7 };
}
// [NOVO 20/07] Confere se uma fatura (cartao+vencimento) esta travada
// (CONFIG.FATURAS_TRAVADAS_JSON) -- so leitura, a decisao de travar/destravar
// e sempre do backend (travarFatura/destravarFatura), nunca inferida aqui.
function faturaTravada(cartao,vencimento,data){
  try{
    const lista=JSON.parse((data&&data.config&&data.config.FATURAS_TRAVADAS_JSON)||"[]");
    return lista.some(f=>f.cartao===cartao&&f.vencimento===vencimento);
  }catch(e){ return false; }
}
// A que mes civil de FECHAMENTO uma data (string YYYY-MM-DD) pertence.
// Retorna {ano, mes} com mes 1-indexed (jeito mais facil de bater com o
// zero-padding de string de data sem confundir com Date.getMonth() 0-indexed).
function mesFechamentoDaData(dataISO,fechamento){
  const [y,m,d]=dataISO.split("-").map(Number);
  let ano=y,mes=m;
  if(d>fechamento){mes++;if(mes>12){mes=1;ano++;}}
  return {ano,mes};
}
// Data de vencimento (string YYYY-MM-DD) pra um mes civil de FECHAMENTO dado.
function calcVencimentoFaturaISO(anoFechamento,mesFechamento,fechamento,vencimento){
  let anoVenc=anoFechamento,mesVenc=mesFechamento;
  if(vencimento<fechamento){mesVenc++;if(mesVenc>12){mesVenc=1;anoVenc++;}}
  const ultimoDia=new Date(anoVenc,mesVenc,0).getDate();
  const diaVenc=Math.min(vencimento,ultimoDia);
  return anoVenc+"-"+String(mesVenc).padStart(2,"0")+"-"+String(diaVenc).padStart(2,"0");
}
// Mesma ideia, mas pra quando o texto exibido e o TIPO cru de um item
// (ex: tag "CARTAO PJ" numa linha do Fluxo/Historico) -- troca pelo nome
// fantasia se for um dos dois cartoes, senao mostra o tipo como sempre.
function tipoDisplay(tipo,data){
  const t=String(tipo||"").toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  if(t==="CARTAO PF") return nomeCartao("PF",data);
  if(t==="CARTAO PJ") return nomeCartao("PJ",data);
  return tipo;
}
const DOW_PT=["DOM","SEG","TER","QUA","QUI","SEX","SAB"];
const diaSemana=s=>{const m=String(s||"").match(/^(\d{4})-(\d{2})-(\d{2})/);if(!m)return"";const d=new Date(Number(m[1]),Number(m[2])-1,Number(m[3]),12,0,0);return DOW_PT[d.getDay()];};
// Nome de exibicao: linha de provisao "DCP N" aparece como "Saldo Despesas
// Cotidianas N" (so estetica de tela -- na planilha continua "DCP N").
const CAT_LABEL={DCP:"Despesas Cotidianas Semanais",DEPOSITO_AVULSO:"Outras Entradas",
  DIVIDA_PARCELADA:"Parcela de Dívida",DIVIDA_NAO_PARCELADA:"Amortização Dívida",PASSIVO:"Dívida"};
// [15/07] Categorias de divida sao conceitualmente PASSIVO por tras -- a
// categoria so distingue se tem cronograma de parcelas (Emprestimo, aba
// Emprestimos) ou nao (ex: Pai, so saldo corrente). Usado sempre que TIPO
// precisa ser derivado de uma categoria escolhida (lancamento novo ou edicao).
const TIPO_POR_CATEGORIA={DIVIDA_PARCELADA:"PASSIVO",DIVIDA_NAO_PARCELADA:"PASSIVO"};
const tipoDaCategoria=cat=>TIPO_POR_CATEGORIA[cat]||cat;
const nomeExibicao=(item,data)=>{
  if(item.categoria==="DCP_PROVISAO"&&/^DCP (\d+)$/.test(item.descricao||""))
    return String(item.descricao).replace(/^DCP (\d+)$/,"O Envelope semanal $1 ainda tem:");
  // [NOVO 19/07] Apelido de exibicao -- ordem de prioridade:
  // 1. apelido preso NESTE lancamento (obs.apelido, editado no proprio item)
  // 2. se o texto cru bater com o alias de EXATAMENTE UMA recorrencia
  //    ativa, mostra o nome dela (ja existe, so passou a valer pra exibicao)
  // 3. se bater com EXATAMENTE UMA regra global (CONFIG.APELIDOS_JSON)
  // Se bater com MAIS DE UMA fonte ao mesmo tempo (ambiguo -- ex: mesmo
  // texto de banco usado por duas coisas diferentes), NUNCA adivinha --
  // mostra o texto cru e deixa a pessoa resolver manualmente no item.
  if(!data) return item.descricao;
  let obsItem={};
  try{obsItem=JSON.parse(item.obs||"{}");}catch(e){}
  if(obsItem.apelido) return obsItem.apelido;
  const candidatos=apelidosCandidatos(item.descricao,data);
  return candidatos.length===1?candidatos[0].apelido:item.descricao;
};
// Lista de candidatos a apelido pra uma descricao crua (recorrencias com
// alias batendo + regras globais batendo) -- usado tanto por nomeExibicao
// (so aplica se sobrar exatamente 1) quanto pelo painel de edicao do item
// (mostra todos como sugestao clicavel quando for ambiguo).
// [NOVO 20/07] Acha o envelope sugerido (CONFIG.ENVELOPE_REGRAS_JSON) pra
// uma descricao digitada na hora de lancar algo novo -- so sugestao, nunca
// aplica sozinho (a pessoa ainda escolhe/confirma). Retorna o primeiro
// match ou "" se nenhum bater.
function envelopeRegraSugerido(descricaoCrua,data){
  const desc=String(descricaoCrua||"").toUpperCase().trim();
  if(!desc) return "";
  try{
    const regras=JSON.parse((data.config&&data.config.ENVELOPE_REGRAS_JSON)||"[]");
    const achou=regras.find(r=>r.padrao&&desc.indexOf(r.padrao)>=0);
    return achou?achou.envelopeId:"";
  }catch(e){ return ""; }
}
function apelidosCandidatos(descricaoCrua,data){
  const desc=String(descricaoCrua||"").toUpperCase();
  const out=[];
  (data.recorr||[]).forEach(r=>{
    if(String(r[6]).toUpperCase()!=="S") return;
    const aliasStr=r[11];
    if(!aliasStr) return;
    String(aliasStr).split(/[;|]/).map(s=>s.trim()).filter(Boolean).forEach(termo=>{
      if(desc.indexOf(termo.toUpperCase())>=0) out.push({apelido:r[0],origem:"recorrencia"});
    });
  });
  try{
    const ap=JSON.parse((data.config&&data.config.APELIDOS_JSON)||"[]");
    ap.forEach(a=>{ if(a.padrao&&desc.indexOf(a.padrao)>=0) out.push({apelido:a.apelido,origem:"regra"}); });
  }catch(e){}
  // dedup por apelido (duas fontes podem coincidir no mesmo nome -- conta como 1)
  const vistos=new Set();
  return out.filter(c=>{ if(vistos.has(c.apelido)) return false; vistos.add(c.apelido); return true; });
}
// Periodo que uma provisao DCP cobre: a data do envelope e sempre a
// segunda-feira que FECHA a semana; a semana comeca 6 dias antes (terca).
// So matematica de data em cima do que ja temos -- nenhum dado novo.
// Regra de NEGOCIO centralizada aqui -- tanto o formato completo quanto o
// compacto consomem o mesmo intervalo, nunca recalculam por conta propria.
function _intervaloDCP(dataEnvelope){
  const [y,m,d]=dataEnvelope.split("-").map(Number);
  const fim=new Date(y,m-1,d,12,0,0);
  const ini=new Date(fim); ini.setDate(ini.getDate()-6);
  return {ini,fim};
}
function periodoDCP(dataEnvelope){
  if(!dataEnvelope) return "";
  const {ini,fim}=_intervaloDCP(dataEnvelope);
  const f=dt=>String(dt.getDate()).padStart(2,"0")+"/"+String(dt.getMonth()+1).padStart(2,"0");
  return f(ini)+" a "+f(fim);
}
// Versao compacta pro rotulo "Disponível"/"Adiantado": omite o mes do dia
// inicial quando as duas datas caem no mesmo mes (ex: "14 a 20/07"); se a
// semana cruza virada de mes, mostra o mes das duas (ex: "29/06 a 05/07").
function periodoDCPCompacto(dataEnvelope){
  if(!dataEnvelope) return "";
  const {ini,fim}=_intervaloDCP(dataEnvelope);
  const dd=n=>String(n).padStart(2,"0");
  const mesmoMes=ini.getMonth()===fim.getMonth();
  const inicioStr=mesmoMes?dd(ini.getDate()):dd(ini.getDate())+"/"+dd(ini.getMonth()+1);
  return inicioStr+" a "+dd(fim.getDate())+"/"+dd(fim.getMonth()+1);
}
// Etiqueta pequena mostrando em qual "envelope" DCP (qual segunda-feira) um
// lancamento entra -- ja executado mostra em cor solida (fato); ainda
// programado mostra apagado/italico (previsao -- so vale se executar na
// data prevista, pode mudar se a data mudar antes disso).
// ── ENVELOPES CUSTOMIZADOS ───────────────────────────────────────────────────
// Cadastro simples (nome/teto/periodo) guardado em CONFIG.ENVELOPES_JSON --
// SEM motor nenhum (sem fechamento semanal, sem redistribuicao): so soma
// gastos classificados contra um teto, dentro de uma janela de tempo. Nunca
// mexe no saldo real do Fluxo -- e puramente informativo, por decisao
// explicita do Marcus (11/07).
// Calcula o periodo [inicio,fim] de um envelope RENOVAVEL que contem
// `refData` (ISO). SEM MOTOR DE COMPENSACAO -- cada periodo e um corte de
// calendario independente, nunca depende do periodo anterior (decisao
// explicita do Marcus, 12/07: "muito mais informativo e organizacional do
// que maquinario"). O periodo que contem dataIni pode ser mais curto que os
// seguintes -- comeca exatamente em dataIni, mesmo que nao caia no dia da
// ancora ("azar de quem criou", confirmado).
function periodoEnvelopeRenovavel(env,refData){
  const dataIni=env.dataIni;
  if(!dataIni||refData<dataIni) return null;
  const iso=dt=>dt.toISOString().slice(0,10);
  const mkDate=s=>new Date(s+"T12:00:00");
  const addDias=(dt,n)=>{const d=new Date(dt);d.setDate(d.getDate()+n);return d;};

  if(env.periodicidade==="semanal"){
    const ancoraDia=Number(env.ancoraDia);
    let alinhado=mkDate(dataIni);
    while(alinhado.getDay()!==ancoraDia) alinhado=addDias(alinhado,1);
    if(iso(alinhado)===dataIni){
      let ini=mkDate(dataIni);
      while(iso(addDias(ini,7))<=refData) ini=addDias(ini,7);
      return {inicio:iso(ini),fim:iso(addDias(ini,6))};
    }
    const fimStub=iso(addDias(alinhado,-1));
    if(refData<=fimStub) return {inicio:dataIni,fim:fimStub};
    let ini=alinhado;
    while(iso(addDias(ini,7))<=refData) ini=addDias(ini,7);
    return {inicio:iso(ini),fim:iso(addDias(ini,6))};
  }

  if(env.periodicidade==="quinzenal"){
    // Corte fixo em todo dia 1 e todo dia 15 do calendario -- sem ancora
    // configuravel (os dois cortes ja cobrem o mes inteiro).
    const [y,m,dRef]=refData.split("-").map(Number);
    const mm=String(m).padStart(2,"0");
    let p = dRef<15
      ? {inicio:`${y}-${mm}-01`,fim:`${y}-${mm}-14`}
      : {inicio:`${y}-${mm}-15`,fim:iso(new Date(y,m,0,12))};
    if(p.inicio<dataIni) p.inicio=dataIni;
    return p;
  }

  const N=env.periodicidade==="mensal"?1:env.periodicidade==="trimestral"?3:env.periodicidade==="semestral"?6:null;
  if(!N) return null;
  const ancoraDia=Number(env.ancoraDia)||1;
  const ref=mkDate(refData);
  let cursor=new Date(ref.getFullYear(),ref.getMonth(),ancoraDia,12,0,0);
  if(cursor>ref) cursor=new Date(cursor.getFullYear(),cursor.getMonth()-N,ancoraDia,12,0,0);
  while(true){
    const prox=new Date(cursor.getFullYear(),cursor.getMonth()+N,ancoraDia,12,0,0);
    if(iso(prox)>refData) break;
    cursor=prox;
  }
  const fimCursor=new Date(cursor.getFullYear(),cursor.getMonth()+N,ancoraDia,12,0,0);
  fimCursor.setDate(fimCursor.getDate()-1);
  const inicio=iso(cursor)<dataIni?dataIni:iso(cursor);
  return {inicio,fim:iso(fimCursor)};
}
// Lista todos os periodos de um envelope renovavel entre dataIni e ateData
// (inclusive) -- usado pro historico expandido (mini-barras por periodo).
// Reaproveita periodoEnvelopeRenovavel pra nunca duplicar a logica de corte.
function listarPeriodosEnvelope(env,ateData){
  const periodos=[]; let cursor=env.dataIni; let guard=0;
  while(cursor&&cursor<=ateData&&guard<200){
    const p=periodoEnvelopeRenovavel(env,cursor);
    if(!p) break;
    periodos.push(p);
    const prox=new Date(p.fim+"T12:00:00"); prox.setDate(prox.getDate()+1);
    cursor=prox.toISOString().slice(0,10);
    guard++;
  }
  return periodos;
}
// CARTAO_PF/PJ vem de readAbaComLinha, que SEMPRE empurra o numero real da
// linha como o ULTIMO elemento do array -- nao importa quantos campos
// extras (rotulo/data do envelope semanal do DCP) o getData() acrescente
// depois, o backend sempre reescreve o numero da linha por ultimo de novo
// (ver getData() no backend, corrigido 12/07 depois de um bug real onde
// esse campo extra pisava em cima do numero da linha). A coluna OBS (usada
// pra classificacao em Envelope customizado) tem posicao FIXA (indice 8,
// logo apos as 8 colunas padrao do cartao) -- ela nao se move, so o que vem
// depois dela varia.
function _linhaCartao(r){ return r&&r.length?r[r.length-1]:null; }
function _obsCartaoRaw(r){ return r&&r.length>8?r[8]:null; }
// [NOVO 17/07] Le os termos alternativos (alias) gravados no OBS de um item
// de cartao -- usado so pra pre-preencher o campo de edicao, nunca muda a
// descricao exibida em nenhuma tela.
function _obsAliasCartao(obsRaw){
  try{ const o=JSON.parse(obsRaw||"{}"); return o.alias||""; }catch(e){ return ""; }
}
// [NOVO 19/07] Mesma ideia, mas pro apelido de exibicao (diferente do
// alias -- alias serve pra RECONHECER na conciliacao, apelido serve pra
// MOSTRAR em vez do texto cru, so isso).
function _obsApelidoCartao(obsRaw){
  try{ const o=JSON.parse(obsRaw||"{}"); return o.apelido||""; }catch(e){ return ""; }
}
function parseEnvelopesCustom(data){
  try{ return data?.config?.ENVELOPES_JSON ? JSON.parse(data.config.ENVELOPES_JSON) : []; }
  catch(e){ return []; }
}
// Le o id do envelope classificado num campo OBS (FLUXO ou CARTAO_PF/PJ) --
// obs sempre um JSON tipo {"envelope":"env_xyz"} nesse caso; nunca confundir
// com o marcador plano FONTE_RECEITA (ver classificarEnvelope no backend).
function _obsEnvelopeId(obsRaw){
  if(!obsRaw) return null;
  try{ const o=JSON.parse(obsRaw); return o&&o.envelope?String(o.envelope):null; }
  catch(e){ return null; }
}
// Soma o consumo de cada envelope customizado a partir de FLUXO + CARTAO_PF/PJ
// -- roda so no app, os dados ja estao carregados em `data`.
// - Projeto unico (periodicidade=""): gasto/saldo = soma de TODOS os itens
//   classificados, igual sempre foi.
// - Renovavel: gasto/saldo = soma SO dos itens dentro do periodo ATUAL (sem
//   compensacao entre periodos); `historico` traz os periodos anteriores
//   com seu proprio gasto, pras mini-barras.
// `itens` sempre traz TODO o historico (all-time), ordenado do mais recente
// pro mais antigo -- usado pra decidir junto de qual lancamento mostrar o
// saldo corrente (so o mais recente DENTRO do periodo relevante).
function calcularEnvelopesCustom(data){
  const cadastro=parseEnvelopesCustom(data);
  const hj=hoje();
  // [NOVO 20/07] Etapa 2 de Cofres -- se o envelope tem cofreId vinculado, o
  // teto deixa de ser o numero fixo gravado e passa a ser SEMPRE o saldo ao
  // vivo do Cofre (calculado, nunca gravado -- mesmo espirito de
  // "encerrado" nos envelopes renovaveis). Resto da funcao nao muda nada:
  // gasto/saldo continuam batendo em cima de e.teto normalmente.
  const cofresPorId={};
  (data.cofres||[]).forEach(c=>{cofresPorId[c.id]=c;});
  const porEnvelope={};
  cadastro.forEach(e=>{
    const teto=(e.cofreId&&cofresPorId[e.cofreId])?cofresPorId[e.cofreId].saldo:e.teto;
    porEnvelope[e.id]={...e,teto,itens:[]};
  });

  (data.fluxo||[]).forEach(r=>{
    const envId=_obsEnvelopeId(r.obs);
    if(envId&&porEnvelope[envId]){
      porEnvelope[envId].itens.push({row:r.row,descricao:r.descricao,valor:r.valor,data:r.data,origem:"fluxo",status:r.status});
    }
  });
  [["cartaoPF","PF"],["cartaoPJ","PJ"]].forEach(([chave,cartao])=>{
    (data[chave]||[]).forEach(r=>{
      const envId=_obsEnvelopeId(_obsCartaoRaw(r));
      if(envId&&porEnvelope[envId]){
        porEnvelope[envId].itens.push({row:_linhaCartao(r),descricao:r[1],valor:-Math.abs(Number(r[2])||0),data:r[0],origem:chave,status:r[7],cartao});
      }
    });
  });

  return Object.values(porEnvelope).map(e=>{
    e.itens.sort((a,b)=>a.data<b.data?1:-1); // mais recente primeiro

    if(!e.periodicidade){
      const gasto=e.itens.reduce((s,it)=>s+Math.abs(it.valor),0);
      return {...e,gasto,saldo:e.teto-gasto,encerrado:hj>e.dataFim,periodoAtual:null,historico:[]};
    }

    const periodoAtual=periodoEnvelopeRenovavel(e,hj);
    const itensAtual=periodoAtual?e.itens.filter(it=>it.data>=periodoAtual.inicio&&it.data<=periodoAtual.fim):[];
    const gasto=itensAtual.reduce((s,it)=>s+Math.abs(it.valor),0);
    const periodosPassados=listarPeriodosEnvelope(e,hj).filter(p=>!periodoAtual||p.inicio!==periodoAtual.inicio).reverse();
    const historico=periodosPassados.map(p=>{
      const its=e.itens.filter(it=>it.data>=p.inicio&&it.data<=p.fim);
      const g=its.reduce((s,it)=>s+Math.abs(it.valor),0);
      return {...p,gasto:g,saldo:e.teto-g,itens:its.length};
    });
    return {...e,gasto,saldo:e.teto-gasto,encerrado:e.ativo==="N",periodoAtual,itensAtual,historico};
  }).sort((a,b)=>{
    const da=a.periodoAtual?a.periodoAtual.fim:a.dataFim, db=b.periodoAtual?b.periodoAtual.fim:b.dataFim;
    return da<db?1:-1;
  });
}
// Formato compacto "DD a DD/MM" (ou "DD/MM a DD/MM" se cruzar mes) pro
// periodo de um envelope customizado -- mesma logica de omissao de mes do
// periodoDCPCompacto, mas sem a regra fixa de 6 dias (aqui o periodo e
// livre, definido pelo usuario ou pelo corte de calendario escolhido).
function periodoEnvelopeCompacto(dataIni,dataFim){
  if(!dataIni||!dataFim) return "";
  const [yi,mi,di]=dataIni.split("-").map(Number);
  const [yf,mf,df]=dataFim.split("-").map(Number);
  const dd=n=>String(n).padStart(2,"0");
  const mesmoMes=(mi===mf&&yi===yf);
  const inicioStr=mesmoMes?dd(di):dd(di)+"/"+dd(mi);
  return inicioStr+" a "+dd(df)+"/"+dd(mf);
}

const bgZ=v=>v<1000?C.redLight:v<5000?C.orangeLight:C.blueLight;

// Converte texto digitado (aceita virgula OU ponto decimal) para numero.
// "2081,50" -> 2081.5. Sem isso, Number("2081,50") retorna NaN, que vira
// null no JSON, e a gravacao do valor eh pulada silenciosamente no servidor.
function numBR(v){
  // Aceita "2081,50", "2.081,50" ou "2081.50" -- remove ponto de milhar
  // antes de trocar a virgula decimal por ponto.
  const limpo = String(v).replace(/\./g, "").replace(",", ".");
  const n = Number(limpo);
  return isFinite(n) ? n : 0;
}

// Mascara de valor monetario: usuario so digita numeros, formata sozinho
// com ponto de milhar e virgula decimal automaticos (ultimos 2 digitos
// sempre viram centavos). Usado em todo campo de valor do app.
function formatarMoedaInput(raw){
  let digitos = String(raw).replace(/\D/g, "");
  if(!digitos) return "";
  digitos = digitos.replace(/^0+(?=\d)/, "");
  while(digitos.length < 3) digitos = "0" + digitos;
  const centavos = digitos.slice(-2);
  let inteiro = digitos.slice(0, -2).replace(/^0+(?=\d)/, "");
  if(!inteiro) inteiro = "0";
  inteiro = inteiro.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  return inteiro + "," + centavos;
}
// Converte um numero (ex: item.valor) direto pra mascara, pra usar como
// valor inicial de um campo que abre ja preenchido.
function formatarValorInicial(n){
  return formatarMoedaInput(String(Math.round(Math.abs(Number(n) || 0) * 100)));
}

// Extrai a data de vencimento (AAAA-MM-DD) do nome do arquivo Nubank.
// Usado tanto no Reconstruir do zero quanto na Conciliação de fatura --
// nunca duplicar essa extração em mais de um lugar dentro do arquivo.
function extrairVencimentoNome(nome){
  const m=String(nome||"").match(/(\d{4})-(\d{2})-(\d{2})/);
  return m?m[0]:null;
}

// Lê um .ofx (extrato de fatura Nubank) e devolve o ACCTID (identificador
// estável da conta/cartão, confirmado com dado real: igual entre faturas do
// MESMO cartão, diferente entre PF e PJ) + a lista de transações. TRNAMT no
// OFX vem NEGATIVO pra compra/débito e POSITIVO pra pagamento recebido — o
// OPOSTO da convenção do CSV do Nubank (onde compra é positivo). Por isso o
// sinal é invertido aqui, pra que o texto reconstruído em ofxParaTextoCSV()
// saia idêntico ao que o backend já espera (_parsearCSVSimples nunca precisa
// saber que a origem foi OFX).
function parseOFX(texto){
  const acctidM = String(texto||"").match(/<ACCTID>([^\r\n<]*)/);
  const acctid = acctidM ? acctidM[1].trim() : null;
  const txns = [];
  const re = /<STMTTRN>([\s\S]*?)<\/STMTTRN>/g;
  let m;
  while((m=re.exec(texto))){
    const bloco = m[1];
    const dtM = bloco.match(/<DTPOSTED>(\d{8})/);
    const amtM = bloco.match(/<TRNAMT>([-\d.]+)/);
    const memoM = bloco.match(/<MEMO>([^\r\n<]*)/);
    if(!dtM||!amtM||!memoM) continue;
    const dt = dtM[1];
    const dataISO = dt.slice(0,4)+"-"+dt.slice(4,6)+"-"+dt.slice(6,8);
    const amtOfx = parseFloat(amtM[1]);
    txns.push({data:dataISO, titulo:memoM[1].trim(), valor:-amtOfx});
  }
  return {acctid, txns};
}

// Converte um .ofx pro mesmo texto "date,title,amount" que o backend já lê
// (_parsearCSVSimples) -- assim o parser real nunca precisa mudar, só ganha
// um identificador de conta extra (acctid) que viaja separado.
function ofxParaTextoCSV(texto){
  const {acctid, txns} = parseOFX(texto);
  const linhas = ["date,title,amount"];
  txns.forEach(t=>{
    const valorFmt = t.valor.toFixed(2).replace(".", ",");
    const tituloEsc = '"'+t.titulo.replace(/"/g,'""')+'"';
    linhas.push(t.data+","+tituloEsc+",\""+valorFmt+"\"");
  });
  return {acctid, csv: linhas.join("\n")};
}

// Lê um arquivo de fatura (.csv OU .ofx) e devolve sempre {csv, acctid, nome}
// -- acctid fica null quando a origem é CSV (formato não carrega esse campo).
// Detecta OFX pela extensão OU pelo conteúdo, pro caso do nome vir sem .ofx.
function lerArquivoFatura(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=e=>{
      const texto=e.target.result;
      const ehOFX=/\.ofx$/i.test(file.name)||/<OFX>/i.test(String(texto).slice(0,200));
      if(ehOFX){
        const {acctid,csv}=ofxParaTextoCSV(texto);
        resolve({csv, acctid, nome:file.name});
      }else{
        resolve({csv:texto, acctid:null, nome:file.name});
      }
    };
    r.onerror=()=>reject(new Error("Falha lendo "+file.name));
    r.readAsText(file,"UTF-8");
  });
}

// ── EXTRATO BANCÁRIO (conta corrente) ────────────────────────────────────────
// Formatos DIFERENTES dos de fatura de cartão -- nunca reaproveitar os
// parsers acima. CSV de extrato Nubank: "Data,Valor,Identificador,Descrição",
// data BR, valor com PONTO decimal (não vírgula), e uma coluna Identificador
// (UUID) que bate exatamente com o FITID do OFX -- casamento mais preciso
// que o de fatura (lá só tínhamos descrição+valor).
function parseCSVExtrato(texto){
  const linhas=String(texto||"").split("\n").map(l=>l.trim()).filter(Boolean);
  if(linhas.length<2) return [];
  const startIdx=/data.*valor.*identificador/i.test(linhas[0])?1:0;
  function parseLine(line){
    const fields=[]; let cur="",inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){ if(inQ&&line[i+1]==='"'){cur+='"';i++;} else inQ=!inQ; }
      else if(c===","&&!inQ){ fields.push(cur.trim()); cur=""; }
      else cur+=c;
    }
    fields.push(cur.trim());
    return fields;
  }
  const txns=[];
  for(let i=startIdx;i<linhas.length;i++){
    const cols=parseLine(linhas[i]);
    if(cols.length<4) continue;
    const [dd,mm,yyyy]=cols[0].trim().split("/");
    if(!dd||!mm||!yyyy) continue;
    const dataISO=`${yyyy}-${mm.padStart(2,"0")}-${dd.padStart(2,"0")}`;
    const valor=parseFloat(cols[1].trim().replace(",","."));
    if(isNaN(valor)) continue;
    txns.push({data:dataISO, valor, identificador:cols[2].trim(), descricao:cols.slice(3).join(",").trim()});
  }
  return txns;
}
// OFX de EXTRATO (BANKMSGSRSV1) -- diferente do OFX de fatura: aqui o
// TRNAMT já vem no mesmo sentido do FLUXO (negativo=saída, positivo=entrada),
// então NUNCA inverte o sinal (parseOFX, usado na fatura, inverte de
// propósito pra bater com a convenção de cartão -- não vale aqui).
function parseOFXExtrato(texto){
  const acctidM=String(texto||"").match(/<ACCTID>([^\r\n<]*)/);
  const acctid=acctidM?acctidM[1].trim():null;
  // Saldo final do periodo (LEDGERBAL) -- so em OFX de EXTRATO bancario (a
  // fatura de cartao nao tem isso, e nem faria sentido la). Usado pra
  // comparar contra o saldo calculado pelo app na mesma data (ver
  // conciliarExtrato no backend).
  const balM=String(texto||"").match(/<LEDGERBAL>[\s\S]*?<BALAMT>([-\d.]+)<\/BALAMT>[\s\S]*?<DTASOF>(\d{8})/);
  const saldoFinal=balM?parseFloat(balM[1]):null;
  const dataSaldoFinal=balM?(balM[2].slice(0,4)+"-"+balM[2].slice(4,6)+"-"+balM[2].slice(6,8)):null;
  const txns=[];
  const re=/<STMTTRN>([\s\S]*?)<\/STMTTRN>/g;
  let m;
  while((m=re.exec(texto))){
    const bloco=m[1];
    const dtM=bloco.match(/<DTPOSTED>(\d{8})/);
    const amtM=bloco.match(/<TRNAMT>([-\d.]+)/);
    const memoM=bloco.match(/<MEMO>([^\r\n<]*)/);
    const fitM=bloco.match(/<FITID>([^\r\n<]*)/);
    if(!dtM||!amtM) continue;
    const dt=dtM[1];
    const dataISO=dt.slice(0,4)+"-"+dt.slice(4,6)+"-"+dt.slice(6,8);
    txns.push({data:dataISO, valor:parseFloat(amtM[1]), identificador:fitM?fitM[1].trim():null, descricao:memoM?memoM[1].trim():""});
  }
  return {acctid, txns, saldoFinal, dataSaldoFinal};
}
// Lê um arquivo de EXTRATO (.csv ou .ofx) e devolve sempre {transacoes, acctid, nome}.
function lerArquivoExtrato(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=e=>{
      const texto=e.target.result;
      const ehOFX=/\.ofx$/i.test(file.name)||/<OFX>/i.test(String(texto).slice(0,200));
      if(ehOFX){
        const {acctid,txns,saldoFinal,dataSaldoFinal}=parseOFXExtrato(texto);
        resolve({transacoes:txns, acctid, saldoFinal, dataSaldoFinal, nome:file.name});
      }else{
        resolve({transacoes:parseCSVExtrato(texto), acctid:null, saldoFinal:null, dataSaldoFinal:null, nome:file.name});
      }
    };
    r.onerror=()=>reject(new Error("Falha lendo "+file.name));
    r.readAsText(file,"UTF-8");
  });
}

// Espelha (só pra preview no app, nunca grava nada) o parser real do backend
// (_parsearCSVSimples) -- extrai descrição/parcela de cada linha do texto

  if(linhas.length<2) return [];
  const startIdx=/date|title|amount/i.test(linhas[0])?1:0;
  function parseLine(line){
    const fields=[]; let cur="",inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){ if(inQ&&line[i+1]==='"'){cur+='"';i++;} else inQ=!inQ; }
      else if(c===","&&!inQ){ fields.push(cur.trim()); cur=""; }
      else cur+=c;
    }
    fields.push(cur.trim());
    return fields;
  }
  const itens=[];
  for(let i=startIdx;i<linhas.length;i++){
    const cols=parseLine(linhas[i]);
    if(cols.length<3) continue;
    const title=cols[1].trim();
    const amtStr=cols[2].trim().replace(/\s+/g,"").replace(/\./g,"").replace(",",".");
    const amt=parseFloat(amtStr);
    if(/pagamento recebido|pagamento efetuado/i.test(title)) continue;
    if(isNaN(amt)||amt<=0) continue;
    const mParc=title.match(/[- ]+parcela\s+(\d+)\/(\d+)/i);
    const numParc=mParc?parseInt(mParc[1]):1;
    const totParc=mParc?parseInt(mParc[2]):1;
    const desc=mParc?title.slice(0,title.lastIndexOf(mParc[0])).trim().toUpperCase():title.trim().toUpperCase();
    itens.push({desc,numParc,totParc});
  }
  return itens;
}

// Compara os itens de um CSV/OFX recém-lido contra o que o app já sabe: (1)
// assinaturas ATIVAS do OUTRO cartão em RECORRENCIAS (coluna DESTINO), (2)
// parcelamentos em andamento no OUTRO cartão (aba CARTAO_PF/PJ). Sinal de
// que o arquivo pode ter sido trocado entre PF e PJ. Roda só no app -- os
// dados já estão carregados em `data`, não precisa ida-e-volta no backend.
function detectarContaminacaoCruzada(data, cartaoAlvo, itens){
  const outro = cartaoAlvo==="PF"?"PJ":"PF";
  const avisos=[];

  const assinaturasOutro=(data.recorr||[])
    .filter(r=>String(r[6]).toUpperCase()==="S"&&String(r[9]||"").toUpperCase()==="CARTAO_"+outro)
    .map(r=>String(r[0]||"").toUpperCase())
    .filter(Boolean);

  itens.forEach(item=>{
    assinaturasOutro.forEach(nome=>{
      if(item.desc.indexOf(nome)>=0){
        avisos.push(`"${item.desc}" parece a assinatura "${nome}", que normalmente é do cartão ${outro}.`);
      }
    });
  });

  const parceladosOutro={};
  (outro==="PF"?(data.cartaoPF||[]):(data.cartaoPJ||[])).forEach(r=>{
    const parc=String(r[3]||"");
    if(parc&&parc!=="1/1") parceladosOutro[String(r[1]||"").toUpperCase().trim()]=true;
  });
  itens.forEach(item=>{
    if(item.totParc>1&&parceladosOutro[item.desc]){
      avisos.push(`"${item.desc}" (parcela ${item.numParc}/${item.totParc}) já está sendo controlada como parcelamento no cartão ${outro}.`);
    }
  });

  return avisos;
}

// Decide cor/selo de um item do Fluxo/Historico a partir de tipo, status,
// data e marcas em OBS (JSON) deixadas por baixa()/editar() -- puramente
// visual, nunca influencia calculo nenhum.
function corDoItem(item, hj){
  const ehFatura=item.tipo==="CARTAO PF"||item.tipo==="CARTAO PJ";
  let obs={};
  try{ obs=JSON.parse(item.obs||"{}"); }catch(e){}
  // [NOVO 20/07] Confirmado contra extrato de conta real (conciliarExtrato
  // ja grava obs.extratoId sozinho, so nunca tinha selo visual pra isso --
  // selo ADICIONAL, nunca substitui o selo normal de status (PAGO/VENCIDO
  // etc), os dois podem aparecer juntos.
  const confirmadoExtrato=!!obs.extratoId;

  // Cor de fundo por categoria DCP -- clarinha e semi-transparente, so pra
  // diferenciar visualmente provisao semanal (laranja) de gasto real (amarelo),
  // sem interferir na logica de vencido/pago/reagendado abaixo (cor/selo
  // continuam definidos normalmente e podem coexistir com o fundo).
  const cat=String(item.categoria||"").toUpperCase();
  // Receita estruturada (HSA/HSI/etc, marcador em OBS -- JSON.parse acima
  // falha silenciosamente pra essa string e cai no catch, entao usa o OBS
  // cru mesmo) ganha destaque azul clarinho + texto azul na descricao.
  const ehFonteReceita=/FONTE_RECEITA:/.test(String(item.obs||""));
  const bgCat = cat==="DCP_PROVISAO" ? C.orangeLight : (cat==="DCP" ? C.yellowLight : (ehFonteReceita?C.blueLight:null));
  const descCor = ehFonteReceita ? C.blue : null;

  if(ehFatura){
    if(item.status==="EXECUTADO"){
      return obs.pagamentoParcial?{cor:C.orange,selo:"● PARCIAL",bg:bgCat,descCor,confirmadoExtrato}:{cor:C.green,selo:"● PAGO",bg:bgCat,descCor,confirmadoExtrato};
    }
    if(item.data<hj) return {cor:C.red,selo:"● VENCIDA",bg:bgCat,descCor,confirmadoExtrato};
    if(obs.restanteDeFatura) return {cor:C.orange,selo:"● RESTANTE",bg:bgCat,descCor,confirmadoExtrato};
    return {cor:C.green,selo:null,bg:bgCat,descCor,confirmadoExtrato};
  }

  if(item.status==="PROGRAMADO"){
    if(item.data<hj) return {cor:C.red,selo:"● VENCIDO",bg:bgCat,descCor,confirmadoExtrato};
    if(obs.dataOriginal&&item.data>obs.dataOriginal) return {cor:C.orange,selo:"● REAGENDADO",bg:bgCat,descCor,confirmadoExtrato};
  }
  // [NOVO 20/07] Aumenta a visibilidade de gasto DCP no dia a dia -- antes
  // só o fundo amarelo clarinho diferenciava, sem nenhuma borda; agora ganha
  // a mesma borda lateral colorida que os outros selos já usam, mesmo sem
  // nenhum problema de status (vencido/reagendado). Nunca sobrescreve um
  // selo de status real -- só se aplica no caso "sem problema nenhum".
  if(cat==="DCP") return {cor:"#D97706",selo:null,bg:bgCat,descCor,confirmadoExtrato};
  return {cor:null,selo:null,bg:bgCat,descCor,confirmadoExtrato};
}

async function api(payload){
  const r=await fetch(getApiUrl(),{method:"POST",redirect:"follow",
    headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)});
  const j=await r.json();
  if(!j.ok) throw new Error(j.error||"Erro");
  return j;
}

// ── GRÁFICO escala híbrida + Bézier ──────────────────────────────────────────
function Chart({pts,zoomX}){
  const [tip,setTip]=useState(null);
  if(!pts||pts.length<2) return null;
  const PL=56,PR=20,PT=32,PB=40,PX=zoomX||80,H=300,iH=H-PT-PB;
  const W=(pts.length-1)*PX+PX;
  const dataMax=Math.max(...pts.map(p=>p.v));
  const maxS=Math.max(80000, Math.ceil(dataMax*1.1/10000)*10000);
  // Escala tripla: 0-10k (25% inferior), 10k-80k (50% central), 80k-max (25% superior)
  const P1=10000,P2=80000;
  const Y1=iH*0.75,Y2=iH*0.25;
  const toY=v=>{
    if(v<=0) return iH;
    if(v<=P1) return iH-(v/P1)*(iH-Y1);
    if(v<=P2) return Y1-((v-P1)/(P2-P1))*(Y1-Y2);
    return Y2-((v-P2)/((maxS-P2)||1))*Y2;
  };
  const toX=i=>i*PX;
  const pp=pts.map((p,i)=>({x:toX(i),y:toY(p.v)}));
  const path=pp.reduce((a,p,i)=>{if(!i)return"M "+p.x+" "+p.y;const q=pp[i-1],cx=(q.x+p.x)/2;return a+" C "+cx+" "+q.y+" "+cx+" "+p.y+" "+p.x+" "+p.y;},"");
  const area=path+" L "+pp[pp.length-1].x+" "+iH+" L 0 "+iH+" Z";
  // So pro grafico: saldo saudavel fica VERDE em vez de azul (pedido do
  // Marcus) -- corZ() continua azul nos outros lugares do app (cards, KPIs),
  // essa e uma funcao separada so pra nao mudar nada fora do grafico.
  const corZChart=v=>v<1000?C.red:v<5000?C.orange:C.green;
  const gr=pts.map((p,i)=>({off:((i/(pts.length-1))*100).toFixed(1)+"%",c:corZChart(p.v)}));
  const y1=toY(1000),y5=toY(5000),hj=hoje();
  const isPeak=i=>i>0&&i<pts.length-1&&pts[i].v>pts[i-1].v&&pts[i].v>pts[i+1].v;
  const isVale=i=>i>0&&i<pts.length-1&&pts[i].v<pts[i-1].v&&pts[i].v<pts[i+1].v;
  return <div style={{width:"100%",overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
    <svg width={W+PL+PR} height={H} style={{display:"block"}} onMouseLeave={()=>setTip(null)}>
      <defs>
        <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="0%">
          {gr.map((s,i)=><stop key={i} offset={s.off} stopColor={s.c}/>)}
        </linearGradient>
        <linearGradient id="ag" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stopColor={C.blue} stopOpacity="0.07"/>
          <stop offset="100%" stopColor={C.blue} stopOpacity="0.01"/>
        </linearGradient>
        <filter id="glow"><feGaussianBlur stdDeviation="1.5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <g transform={"translate("+PL+","+PT+")"}>
        <rect x={0} y={0}  width={W} height={toY(P2)} fill="#F8FAFF" opacity={0.8}/>
        <rect x={0} y={toY(P2)} width={W} height={toY(P1)-toY(P2)} fill="#EFF6FF" opacity={0.5}/>
        <rect x={0} y={toY(P1)} width={W} height={iH-toY(P1)} fill="#F9FAFB" opacity={0.8}/>
        <rect x={0} y={y5} width={W} height={y1-y5} fill="#FFF7ED" opacity={0.4}/>
        <rect x={0} y={y1} width={W} height={iH-y1} fill="#FEF2F2" opacity={0.5}/>
        {(()=>{
          // Marcadores: pontos chave + referências por segmento
          const marks=[0,1000,5000,10000,20000,40000,60000,80000];
          // Adicionar referências no segmento superior (80k+) se houver dados lá
          if(maxS>80000){
            const step=maxS<=200000?50000:100000;
            for(let v=80000+step;v<maxS;v+=step) marks.push(v);
            marks.push(Math.round(maxS/10000)*10000);
          }
          return [...new Set(marks)].filter(v=>v<=maxS).sort((a,b)=>a-b).map(v=>{
            const y=toY(v);
            const isPivot=v===P1||v===P2;
            return <g key={v}>
              <line x1={0} y1={y} x2={W} y2={y}
                stroke={v===0?"#D1D5DB":isPivot?"#CBD5E1":"#E5E7EB"}
                strokeWidth={v===0?1:isPivot?1:0.5}
                strokeDasharray={v?"4 5":"none"}/>
              <text x={-6} y={y+4} textAnchor="end" fontSize={9}
                fill={v<=1000?C.red:v<=5000?C.orange:isPivot?"#64748B":C.textMuted}
                fontWeight={isPivot?"700":"500"}>{v?fmtK(v):""}</text>
            </g>;
          });
        })()}
        <path d={area} fill="url(#ag)"/>
        <path d={path} fill="none" stroke="url(#lg)" strokeWidth={2.5} strokeLinecap="round" filter="url(#glow)"/>
        {pp.map((p,i)=>{
          const pk=isPeak(i),vl=isVale(i),cor=corZChart(pts[i].v),lY=pk?p.y-14:vl?p.y+20:null;
          return <g key={i} onMouseEnter={()=>setTip({i,x:p.x,y:p.y})} style={{cursor:"pointer"}}>
            <circle cx={p.x} cy={p.y} r={pk||vl?5.5:3} fill={cor} stroke="#fff" strokeWidth={pk||vl?2.5:1.5}/>
            {lY!==null&&<text x={p.x} y={lY} textAnchor="middle" fontSize={9} fontWeight="700" fill={cor} style={{filter:"drop-shadow(0 1px 2px white)"}}>{fmtK(pts[i].v)}</text>}
          </g>;
        })}
        {/* Linhas de divisão dos segmentos */}
        <line x1={0} y1={Y1} x2={W} y2={Y1} stroke="#94A3B8" strokeWidth={1} opacity={0.4} strokeDasharray="2 4"/>
        <line x1={0} y1={Y2} x2={W} y2={Y2} stroke="#94A3B8" strokeWidth={1} opacity={0.4} strokeDasharray="2 4"/>
        {(()=>{const idx=pts.findIndex(p=>p.d>=hj);if(idx<=0)return null;const x=toX(idx);return <g>
          <line x1={x} y1={0} x2={x} y2={iH} stroke={C.accent} strokeWidth={1.5} opacity={0.5}/>
          <text x={x+4} y={14} fontSize={8} fill={C.accent} fontWeight="700">hoje</text>
        </g>;})()}
        {pts.map((p,i)=>{const step=Math.max(1,Math.ceil(pts.length/8));
          const dia=Number(p.d.slice(8,10));
          const diaChave=[10,15,20,30].includes(dia);
          if(!diaChave&&i%step!==0&&i!==pts.length-1)return null;
          return <text key={i} x={toX(i)} y={iH+18} textAnchor="middle" fontSize={9} fontWeight={diaChave?700:400} fill={diaChave?C.textSub:C.textMuted}>{fmtD(p.d).slice(0,5)}</text>;})}
        {tip&&(()=>{const p=pts[tip.i],tx=tip.x,ty=tip.y,bW=155,bH=52,bX=tx+bW>W?tx-bW-10:tx+10,bY=Math.max(4,ty-18);
          return <g>
            <line x1={tx} y1={0} x2={tx} y2={iH} stroke="#D1D5DB" strokeWidth={1} strokeDasharray="3 3"/>
            <rect x={bX} y={bY} width={bW} height={bH} rx={8} fill="#fff" stroke={C.border} strokeWidth={1} style={{filter:"drop-shadow(0 2px 8px rgba(0,0,0,.08))"}}/>
            <text x={bX+10} y={bY+17} fontSize={10} fill={C.textSub}>{fmtD(p.d)}</text>
            <text x={bX+10} y={bY+36} fontSize={14} fontWeight="800" fill={corZChart(p.v)}>{fmt(p.v)}</text>
          </g>;})()}
      </g>
    </svg>
  </div>;
}

// ── BARRA DCP ─────────────────────────────────────────────────────────────────
function BarraDCP({semanas,base}){
  const n=Math.max(semanas.length,1),teto=base*n;
  // Preenchimento continuo: soma o gasto de todas as semanas (fechadas +
  // aberta ao vivo) -- a barra avanca sem parar por semana, so a regua
  // (marcada em multiplos de "base", fixa) mostra onde cada semana deveria
  // ter ficado se nada tivesse sido compensado.
  const real=semanas.reduce((s,w)=>s+w.gasto,0);
  const semAtualIdx=semanas.findIndex(w=>w.status==="PROGRAMADO");
  const pct=Math.min(real/teto,1)*100,cor=pct>100?C.red:pct>80?C.orange:C.green;
  return <div>
    <div style={{position:"relative",height:10,borderRadius:99,background:C.borderLight,overflow:"hidden",marginBottom:6}}>
      <div style={{position:"absolute",left:0,top:0,bottom:0,width:Math.min(pct,100)+"%",background:cor,borderRadius:99,transition:"width .5s"}}/>
      {Array.from({length:n-1}).map((_,i)=><div key={i} style={{position:"absolute",top:0,bottom:0,left:((i+1)*100/n)+"%",width:2,background:"#fff",opacity:.7}}/>)}
    </div>
    <div style={{display:"flex",marginBottom:6}}>
      {semanas.map((w,s)=>{const ativa=s===semAtualIdx,estourou=w.gasto>=w.meta;return <div key={w.data} style={{flex:1,textAlign:"center"}}>
        <div style={{fontSize:9,fontWeight:ativa?800:500,color:estourou?C.red:ativa?C.accent:C.textMuted}}>{"S"+(s+1)+(ativa?" ◀":"")}</div>
        <div style={{fontSize:8,color:C.textMuted,marginTop:1}}>{fmt(w.gasto)}</div>
      </div>;})}
    </div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
      <div><span style={{fontSize:13,fontWeight:800,color:real>teto?C.red:C.text}}>{fmt(real)}</span>
        <span style={{fontSize:12,color:C.textMuted,fontWeight:600}}> / {fmt(teto)}</span>
        {real>teto&&<span style={{fontSize:10,color:C.red,marginLeft:6}}>estouro {fmt(real-teto)}</span>}
      </div>
      <div style={{textAlign:"right"}}>
        <div style={{fontSize:8,color:C.textMuted,textTransform:"uppercase",letterSpacing:".05em"}}>Disponível do ciclo</div>
        <div style={{fontSize:12,fontWeight:700,color:(teto-real)<0?C.red:C.text}}>{fmt(teto-real)}</div>
      </div>
    </div>
  </div>;
}

// ── CICLO CARD ────────────────────────────────────────────────────────────────
function CicloCard({fluxo,nome,atual,dcpResumo,basais}){
  const hj=hoje();
  const rows=fluxo.filter(r=>r.ciclo===nome);
  const receitas=rows.filter(r=>r.tipo==="RECEITA").reduce((s,r)=>s+r.valor,0);
  const saidas=Math.abs(rows.filter(r=>r.tipo!=="RECEITA").reduce((s,r)=>s+r.valor,0));
  const fatPF=Math.abs(rows.filter(r=>r.tipo==="CARTÃO PF").reduce((s,r)=>s+r.valor,0));
  const fatPJ=Math.abs(rows.filter(r=>r.tipo==="CARTÃO PJ").reduce((s,r)=>s+r.valor,0));
  const sorted=[...rows].filter(r=>r.saldoProjetado!=null).sort((a,b)=>a.data>b.data?1:-1);
  const saldo15=sorted.length?sorted[sorted.length-1].saldoProjetado:null;
  const fut=rows.filter(r=>r.data>=hj&&r.saldoProjetado!=null);
  const ml=fut.length?fut.reduce((m,r)=>r.saldoProjetado<m.saldoProjetado?r:m,fut[0]):null;
  const extras=[];
  if(fatPF>0) extras.push({desc:"Fatura PF",v:fatPF});
  if(fatPJ>0) extras.push({desc:"Fatura PJ",v:fatPJ});
  rows.filter(r=>r.categoria==="DIVIDA_PARCELADA").forEach(r=>extras.push({desc:r.descricao.slice(0,30),v:Math.abs(r.valor)}));
  const totEx=extras.reduce((s,e)=>s+e.v,0);
  const pctEx=basais+totEx>0?totEx/(basais+totEx)*100:0;
  return <Card>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <div><Label>{atual?"Ciclo atual":"Próximo ciclo"}</Label>
        <div style={{fontSize:15,fontWeight:800,color:C.text,marginTop:2}}>{nome}</div></div>
      {atual&&<span style={{fontSize:10,background:C.accentLight,color:C.accent,padding:"3px 10px",borderRadius:20,fontWeight:700}}>EM CURSO</span>}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
      {saldo15!=null&&<KPI label="Saldo dia 15" value={fmt(saldo15)} color={corZ(saldo15)} bg={bgZ(saldo15)} raw={saldo15}/>}
      {ml&&<KPI label={atual?"Próx. menor liq.":"Menor liquidez"} value={fmt(ml.saldoProjetado)} sub={fmtD(ml.data)} color={corZ(ml.saldoProjetado)} bg={bgZ(ml.saldoProjetado)} raw={ml.saldoProjetado}/>}
      <KPI label="Receitas" value={fmt(receitas)} color={C.blue} bg={C.blueLight}/>
      <KPI label="Saídas" value={fmt(saidas)} color={C.red} bg={C.redLight}/>
    </div>
    {(fatPF>0||fatPJ>0)&&<div style={{borderTop:"1px solid "+C.border,paddingTop:10,display:"flex",gap:8,marginBottom:10}}>
      <div style={{flex:1,background:C.borderLight,borderRadius:8,padding:"8px 10px"}}><Label>Fatura PF 07</Label>
        <div style={{fontSize:13,fontWeight:700,color:C.text,marginTop:2}}>{fatPF>0?fmt(fatPF):"—"}</div></div>
      <div style={{flex:1,background:C.borderLight,borderRadius:8,padding:"8px 10px"}}><Label>Fatura PJ 07</Label>
        <div style={{fontSize:13,fontWeight:700,color:C.text,marginTop:2}}>{fatPJ>0?fmt(fatPJ):"—"}</div></div>
    </div>}
    {atual&&dcpResumo&&dcpResumo.semanas.length>0&&<div style={{borderTop:"1px solid "+C.border,paddingTop:10,marginBottom:10}}>
      <div style={{marginBottom:6}}><Label>Saldo p/ Despesas Cotidianas (DCP)</Label></div>
      <BarraDCP semanas={dcpResumo.semanas} base={dcpResumo.base}/>
    </div>}
    {extras.length>0&&<div style={{borderTop:"1px solid "+C.border,paddingTop:10}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
        <Label>Compromissos além dos Gastos Fixos</Label><span style={{fontSize:9,color:C.textMuted}}>cartões + emp.</span></div>
      <div style={{display:"flex",flexDirection:"column",gap:4}}>
        {extras.map((e,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"4px 10px",background:C.redLight,borderRadius:7}}>
          <span style={{fontSize:11,color:C.textSub}}>{e.desc}</span>
          <span style={{fontSize:11,fontWeight:700,color:C.red,fontVariantNumeric:"tabular-nums"}}>{fmt(e.v)}</span>
        </div>)}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:8,paddingTop:8,borderTop:"1px dashed "+C.border}}>
        <div><span style={{fontSize:12,fontWeight:800,color:C.red}}>{fmt(totEx)}</span>
          <span style={{fontSize:10,color:C.textMuted,marginLeft:6}}>total extras</span></div>
        <span style={{fontSize:11,fontWeight:700,color:C.red,background:C.redLight,borderRadius:20,padding:"2px 10px"}}>{pctEx.toFixed(1)}% comprometido</span>
      </div>
    </div>}
  </Card>;
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function Dashboard({data}){
  const fluxo=data.fluxo||[],cfg=data.config||{},hj=hoje();
  const dcpResumo=data.dcpResumo||{base:1250,numSemanas:0,totalGasto:0,semanas:[]};
  // Custo de vida dinamico: soma dos recorrentes DESPESA FIXA ativos (FLUXO
  // ou cartao, tanto faz -- todos sao custo de vida) + orcamento do DCP do
  // ciclo (numero de segundas x valor base -- nao o gasto real, o TETO
  // planejado, que e o que faz sentido pra uma medida de "quanto custa viver").
  // Sem essa soma, "quanto sobra alem do essencial" ficava sempre defasado
  // toda vez que um recorrente mudasse de valor.
  const basais=useMemo(()=>{
    const fixos=(data.recorr||[]).filter(r=>String(r[6]).toUpperCase()==="S"&&String(r[7]).toUpperCase()==="DESPESA FIXA")
      .reduce((s,r)=>s+Math.abs(Number(r[1])||0),0);
    const orcamentoDCP=dcpResumo.numSemanas*dcpResumo.base;
    return fixos+orcamentoDCP;
  },[data.recorr,dcpResumo]);
  const saldo=useMemo(()=>{const ex=fluxo.filter(r=>r.status==="EXECUTADO"&&r.data<=hj).sort((a,b)=>a.data>b.data?1:-1);const sr=ex.length&&ex[ex.length-1].saldoReal;return (sr!=null&&isFinite(sr))?sr:(Number(cfg.SALDO_ATUAL)||0);},[fluxo,hj,cfg]);
  const ml=useMemo(()=>{const f=fluxo.filter(r=>r.data>=hj&&r.saldoProjetado!=null);return f.length?f.reduce((m,r)=>r.saldoProjetado<m.saldoProjetado?r:m,f[0]):null;},[fluxo,hj]);
  const [periodo,setPeriodo]=useState(12); // quantos ciclos mostrar no grafico: 3, 6 ou 12
  const [zoomX,setZoomX]=useState(80); // espaco horizontal por ponto -- "zoom" sem gesto de pinca
  const ciclosOrdenados=useMemo(()=>{
    const vistos=new Set(),lista=[];
    fluxo.filter(r=>r.data>=hj).sort((a,b)=>a.data<b.data?-1:1).forEach(r=>{
      if(r.ciclo&&!vistos.has(r.ciclo)){vistos.add(r.ciclo);lista.push(r.ciclo);}
    });
    return lista;
  },[fluxo,hj]);
  const ciclosVisiveis=useMemo(()=>new Set(ciclosOrdenados.slice(0,periodo)),[ciclosOrdenados,periodo]);
  const chartPts=useMemo(()=>{const m={};fluxo.forEach(r=>{if(r.data>=hj&&r.saldoProjetado!=null&&(!r.ciclo||ciclosVisiveis.has(r.ciclo)))m[r.data]={d:r.data,v:r.saldoProjetado};});return Object.values(m).sort((a,b)=>a.d>b.d?1:-1);},[fluxo,hj,ciclosVisiveis]);
  // [FIX 16/07] Antes pegava os 3 primeiros nomes de ciclo unicos de TODO o
  // historico do Fluxo, sem olhar a data -- coincidentemente sempre certo
  // ate hoje, porque o sistema nasceu no proprio ciclo JUN/JUL (primeiro da
  // historia = ciclo atual, por acaso). Na primeira virada de verdade da
  // vida do sistema, os dois se separaram e o Dashboard ficou preso no
  // ciclo mais antigo do historico pra sempre. ciclosOrdenados (acima) ja
  // filtra por data>=hoje antes de tirar os unicos -- so reaproveitar.
  const ciclos=useMemo(()=>ciclosOrdenados.slice(0,3),[ciclosOrdenados]);
  return <div style={{display:"flex",flexDirection:"column",gap:14}}>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <div style={{background:bgZ(saldo),border:"2px solid "+corZ(saldo),borderRadius:16,padding:"14px 14px"}}>
        <Label>Saldo em conta</Label>
        <div style={{marginTop:6}}>
          <span style={saldo<0?{fontSize:22,fontWeight:900,color:C.red,background:C.redLight,padding:"1px 6px",borderRadius:6,fontVariantNumeric:"tabular-nums",letterSpacing:"-.01em",whiteSpace:"nowrap"}:{fontSize:24,fontWeight:800,color:corZ(saldo),fontVariantNumeric:"tabular-nums",letterSpacing:"-.01em"}}>{fmt(saldo)}</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4,marginTop:8}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:corZ(saldo)}}/>
          <span style={{fontSize:12,color:corZ(saldo),fontWeight:700}}>zona {saldo<0?"negativa":saldo<1000?"crítico":saldo<5000?"atenção":"saudável"}</span>
        </div>
      </div>
      {ml&&<div style={{background:bgZ(ml.saldoProjetado),border:"2px solid "+corZ(ml.saldoProjetado),borderRadius:16,padding:"14px 14px"}}>
        <Label>Próxima menor liquidez</Label>
        <div style={{marginTop:6}}>
          <span style={ml.saldoProjetado<0?{fontSize:19,fontWeight:900,color:C.red,background:C.redLight,padding:"1px 6px",borderRadius:6,fontVariantNumeric:"tabular-nums",letterSpacing:"-.01em",whiteSpace:"nowrap"}:{fontSize:19,fontWeight:800,color:corZ(ml.saldoProjetado),fontVariantNumeric:"tabular-nums",letterSpacing:"-.01em"}}>{fmt(ml.saldoProjetado)}</span>
        </div>
        <div style={{fontSize:12,color:C.textMuted,marginTop:6,fontWeight:500}}>{fmtD(ml.data)}</div>
      </div>}
    </div>
    {dcpResumo.semanas.length>0&&<Card>
      <div style={{marginBottom:8}}><Label>Saldo p/ Despesas Cotidianas (DCP)</Label></div>
      {(()=>{
        // [NOVO 20/07] Destaque pedido pelo Marcus -- "quanto tenho pra
        // gastar" na semana e no mês/ciclo, junto das outras informações
        // mais práticas do app (menor liquidez, projeções). Antes só
        // existia dentro da barra, em texto pequeno ("Disponível do
        // ciclo"). [AUMENTADO 20/07] Bloco próprio, bem maior que o KPI
        // padrão -- pedido explícito pra ficar mais evidente que qualquer
        // outro número da tela.
        const semAtual=dcpResumo.semanas.find(w=>w.status==="PROGRAMADO")||dcpResumo.semanas[dcpResumo.semanas.length-1];
        const dispSemana=semAtual?semAtual.meta-semAtual.gasto:null;
        const tetoMes=dcpResumo.base*Math.max(dcpResumo.semanas.length,1);
        const gastoMes=dcpResumo.semanas.reduce((s,w)=>s+w.gasto,0);
        const dispMes=tetoMes-gastoMes;
        const Bloco=({label,valor})=><div style={{flex:1,minWidth:0,background:valor<0?C.redLight:"#FEF3C7",borderRadius:14,padding:"12px 8px",textAlign:"center",boxSizing:"border-box"}}>
          <div style={{fontSize:10,fontWeight:700,color:valor<0?C.red:"#92400E",textTransform:"uppercase",letterSpacing:".03em",marginBottom:4,lineHeight:1.2}}>{label}</div>
          <div style={{fontSize:22,fontWeight:900,color:valor<0?C.red:"#92400E",lineHeight:1.05,fontVariantNumeric:"tabular-nums",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{fmt(valor)}</div>
        </div>;
        return <div style={{display:"flex",gap:8,marginBottom:12}}>
          {dispSemana!=null&&<Bloco label="Esta semana" valor={dispSemana}/>}
          <Bloco label="No ciclo (mês)" valor={dispMes}/>
        </div>;
      })()}
      <BarraDCP semanas={dcpResumo.semanas} base={dcpResumo.base}/>
    </Card>}
    <Card style={{padding:"14px 12px 10px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10,paddingLeft:2}}>
        <div>
          <Label>Saldo projetado — {periodo} ciclo{periodo>1?"s":""}</Label>
          <div style={{display:"flex",gap:12,marginTop:6}}>
            {[[C.red,"< R$1k"],[C.orange,"R$1k–5k"],[C.green,"> R$5k"]].map(([c,l])=><div key={l} style={{display:"flex",alignItems:"center",gap:4}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:c}}/><span style={{fontSize:10,color:C.textMuted}}>{l}</span>
            </div>)}
          </div>
        </div>
        <div style={{display:"flex",gap:4,flexShrink:0}}>
          <button onClick={()=>setZoomX(z=>Math.max(40,z-20))} title="Menos zoom"
            style={{width:26,height:26,borderRadius:6,border:"1px solid "+C.border,background:C.surface,color:C.textSub,fontSize:14,fontWeight:700,cursor:"pointer"}}>−</button>
          <button onClick={()=>setZoomX(z=>Math.min(160,z+20))} title="Mais zoom"
            style={{width:26,height:26,borderRadius:6,border:"1px solid "+C.border,background:C.surface,color:C.textSub,fontSize:14,fontWeight:700,cursor:"pointer"}}>+</button>
        </div>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:10,paddingLeft:2}}>
        {[3,6,12].map(n=><button key={n} onClick={()=>setPeriodo(n)}
          style={{padding:"4px 12px",borderRadius:20,border:"1px solid "+(periodo===n?C.accent:C.border),
            background:periodo===n?C.accentLight:C.surface,color:periodo===n?C.accent:C.textSub,
            fontSize:11,fontWeight:700,cursor:"pointer"}}>{n} ciclos</button>)}
      </div>
      <Chart pts={chartPts} zoomX={zoomX}/>
    </Card>
    {ciclos.map((n,i)=><CicloCard key={n} fluxo={fluxo} nome={n} atual={i===0} dcpResumo={dcpResumo} basais={basais}/>)}
    <div style={{height:8}}/>
  </div>;
}

// ── FLUXO DE CAIXA ────────────────────────────────────────────────────────────
function DCPBaseEditor({data,onUpdate}){
  const cfg=data.config||{};
  const baseAtual=Number(cfg.DCP_VALOR_BASE)||1250;
  const [editando,setEditando]=useState(false);
  const [val,setVal]=useState(formatarValorInicial(baseAtual));
  const [load,setLoad]=useState(false);
  const [loadGer,setLoadGer]=useState(false);
  const [msgGer,setMsgGer]=useState(null);
  async function salvar(){
    setLoad(true);
    try{ onUpdate(await api({action:"atualizarDCPBase",valor:numBR(val)})); setEditando(false); }
    catch(e){ alert(e.message); }
    setLoad(false);
  }
  async function gerar(){
    setLoadGer(true); setMsgGer(null);
    try{
      const r=await api({action:"gerarDCPSemanal"});
      onUpdate(r);
      setMsgGer((r.dcpGerados||0)+" novo(s) lançamento(s) DCP gerado(s)");
    }catch(e){ alert(e.message); }
    setLoadGer(false);
  }
  return <div style={{padding:"8px 14px",background:"#F9FAFB",borderBottom:"1px solid "+C.border}}>
    <div style={{display:"flex",alignItems:"center",gap:8}}>
      <span style={{fontSize:11,color:C.textMuted,fontWeight:600}}>Limite de Despesas Cotidianas</span>
      {!editando?<>
        <span style={{fontSize:13,fontWeight:700,color:C.text}}>{fmt(baseAtual)}</span>
        <button onClick={()=>{setVal(formatarValorInicial(baseAtual));setEditando(true);}}
          style={{background:"none",border:"none",color:C.accent,fontSize:14,cursor:"pointer"}}>✏️</button>
        <button onClick={gerar} disabled={loadGer}
          style={{marginLeft:"auto",background:C.accentLight,color:C.accent,border:"none",borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>
          {loadGer?"…":"🔄 Gerar DCP"}
        </button>
      </>:<>
        <input type="text" inputMode="numeric" value={val} onChange={e=>setVal(formatarMoedaInput(e.target.value))}
          style={{padding:"4px 8px",borderRadius:6,border:"1px solid "+C.accent,fontSize:13,width:90,textAlign:"right"}}/>
        <button onClick={salvar} disabled={load}
          style={{background:C.accent,color:"#fff",border:"none",borderRadius:6,padding:"4px 10px",fontSize:12,fontWeight:700,cursor:"pointer"}}>
          {load?"…":"Salvar"}
        </button>
        <button onClick={()=>setEditando(false)} disabled={load}
          style={{background:"none",border:"none",color:C.textMuted,fontSize:12,cursor:"pointer"}}>Cancelar</button>
      </>}
    </div>
    {msgGer&&<div style={{fontSize:10,color:C.textMuted,marginTop:4}}>{msgGer}</div>}
  </div>;
}

// ── EDITOR DE ENVELOPE (DCP minimo/maximo) -- planejamento, nao rastreamento.
// Dois caminhos: rapido (dois numeros) ou guiado (itens com prioridade,
// que CALCULAM os dois numeros). O guiado sempre substitui o rapido assim
// que tiver pelo menos 1 item -- nunca coexistem. Isso so guarda os limites
// (CONFIG.DCP_VALOR_MINIMO/MAXIMO) pra referencia -- o motor ainda usa so
// DCP_VALOR_BASE pra gerar as provisoes (proximo passo: a virada de ciclo
// escolher entre os niveis de acordo com a menor liquidez projetada).
function EditorEnvelope({data,onUpdate}){
  const cfg=data.config||{};
  const minAtual=cfg.DCP_VALOR_MINIMO?Number(cfg.DCP_VALOR_MINIMO):null;
  const maxAtual=cfg.DCP_VALOR_MAXIMO?Number(cfg.DCP_VALOR_MAXIMO):null;
  const [aberto,setAberto]=useState(false);
  const [guiado,setGuiado]=useState(false);
  const [minRapido,setMinRapido]=useState("");
  const [maxRapido,setMaxRapido]=useState("");
  const [itens,setItens]=useState([]);
  const [load,setLoad]=useState(false);
  const [preview,setPreview]=useState(null);
  const [loadPreview,setLoadPreview]=useState(false);

  async function verPreview(){
    setLoadPreview(true);
    try{ setPreview(await api({action:"previewNivelEnvelope"})); }
    catch(e){ alert(e.message); }
    setLoadPreview(false);
  }

  const SUGESTOES=[
    {nome:"Mercado",max:"",min:"",redutivel:false,essencial:true},
    {nome:"Gasolina",max:"",min:"",redutivel:false,essencial:true},
    {nome:"Lazer",max:"",min:"",redutivel:false,essencial:false},
    {nome:"Refeições fora",max:"",min:"",redutivel:false,essencial:false},
  ];

  function abrirGuiado(){
    if(!itens.length){
      let salvos=null;
      try{ salvos=cfg.DCP_ENVELOPE_ITENS?JSON.parse(cfg.DCP_ENVELOPE_ITENS):null; }catch(e){}
      setItens(salvos&&salvos.length?salvos:SUGESTOES.map(s=>({...s})));
    }
    setGuiado(true);
  }
  function atualizarItem(i,campo,valor){ setItens(its=>its.map((it,idx)=>idx===i?{...it,[campo]:valor}:it)); }
  function removerItem(i){ setItens(its=>its.filter((_,idx)=>idx!==i)); }
  function addItem(){ setItens(its=>[...its,{nome:"",max:"",min:"",redutivel:false,essencial:false}]); }

  const tiers=useMemo(()=>{
    let cheio=0,reduzido=0,essencialMax=0,minimoVital=0;
    itens.forEach(it=>{
      const max=numBR(it.max)||0;
      const min=it.redutivel?(numBR(it.min)||0):max;
      cheio+=max; reduzido+=min;
      if(it.essencial){ essencialMax+=max; minimoVital+=min; }
    });
    return {cheio,reduzido,essencialMax,minimoVital};
  },[itens]);

  async function salvarRapido(){
    setLoad(true);
    try{
      onUpdate(await api({action:"salvarEnvelopeDCP",minimo:numBR(minRapido),maximo:numBR(maxRapido)}));
      setAberto(false);
    }catch(e){alert(e.message);}
    setLoad(false);
  }
  async function salvarGuiado(){
    setLoad(true);
    try{
      const itensLimpos=itens.filter(it=>it.nome.trim()&&(numBR(it.max)||0)>0)
        .map(it=>({...it,max:numBR(it.max)||0,min:it.redutivel?(numBR(it.min)||0):(numBR(it.max)||0)}));
      if(!itensLimpos.length){ alert("Preencha ao menos um item com nome e valor máximo."); setLoad(false); return; }
      onUpdate(await api({action:"salvarEnvelopeDCP",itens:itensLimpos}));
      setAberto(false); setGuiado(false);
    }catch(e){alert(e.message);}
    setLoad(false);
  }

  return <div style={{padding:"8px 14px",background:"#F9FAFB",borderBottom:"1px solid "+C.border}}>
    <div style={{display:"flex",alignItems:"center",gap:8}}>
      <span style={{fontSize:11,color:C.textMuted,fontWeight:600}}>Envelope da semana (mín/máx)</span>
      {minAtual!=null&&maxAtual!=null?
        <span style={{fontSize:13,fontWeight:700,color:C.text}}>{fmt(minAtual)} – {fmt(maxAtual)}</span>
        :<span style={{fontSize:12,color:C.textMuted,fontStyle:"italic"}}>ainda não definido</span>}
      <button onClick={()=>setAberto(a=>!a)}
        style={{marginLeft:"auto",background:C.accentLight,color:C.accent,border:"none",borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>
        {aberto?"Fechar":"Ajustar"}
      </button>
    </div>
    {minAtual!=null&&maxAtual!=null&&<div style={{marginTop:6}}>
      <button onClick={verPreview} disabled={loadPreview}
        style={{background:"none",border:"1px dashed "+C.border,borderRadius:6,padding:"5px 10px",fontSize:11,color:C.textSub,cursor:"pointer"}}>
        {loadPreview?"…":"🔍 Simular escolha do próximo ciclo"}
      </button>
      {preview&&<div style={{marginTop:6,fontSize:11,color:C.textMuted}}>
        {preview.resultado?<>
          Ciclo <b>{preview.ciclo}</b> abriria como <b style={{color:C.accent}}>{preview.resultado.nivel}</b> (R$ {fmt(preview.resultado.valor).replace("R$ ","")}/semana)
          {preview.resultado.deficit>0&&<span style={{color:C.red}}> — mesmo assim, ficaria R$ {fmt(preview.resultado.deficit).replace("R$ ","")} no vermelho no pior momento.</span>}
        </>:"Envelope ainda não configurado — o ciclo seguiria no valor base padrão."}
      </div>}
    </div>}
    {aberto&&<div style={{marginTop:10}}>
      {!guiado?<>
        <div style={{display:"flex",gap:8,marginBottom:8}}>
          <div style={{flex:1}}>
            <label style={{fontSize:10,color:C.textMuted,fontWeight:600}}>MÍNIMO NA SEMANA</label>
            <input type="text" inputMode="numeric" value={minRapido} onChange={e=>setMinRapido(formatarMoedaInput(e.target.value))}
              placeholder="0,00" style={{width:"100%",padding:"6px 8px",borderRadius:6,border:"1px solid "+C.border,fontSize:13,textAlign:"right",boxSizing:"border-box"}}/>
          </div>
          <div style={{flex:1}}>
            <label style={{fontSize:10,color:C.textMuted,fontWeight:600}}>MÁXIMO NA SEMANA</label>
            <input type="text" inputMode="numeric" value={maxRapido} onChange={e=>setMaxRapido(formatarMoedaInput(e.target.value))}
              placeholder="0,00" style={{width:"100%",padding:"6px 8px",borderRadius:6,border:"1px solid "+C.border,fontSize:13,textAlign:"right",boxSizing:"border-box"}}/>
          </div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={salvarRapido} disabled={load||!minRapido||!maxRapido}
            style={{flex:1,background:C.accent,color:"#fff",border:"none",borderRadius:6,padding:"8px",fontSize:13,fontWeight:700,cursor:"pointer"}}>
            {load?"…":"Salvar"}
          </button>
          <button onClick={abrirGuiado}
            style={{background:C.borderLight,color:C.text,border:"none",borderRadius:6,padding:"8px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}}>
            Quer ajuda pra definir?
          </button>
        </div>
      </>:<>
        <div style={{fontSize:11,color:C.textMuted,marginBottom:8,fontStyle:"italic"}}>
          Liste o que você espera gastar na semana. Marque "dá pra reduzir?" quando o valor puder encolher em vez de sumir (ex: mercado); deixe desmarcado se o gasto é sempre o mesmo (ex: assinatura). "Essencial" é o que não dá pra pular de jeito nenhum.
        </div>
        {itens.map((it,i)=><div key={i} style={{background:C.surface,border:"1px solid "+C.border,borderRadius:8,padding:8,marginBottom:6}}>
          <div style={{display:"flex",gap:6,marginBottom:6}}>
            <input type="text" value={it.nome} onChange={e=>atualizarItem(i,"nome",e.target.value)} placeholder="Nome do item"
              style={{flex:1,padding:"5px 8px",borderRadius:6,border:"1px solid "+C.border,fontSize:12,fontFamily:"inherit"}}/>
            <button onClick={()=>removerItem(i)} style={{background:"none",border:"none",color:C.red,fontSize:14,cursor:"pointer",padding:"0 4px"}}>✕</button>
          </div>
          <div style={{display:"flex",gap:6,marginBottom:6}}>
            <div style={{flex:1}}>
              <label style={{fontSize:9,color:C.textMuted}}>MÁXIMO</label>
              <input type="text" inputMode="numeric" value={it.max} onChange={e=>atualizarItem(i,"max",formatarMoedaInput(e.target.value))}
                placeholder="0,00" style={{width:"100%",padding:"5px 8px",borderRadius:6,border:"1px solid "+C.border,fontSize:12,textAlign:"right",boxSizing:"border-box"}}/>
            </div>
            <div style={{flex:1}}>
              <label style={{fontSize:9,color:it.redutivel?C.textMuted:"#D1D5DB"}}>MÍNIMO</label>
              <input type="text" inputMode="numeric" value={it.redutivel?it.min:it.max} disabled={!it.redutivel}
                onChange={e=>atualizarItem(i,"min",formatarMoedaInput(e.target.value))}
                style={{width:"100%",padding:"5px 8px",borderRadius:6,border:"1px solid "+C.border,fontSize:12,textAlign:"right",boxSizing:"border-box",
                  background:it.redutivel?C.surface:C.borderLight,color:it.redutivel?C.text:C.textMuted}}/>
            </div>
          </div>
          <div style={{display:"flex",gap:14}}>
            <label style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:C.textSub,cursor:"pointer"}}>
              <input type="checkbox" checked={it.redutivel} onChange={e=>atualizarItem(i,"redutivel",e.target.checked)}/>
              Dá pra reduzir?
            </label>
            <label style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:C.textSub,cursor:"pointer"}}>
              <input type="checkbox" checked={it.essencial} onChange={e=>atualizarItem(i,"essencial",e.target.checked)}/>
              É essencial?
            </label>
          </div>
        </div>)}
        <button onClick={addItem} style={{width:"100%",background:"none",border:"1px dashed "+C.border,borderRadius:6,padding:6,fontSize:12,color:C.textMuted,cursor:"pointer",marginBottom:10}}>
          + Adicionar item
        </button>
        <div style={{background:C.accentLight,borderRadius:8,padding:10,marginBottom:10}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,fontSize:11}}>
            <div>Cheio: <b>{fmt(tiers.cheio)}</b></div>
            <div>Reduzido: <b>{fmt(tiers.reduzido)}</b></div>
            <div>Essencial: <b>{fmt(tiers.essencialMax)}</b></div>
            <div>Mínimo Vital: <b>{fmt(tiers.minimoVital)}</b></div>
          </div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={salvarGuiado} disabled={load}
            style={{flex:1,background:C.accent,color:"#fff",border:"none",borderRadius:6,padding:"8px",fontSize:13,fontWeight:700,cursor:"pointer"}}>
            {load?"…":"Salvar envelope"}
          </button>
          <button onClick={()=>setGuiado(false)} disabled={load}
            style={{background:C.borderLight,color:C.textSub,border:"none",borderRadius:6,padding:"8px 12px",fontSize:12,cursor:"pointer"}}>
            Voltar
          </button>
        </div>
      </>}
    </div>}
  </div>;
}

// ── ABA DCP -- limite/gerar (migrados do Fluxo) + lista de envelopes ───────────
// ── SUGESTAO DE REAGENDAMENTO -- peca final do DCP adaptativo. Verifica sob
// demanda se algum ponto do horizonte projetado fica negativo e, se sim,
// sugere qual conta postergavel (com tolerancia cadastrada) resolveria e
// pra quando adiar sem criar problema novo mais a frente.
function SugestaoReagendamento({onUpdate}){
  const [resultado,setResultado]=useState(null);
  const [load,setLoad]=useState(false);
  const [loadAplicar,setLoadAplicar]=useState(false);

  async function verificar(){
    setLoad(true);
    try{ setResultado(await api({action:"sugerirReagendamento"})); }
    catch(e){ alert(e.message); }
    setLoad(false);
  }

  async function aplicar(s){
    if(!confirm("Adiar \""+s.descricao+"\" de "+fmtD(s.dataOriginal)+" pra "+fmtD(s.dataSugerida)+"?")) return;
    setLoadAplicar(true);
    try{
      onUpdate(await api({action:"editar",row:s.row,campo:"DATA",valor:s.dataSugerida}));
      setResultado(null);
    }catch(e){alert(e.message);}
    setLoadAplicar(false);
  }

  return <div style={{padding:"10px 14px",background:"#F9FAFB",borderBottom:"1px solid "+C.border}}>
    <button onClick={verificar} disabled={load}
      style={{width:"100%",background:C.accentLight,color:C.accent,border:"none",borderRadius:8,padding:"9px",fontSize:12,fontWeight:700,cursor:"pointer"}}>
      {load?"…":"🔎 Checar se algum ciclo vai apertar"}
    </button>
    {resultado&&<div style={{marginTop:8}}>
      {resultado.deficit===0?
        <div style={{fontSize:12,color:C.blue,fontWeight:600}}>✓ Tudo certo — nenhum ponto projetado fica negativo nos próximos ciclos.</div>
      :<div>
        <div style={{fontSize:12,color:C.red,fontWeight:700,marginBottom:6}}>
          ⚠ Projeção fica negativa em {fmtD(resultado.piorData)} — faltam {fmt(resultado.deficit)}
        </div>
        <div style={{fontSize:11,color:C.accent,background:C.accentLight,borderRadius:6,padding:"7px 9px",marginBottom:8,fontStyle:"italic"}}>
          💳 Evite gastos do envelope semanal à vista — priorize cartão de crédito enquanto essa janela durar.
        </div>
        {!resultado.sugestoes.length?
          <div style={{fontSize:12,color:C.textMuted,fontStyle:"italic"}}>Nenhuma conta postergável cadastrada resolve isso dentro da tolerância que ela aguenta.</div>
        :resultado.sugestoes.slice(0,3).map((s,i)=><div key={i} style={{background:C.surface,border:"1px solid "+C.border,borderRadius:8,padding:10,marginBottom:6}}>
          <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:4}}>{i===0?"Sugestão: ":"Alternativa: "}adiar {s.descricao}</div>
          <div style={{fontSize:11,color:C.textMuted,marginBottom:8}}>
            De {fmtD(s.dataOriginal)} pra {fmtD(s.dataSugerida)} ({s.diasAdiados} dia{s.diasAdiados!==1?"s":""} — tolerância desse item é {s.tolerancia})
          </div>
          <button onClick={()=>aplicar(s)} disabled={loadAplicar}
            style={{width:"100%",background:C.accent,color:"#fff",border:"none",borderRadius:6,padding:"7px",fontSize:12,fontWeight:700,cursor:"pointer"}}>
            {loadAplicar?"…":"Aplicar este adiamento"}
          </button>
        </div>)}
        {resultado.sugestaoEnvelope&&<div style={{background:"#FFF7ED",border:"1px solid #FDBA74",borderRadius:8,padding:10,marginBottom:6}}>
          <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:4}}>
            Outra opção: reduzir {resultado.sugestaoEnvelope.semanas.length>1?`as ${resultado.sugestaoEnvelope.semanas.length} semanas antes do problema`:resultado.sugestaoEnvelope.semanas[0].descricao} pra <b>{resultado.sugestaoEnvelope.nivel}</b>
          </div>
          {resultado.sugestaoEnvelope.semanas.map((s,i)=><div key={i} style={{fontSize:11,color:C.textMuted,marginTop:i>0?2:0}}>
            {s.descricao}: {fmt(s.metaAtual)} → {fmt(s.metaSugerida)}
          </div>)}
          <div style={{fontSize:11,color:C.textSub,marginTop:6,fontWeight:600}}>
            Libera {fmt(resultado.sugestaoEnvelope.reducaoTotalLiberada)} no total — o suficiente pro déficit de {fmt(resultado.deficit)}
          </div>
          <div style={{fontSize:10,color:"#B45309",marginTop:4,fontStyle:"italic"}}>
            Ainda não tem botão de aplicar direto — ajuste manualmente pelo "Limite de Despesas Cotidianas" acima, se preferir esse caminho.
          </div>
        </div>}
      </div>}
    </div>}
  </div>;
}

function EmprestimosPassivos({data,onUpdate}){
  // [CORRIGIDO 10/07, 2a rodada -- causa real de verdade] a coluna
  // PARC_ATUAL de RECORRENCIAS conta quantas parcelas ja foram GERADAS no
  // Fluxo (o motor de recorrencia incrementa isso a cada virada) -- NUNCA
  // quantas ja foram de fato EXECUTADAS. Uma vez que todas as parcelas ja
  // estao agendadas (ATIVO vira N), esse numero trava igual ao total PRA
  // SEMPRE, mesmo que o tempo passe e as parcelas ainda nao tenham vencido
  // (confirmado com dado real: EMPRESTIMO 2 tinha PARC_ATUAL=3/3 na
  // RECORRENCIAS, mas no FLUXO a parcela "(3/3) - ULTIMA" ainda estava
  // PROGRAMADO, so a "(2/3)" tinha sido EXECUTADA). Corrigido: ignora
  // PARC_ATUAL de RECORRENCIAS pra esse calculo -- busca as parcelas de
  // verdade no FLUXO (elas carregam "(N/M)" na propria descricao) e conta
  // quantas ja EXECUTARAM ou ja passaram da data.
  const items=(data.recorr||[]).map((r,i)=>({
    idx:i,desc:r[0],valor:Number(r[1]),forma:r[2],
    diaVenc:r[3],parcAtual:r[4],parcTotal:r[5],
    ativo:r[6],tipo:r[7],obs:r[8],destino:r[9],tolerancia:r[10]
  }));

  const hj=hoje();
  const emprestimos=items.filter(it=>Number(it.parcTotal)>0&&String(it.destino||"FLUXO").toUpperCase()==="FLUXO").map(it=>{
    const baseUpper=String(it.desc||"").toUpperCase();
    const parcelas=(data.fluxo||[]).filter(r=>String(r.descricao||"").toUpperCase().indexOf(baseUpper)===0);
    let parcAtualReal=0,parcTotalReal=Number(it.parcTotal)||0,dataUltimaISO=null;
    const futuras=[]; // {data,valor} das parcelas ainda PROGRAMADO, pra projecao de ciclos
    if(parcelas.length){
      parcelas.forEach(r=>{
        const m=String(r.descricao).match(/\((\d+)\s*\/\s*(\d+)\)/);
        if(!m) return;
        const num=Number(m[1]);
        parcTotalReal=Number(m[2]);
        if(num===parcTotalReal) dataUltimaISO=r.data; // a propria linha da parcela final
        const jaPassou=r.status==="EXECUTADO"||r.data<=hj;
        if(jaPassou&&num>parcAtualReal) parcAtualReal=num;
        if(!jaPassou) futuras.push({data:r.data,valor:r.valor});
      });
    } else {
      // Nenhuma parcela encontrada no Fluxo (recorrencia acabou de ser
      // criada, ainda nao gerou nada) -- usa o que a RECORRENCIAS ja sabe.
      parcAtualReal=Number(it.parcAtual)||0;
    }
    const restantes=Math.max(0,parcTotalReal-parcAtualReal);
    if(!dataUltimaISO){
      const [ano,mes]=hj.split("-").map(Number);
      const dUlt=new Date(ano,mes-1+restantes,Math.min(Number(it.diaVenc)||1,28));
      dataUltimaISO=dUlt.getFullYear()+"-"+String(dUlt.getMonth()+1).padStart(2,"0")+"-"+String(dUlt.getDate()).padStart(2,"0");
    }
    return {...it,parcAtualReal,parcTotalReal,restantes,dataUltimaISO,futuras};
  }).sort((a,b)=>a.restantes-b.restantes); // menos parcelas faltando primeiro

  // Previsao pros proximos 2 ciclos: soma as parcelas (ja lancadas no Fluxo,
  // ainda PROGRAMADO) cuja data cai dentro da janela de cada ciclo -- nao
  // e estimativa, e o que ja esta agendado de verdade.
  const cicloInicio=data.config?.CICLO_INICIO;
  const projecaoCiclos=cicloInicio?[1,2].map(desl=>{
    const jan=janelaCiclo(cicloInicio,desl);
    const total=emprestimos.reduce((s,it)=>s+it.futuras.filter(f=>f.data>=jan.inicio&&f.data<=jan.fim).reduce((s2,f)=>s2+f.valor,0),0);
    return {desl,total};
  }):[];

  const dividasAtivas=(data.dividasPosFixadas||[]).filter(d=>d.status==="ATIVA");
  const dividasQuitadas=(data.dividasPosFixadas||[]).filter(d=>d.status==="QUITADA");
  const [showForm,setShowForm]=useState(false);
  const [showFormDPF,setShowFormDPF]=useState(false);
  const [showHistoricoDPF,setShowHistoricoDPF]=useState(false);
  const [loadTodas,setLoadTodas]=useState(false);

  async function atualizarTodasCDI(){
    setLoadTodas(true);
    try{
      const r=await api({action:"atualizarSaldoDividaPosFixada",todas:true});
      onUpdate&&onUpdate(r);
    }catch(e){alert(e.message);}
    setLoadTodas(false);
  }

  return <div style={{padding:12}}>
    <div style={{fontSize:11,fontWeight:800,color:C.textMuted,letterSpacing:".05em",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <span>EMPRÉSTIMOS E PASSIVOS</span>
      <button onClick={()=>setShowForm(v=>!v)}
        style={{background:showForm?C.borderLight:C.accent,color:showForm?C.textSub:"#fff",border:"none",borderRadius:6,padding:"5px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>
        {showForm?"Cancelar":"+ Criar empréstimo"}
      </button>
