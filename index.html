function DCPTab({data,onUpdate,onIrPara}){
  const fluxo=data.fluxo||[];
  const cartaoPF=data.cartaoPF||[];
  const cartaoPJ=data.cartaoPJ||[];
  const [expandido,setExpandido]=useState(null); // data (chave) do envelope aberto

  // Todos os envelopes (linhas DCP_PROVISAO) existentes, em ordem cronologica
  const envelopes=useMemo(()=>fluxo.filter(r=>r.categoria==="DCP_PROVISAO").sort((a,b)=>a.data<b.data?-1:1),[fluxo]);
  const porCiclo=useMemo(()=>{
    const m={};
    envelopes.forEach(e=>{ (m[e.ciclo]=m[e.ciclo]||[]).push(e); });
    return Object.entries(m);
  },[envelopes]);

  // Transacoes que pertencem a um envelope especifico (pela DATA-CHAVE exata,
  // nunca pelo texto "DCP N" sozinho -- o numero reinicia todo ciclo).
  function transacoesDoEnvelope(envData){
    const doFluxo=fluxo.filter(r=>r.categoria==="DCP"&&r.dcpEnvelopeData===envData)
      .map(r=>({row:r.row,descricao:r.descricao,valor:r.valor,data:r.data,status:r.status,origem:"fluxo"}));
    const doPF=cartaoPF.filter(r=>r[10]===envData).map(r=>({row:_linhaCartao(r),descricao:r[1],valor:r[2],data:r[0],status:r[7],origem:"cartaoPF"}));
    const doPJ=cartaoPJ.filter(r=>r[10]===envData).map(r=>({row:_linhaCartao(r),descricao:r[1],valor:r[2],data:r[0],status:r[7],origem:"cartaoPJ"}));
    return [...doFluxo,...doPF,...doPJ].sort((a,b)=>a.data<b.data?-1:1);
  }

  function irParaLancamento(t){
    if(t.origem==="fluxo") onIrPara({tab:t.status==="EXECUTADO"?"historico":"fluxo",row:t.row});
    else onIrPara({tab:"cartoes",row:t.row,cartao:t.origem==="cartaoPF"?"PF":"PJ"});
  }

  return <div>
    <DCPBaseEditor data={data} onUpdate={onUpdate}/>
    <EditorEnvelope data={data} onUpdate={onUpdate}/>
    <SugestaoReagendamento onUpdate={onUpdate}/>
    {!envelopes.length&&<div style={{padding:"40px 20px",textAlign:"center",color:C.textMuted,fontSize:14}}>Nenhum envelope DCP gerado ainda — toca "🔄 Gerar DCP" acima.</div>}
    {porCiclo.map(([ciclo,lista])=><div key={ciclo}>
      <div style={{padding:"10px 14px 4px",fontSize:12,fontWeight:700,color:C.accent,background:"#F9FAFB",borderBottom:"1px solid "+C.border}}>{ciclo}</div>
      {lista.map(env=>{
        const transacoes=transacoesDoEnvelope(env.data);
        const aberto=expandido===env.data;
        return <div key={env.data}>
          <div onClick={()=>setExpandido(aberto?null:env.data)} style={{cursor:"pointer"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"9px 14px",borderBottom:"1px solid "+C.borderLight,background:C.orangeLight}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:700,color:C.text}}>{nomeExibicao({categoria:"DCP_PROVISAO",descricao:env.descricao})}</div>
                <div style={{fontSize:10,color:C.textMuted,marginTop:1}}>{periodoDCP(env.data)} · {env.status==="EXECUTADO"?"fechado":"aberto"} · {transacoes.length} lançamento(s)</div>
              </div>
              <ValorDCPProvisao valor={env.valor} dataEnvelope={env.data}/>
              <span style={{fontSize:12,color:C.textMuted,flexShrink:0}}>{aberto?"▲":"▼"}</span>
            </div>
          </div>
          {aberto&&<div>
            {!transacoes.length&&<div style={{padding:"12px 20px",fontSize:12,color:C.textMuted,fontStyle:"italic",background:"#FAFAFA"}}>Nenhum lançamento contabilizado aqui ainda.</div>}
            {transacoes.map(t=><div key={t.origem+"-"+t.row} onClick={()=>irParaLancamento(t)}
              style={{display:"flex",alignItems:"center",gap:8,padding:"8px 14px 8px 26px",borderBottom:"1px solid "+C.borderLight,background:"#FAFAFA",cursor:"pointer"}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:600,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{t.descricao}</div>
                <div style={{fontSize:9,color:C.textMuted,marginTop:1}}>{fmtD(t.data)} · {t.origem==="fluxo"?"Fluxo":t.origem==="cartaoPF"?nomeCartao("PF",data):nomeCartao("PJ",data)} · {t.status}</div>
              </div>
              <span style={{fontSize:12,fontWeight:700,color:t.valor<0?C.red:C.blue}}>{fmt(t.valor)}</span>
              <span style={{fontSize:13,color:C.accent,flexShrink:0}}>→</span>
            </div>)}
          </div>}
        </div>;
      })}
    </div>)}
    <div style={{height:8}}/>
  </div>;
}

function Fluxo({data,onUpdate,destaque,onIrPara}){
  const [conf,setConf]=useState(null);
  const [val,setVal]=useState("");
  const [dt,setDt]=useState("");
  const [neg,setNeg]=useState(true);
  const [load,setLoad]=useState(null);
  const [novoPlantoes,setNovoPlantoes]=useState("");
  const [loadPlantoes,setLoadPlantoes]=useState(false);
  const [apelidoInput,setApelidoInput]=useState("");
  const [loadApelido,setLoadApelido]=useState(false);
  const [busca,setBusca]=useState("");
  const [mostrarCofres,setMostrarCofres]=useState(false);
  const hj=hoje();

  // Envelopes customizados: nome pra cada lancamento classificado + o
  // lancamento MAIS RECENTE de cada envelope carrega o saldo corrente
  // junto da etiqueta, como pedido (11/07) -- os demais so mostram o nome.
  const envelopesCustom=useMemo(()=>calcularEnvelopesCustom(data),[data.fluxo,data.cartaoPF,data.cartaoPJ,data.config]);
  const envelopesPorId=useMemo(()=>{const m={};envelopesCustom.forEach(e=>m[e.id]=e);return m;},[envelopesCustom]);
  const ultimoPorChave=useMemo(()=>{
    const m={};
    envelopesCustom.forEach(env=>{ const lista=env.periodicidade?(env.itensAtual||[]):env.itens; if(lista.length) m["fluxo:"+lista[0].row]={nome:env.nome,saldo:env.saldo}; });
    return m;
  },[envelopesCustom]);
  function infoEnvelopeItem(item){
    const envId=_obsEnvelopeId(item.obs);
    if(!envId||!envelopesPorId[envId]) return null;
    const ultimo=ultimoPorChave["fluxo:"+item.row];
    return {nome:envelopesPorId[envId].nome, saldo:ultimo?ultimo.saldo:null};
  }

  // Detecta se um item do Fluxo e uma linha de receita CALCULADA (gerada
  // pelo motor de Receitas Estruturadas) -- so essas tem "numero de
  // plantoes" pra editar. ESTAVEL (ex HDWC) nao tem esse conceito. Marcador
  // agora e "FONTE_RECEITA:NOME:MODOID:DATA" -- precisa achar o MODO exato
  // dentro da fonte (uma fonte pode ter varios modos, so um deles calculado).
  function fonteCalculadaDeItem(item){
    const m=String(item.obs||"").match(/FONTE_RECEITA:([A-Z0-9_]+):([A-Za-z0-9_]+):/);
    if(!m) return null;
    const fonte=(data.fontesReceita||[]).find(f=>String(f.nome||"").toUpperCase().replace(/[^A-Z0-9_]/g,"")===m[1]);
    if(!fonte) return null;
    const modo=(fonte.modos||[]).find(md=>md.id===m[2]);
    if(!modo||!modo.calculada) return null;
    const mp=String(item.descricao||"").match(/\(([\d.]+)\s+HORAS\)/);
    const horasAtual=mp?Number(mp[1]):null;
    const horasPorPlantao=Number(modo.horasPlantao)||12;
    const plantoesAtual=horasAtual?(horasAtual/horasPorPlantao):"";
    return {fonte:modo,plantoesAtual};
  }
  useEffect(()=>{
    if(destaque?.tab==="fluxo"&&destaque.row){
      const el=document.getElementById("fluxo-item-"+destaque.row);
      if(el) el.scrollIntoView({behavior:"smooth",block:"center"});
    }
  },[destaque]);

  const prog=useMemo(()=>(data.fluxo||[]).filter(r=>r.status==="PROGRAMADO").sort((a,b)=>a.data>b.data?1:-1),[data.fluxo]);

  // Gastos de cartao (PF/PJ) so pra EXIBIR no Fluxo -- puramente informativo,
  // pra Marcus achar "onde foi parar" uma compra de cartao sem precisar
  // lembrar que ela mora em Cartoes. NUNCA entra em totalDia/saldo aqui --
  // o impacto no saldo ja esta contado uma vez na linha agregada da FATURA,
  // contar de novo aqui duplicaria.
  const cartaoPorData=useMemo(()=>{
    const m={};
    const add=(r,cartao)=>{
      const dataCompra=r[0];
      if(!dataCompra||dataCompra<=hj) return; // so estritamente futuro -- hoje ja e "aconteceu", mora no Historico
      (m[dataCompra]=m[dataCompra]||[]).push({row:_linhaCartao(r),descricao:r[1],valor:r[2],cartao,status:r[7],dcpEnvelope:r[9]||null,dcpEnvelopeData:r[10]||null});
    };
    (data.cartaoPF||[]).forEach(r=>add(r,"PF"));
    (data.cartaoPJ||[]).forEach(r=>add(r,"PJ"));
    return m;
  },[data.cartaoPF,data.cartaoPJ,hj]);

  const grupos=useMemo(()=>{
    const m={};
    prog.forEach(r=>{if(!m[r.data])m[r.data]=[];m[r.data].push(r);});
    Object.keys(cartaoPorData).forEach(d=>{if(!m[d])m[d]=[];}); // dia so-de-cartao tambem vira grupo
    return Object.entries(m).sort((a,b)=>a[0]>b[0]?1:-1);
  },[prog,cartaoPorData]);

  // Saldo real de hoje -- semente do "arrasta pra frente" abaixo, pro
  // PRIMEIRO dia da lista ja poder mostrar saldo mesmo se ele so tiver
  // gasto de cartao (sem nenhum lancamento de Fluxo proprio naquele dia).
  const saldoHoje=useMemo(()=>{
    const ex=(data.fluxo||[]).filter(r=>r.status==="EXECUTADO"&&r.data<=hj).sort((a,b)=>a.data>b.data?1:-1);
    return ex.length?ex[ex.length-1].saldoReal:null;
  },[data.fluxo,hj]);

  // Um dia sem lancamento de Fluxo (so cartao, ou nada) nao muda o saldo --
  // ele "herda" o saldo de fim do ultimo dia conhecido. Sem isso, um dia
  // assim ficava sem NENHUM saldo mostrado, e o destaque de "amanha" saltava
  // pro proximo dia que tivesse lancamento, dando a impressao de bug.
  const gruposComSaldo=useMemo(()=>{
    let ultimo=saldoHoje;
    return grupos.map(([gdt,itens])=>{
      if(itens.length) ultimo=itens[itens.length-1].saldoProjetado;
      const totalDia=itens.reduce((s,r)=>s+(r.valor||0),0);
      const spIni=(ultimo!=null&&isFinite(ultimo))?(ultimo-totalDia):null;
      return {gdt,itens,spIni};
    });
  },[grupos,saldoHoje]);
  const primeiroIdxComSaldo=useMemo(()=>gruposComSaldo.findIndex(g=>g.spIni!=null),[gruposComSaldo]);

  // [13/07] Busca em Previsão, pedida junto com o conserto da busca do
  // Histórico. IMPORTANTE: filtra só na hora de EXIBIR, depois que
  // gruposComSaldo já calculou o saldo de cada dia -- o saldo depende da
  // sequência COMPLETA e sem cortes (arrasta pra frente dia a dia). Filtrar
  // os itens ANTES desse cálculo quebraria o saldo mostrado. Também filtra
  // as compras de cartão (mesmo bug do Histórico corrigido aqui de uma vez).
  const gruposExibidos=useMemo(()=>{
    const b=busca.trim().toUpperCase();
    if(!b) return gruposComSaldo.map(g=>({...g,itensExibir:g.itens,cartaoExibir:cartaoPorData[g.gdt]||[]}));
    return gruposComSaldo
      .map(g=>({
        ...g,
        itensExibir:g.itens.filter(item=>String(item.descricao||"").toUpperCase().includes(b)||String(item.categoria||"").toUpperCase().includes(b)),
        cartaoExibir:(cartaoPorData[g.gdt]||[]).filter(c=>String(c.descricao||"").toUpperCase().includes(b))
      }))
      .filter(g=>g.itensExibir.length||g.cartaoExibir.length);
  },[gruposComSaldo,cartaoPorData,busca]);

  function abrir(item){setConf(item.row);setVal(formatarValorInicial(item.valor));setDt(item.data);setNeg(item.valor<0);setNovoPlantoes("");
    let obsI={};try{obsI=JSON.parse(item.obs||"{}");}catch(e){}
    setApelidoInput(obsI.apelido||"");
  }
  async function salvarApelidoFluxo(item){
    setLoadApelido(true);
    try{ onUpdate(await api({action:"editarApelidoItem",aba:"FLUXO",row:item.row,apelido:apelidoInput})); }
    catch(e){ alert(e.message); }
    setLoadApelido(false);
  }

  async function confirmar(){
    setLoad(conf);
    try{
      const execMode=dt<=hj;
      const origItem=prog.find(r=>r.row===conf);
      const sinal=neg?-1:1;
      if(execMode){
        onUpdate(await api({action:"baixa",row:conf,valorReal:numBR(val)*sinal,dataReal:dt}));
      } else {
        await api({action:"editar",row:conf,campo:"DATA",valor:dt});
        if(origItem&&String(Math.abs(origItem.valor))!==val){
          await api({action:"editar",row:conf,campo:"VALOR",valor:String(numBR(val)*sinal)});
        }
        onUpdate(await api({action:"getData"}));
      }
    }catch(e){alert(e.message);}
    setLoad(null);setConf(null);
  }

  async function apagar(item){
    if(!confirm("Apagar \""+item.descricao+"\" definitivamente?"))return;
    setLoad(item.row);
    try{ onUpdate(await api({action:"deletar",row:item.row})); setConf(null); }
    catch(e){ alert(e.message); }
    setLoad(null);
  }

  async function apagarTodosComEssaDescricao(item){
    if(!confirm("Apagar TODOS os lançamentos futuros ainda programados com a descrição \""+item.descricao+"\"? Executados/histórico não são tocados."))return;
    setLoad(item.row);
    try{
      const r=await api({action:"deletarPorDescricao",aba:"FLUXO",descricao:item.descricao,apenasFuturas:false,apenasProgramadas:true});
      onUpdate(r);
      setConf(null);
      alert((r.apagados||0)+" lançamento(s) apagado(s).");
    }catch(e){ alert(e.message); }
    setLoad(null);
  }

  // Corrige so o numero de plantoes de UM mes especifico (sem mexer na
  // regra nem nas outras linhas) -- pro caso comum de "esse mes fiz
  // mais/menos plantoes que o normal" (doou plantao, cobriu de colega
  // etc). O backend recalcula o valor usando a config atual da fonte
  // (valor-hora e aliquota nunca mudam por causa disso, so a contagem).
  async function recalcularPlantoes(item){
    const n=Number(novoPlantoes);
    if(!novoPlantoes||!isFinite(n)||n<0){ alert("Informe um número de plantões válido."); return; }
    setLoadPlantoes(true);
    try{
      const r=await api({action:"editarPlantoesReceita",row:item.row,plantoes:n});
      onUpdate(r);
      setConf(null);
    }catch(e){alert(e.message);}
    setLoadPlantoes(false);
  }

  if(!prog.length) return <div>
    <div style={{padding:"40px 20px",textAlign:"center",color:C.textMuted,fontSize:14}}>
      Nenhum lançamento programado.
      <BotaoLancar data={data} onUpdate={onUpdate}/>
    </div>
  </div>;

  const execMode=dt<=hj;

  return <div>
    <div style={{padding:"10px 14px"}}>
      <input type="text" value={busca} onChange={e=>setBusca(e.target.value)} placeholder="🔍 Buscar por descrição ou categoria"
        style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid "+C.border,fontSize:13,fontFamily:"inherit",boxSizing:"border-box"}}/>
    </div>
    {busca.trim()&&!gruposExibidos.length&&<div style={{padding:"20px 14px",textAlign:"center",color:C.textMuted,fontSize:13}}>Nada encontrado para "{busca}".</div>}
    {gruposExibidos.map(({gdt,itensExibir,cartaoExibir,spIni},gi)=>{const at=gdt<hj,sp=spIni,ehPrimeiro=!busca.trim()&&gi===primeiroIdxComSaldo;return <div key={gdt}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 14px 4px",background:"#F9FAFB",borderBottom:"1px solid "+C.border,borderLeft:at?"3px solid "+C.red:"none"}}>
        <span style={{fontSize:12,fontWeight:700,color:at?C.red:C.accent}}>{at?"⚠ ATRASADO · ":""}{fmtD(gdt)} · {diaSemana(gdt)}</span>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          {ehPrimeiro&&(data.cofres||[]).length>0&&<button onClick={()=>setMostrarCofres(v=>!v)}
            style={{background:"none",border:"none",fontSize:14,cursor:"pointer",padding:2,lineHeight:1}} title="Ver Cofres">
            🏦
          </button>}
          {sp!=null&&isFinite(sp)&&<span style={sp<0?{fontSize:ehPrimeiro?18:15,fontWeight:800,fontStyle:ehPrimeiro?"italic":"normal",color:C.red,background:C.redLight,padding:"2px 7px",borderRadius:5}:{fontSize:ehPrimeiro?17:14,fontWeight:ehPrimeiro?800:700,fontStyle:ehPrimeiro?"italic":"normal",color:C.blue}}>{"→ "+fmt(sp)}</span>}
        </div>
      </div>
      {ehPrimeiro&&mostrarCofres&&(data.cofres||[]).length>0&&(()=>{
        const totalCofres=(data.cofres||[]).reduce((s,c)=>s+c.saldo,0);
        return <div style={{background:C.tealLight,padding:"10px 14px",borderBottom:"1px solid #99F6E4"}}>
          <div style={{fontSize:10,fontWeight:800,color:C.teal,letterSpacing:".05em",marginBottom:6}}>🏦 SEUS COFRES</div>
          {(data.cofres||[]).map(c=><div key={c.id} style={{display:"flex",justifyContent:"space-between",fontSize:12,color:C.text,padding:"2px 0"}}>
            <span>{c.nome}</span><span style={{fontWeight:700}}>{fmt(c.saldo)}</span>
          </div>)}
          <div style={{borderTop:"1px solid #99F6E4",marginTop:6,paddingTop:6}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.textMuted}}>
              <span>Saldo na conta (já mostrado acima)</span><span>{fmt(sp)}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.textMuted}}>
              <span>Total guardado nos Cofres</span><span>{fmt(totalCofres)}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:13,fontWeight:800,color:C.teal,marginTop:4}}>
              <span>Patrimônio total</span><span>{fmt(sp+totalCofres)}</span>
            </div>
          </div>
        </div>;
      })()}
      {itensExibir.map(item=>{const isOpen=conf===item.row;
        const ehFatura=item.tipo==="CARTAO PF"||item.tipo==="CARTAO PJ";
        const {cor:corItem,selo,bg:bgItem,descCor,confirmadoExtrato}=corDoItem(item,hj);
        const destacado=destaque?.tab==="fluxo"&&destaque.row===item.row;
        return <div key={item.row} id={"fluxo-item-"+item.row}>
        <div style={{display:"flex",alignItems:"center",gap:8,padding:"9px 14px",borderBottom:"1px solid "+C.borderLight,background:destacado?"#FEF3C7":(bgItem||C.surface),transition:"background 1s",
          borderLeft:corItem?"3px solid "+corItem:"none"}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,fontWeight:600,color:descCor||C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{nomeExibicao(item,data)}{selo&&<span style={{marginLeft:6,fontSize:9,fontWeight:700,color:corItem}}>{selo}</span>}{confirmadoExtrato&&<span style={{marginLeft:6,fontSize:9,background:C.greenLight,color:C.green,padding:"1px 6px",borderRadius:8,fontWeight:700}}>✅ Extrato</span>}</div>
            <div style={{fontSize:10,color:C.textMuted,marginTop:1}}>{item.categoria==="DCP_PROVISAO"?periodoDCP(item.data):(<>{tipoDisplay(item.tipo,data)}{item.categoria&&item.categoria!==item.tipo?" · "+item.categoria:""} · {item.forma}</>)}<TagEnvelopeDCP envelope={item.categoria!=="DCP_PROVISAO"?item.dcpEnvelope:null} futuro={item.status==="PROGRAMADO"}/>{(()=>{const ie=infoEnvelopeItem(item);return ie?<TagEnvelopeCustom nome={ie.nome} saldo={ie.saldo}/>:null;})()}</div>
          </div>
          {item.categoria==="DCP_PROVISAO"?<ValorDCPProvisao valor={item.valor} dataEnvelope={item.data}/>:<span style={{fontWeight:700,color:item.valor<0?C.red:C.blue,flexShrink:0,fontSize:12}}>{fmt(item.valor)}</span>}
          <button onClick={()=>abrir(item)} disabled={!!load}
            style={{background:C.borderLight,color:C.textSub,borderRadius:8,padding:"6px 12px",fontSize:18,border:"1px solid "+C.border,fontWeight:400,cursor:"pointer",flexShrink:0,lineHeight:1}}>
            {load===item.row?"…":"⋮"}
          </button>
        </div>
        {isOpen&&<div style={{background:execMode?C.greenLight:C.accentLight,padding:"10px 14px",
          borderBottom:"1px solid "+(execMode?"#BBF7D0":C.accent),
          borderLeft:"3px solid "+(execMode?C.green:C.accent)}}>
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            <div style={{display:"flex",flexDirection:"column",gap:3,flex:1}}>
              <span style={{fontSize:10,color:execMode?"#166534":"#92400E",fontWeight:600,letterSpacing:".05em"}}>{execMode?"DATA DE EXECUÇÃO":"NOVA DATA"}</span>
              <input type="date" value={dt} onChange={e=>setDt(e.target.value)}
                style={{padding:"5px 8px",borderRadius:6,border:"1px solid "+(execMode?"#86EFAC":C.accent),fontSize:13,fontFamily:"inherit",width:"100%"}}/>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:3,flex:1}}>
              <span style={{fontSize:10,color:execMode?"#166534":"#92400E",fontWeight:600,letterSpacing:".05em"}}>VALOR</span>
              <div style={{display:"flex",gap:4}}>
                <button type="button" onClick={()=>setNeg(n=>!n)}
                  style={{width:30,flexShrink:0,borderRadius:6,border:"1px solid "+(execMode?"#86EFAC":C.accent),
                    background:neg?C.redLight:C.blueLight,color:neg?C.red:C.blue,fontWeight:800,fontSize:14,cursor:"pointer"}}>
                  {neg?"−":"+"}
                </button>
                <input type="text" inputMode="numeric" value={val} onChange={e=>setVal(formatarMoedaInput(e.target.value))}
                  style={{padding:"5px 8px",borderRadius:6,border:"1px solid "+(execMode?"#86EFAC":C.accent),fontSize:13,textAlign:"right",width:"100%"}}/>
              </div>
            </div>
          </div>
          {ehFatura&&execMode&&neg&&numBR(val)<Math.abs(item.valor)-0.01&&<div style={{fontSize:10,color:"#92400E",marginBottom:8,fontStyle:"italic"}}>
            Pagamento parcial — o restante (R$ {(Math.abs(item.valor)-numBR(val)).toFixed(2).replace(".",",")}) vira um novo lançamento no Fluxo, na mesma data, editável normalmente.
          </div>}
          {item.categoria==="DCP_PROVISAO"&&execMode&&<div style={{fontSize:10,color:"#92400E",background:C.accentLight,borderRadius:6,padding:"6px 8px",marginBottom:8}}>
            Fechamento de semana DCP: a sobra/estouro é redistribuída automaticamente entre as próximas segundas e a linha fecha em R$ 0,00 no Histórico — o valor digitado acima é ignorado. Feche as semanas em ordem (a mais antiga primeiro).
          </div>}
          {(()=>{const fc=fonteCalculadaDeItem(item); if(!fc) return null; return <div style={{background:"#fff",border:"1px dashed "+C.teal,borderRadius:6,padding:8,marginBottom:8}}>
            <div style={{fontSize:10,color:C.teal,fontWeight:700,marginBottom:4}}>PLANTÕES DIFERENTES ESSE MÊS?</div>
            <div style={{fontSize:10,color:C.textMuted,marginBottom:6}}>Valor/hora e alíquota continuam os mesmos da fonte — só a contagem muda.</div>
            <div style={{display:"flex",gap:6}}>
              <input type="number" min="0" step="1" placeholder={"Atual: "+(fc.plantoesAtual||"?")} value={novoPlantoes}
                onChange={e=>setNovoPlantoes(e.target.value)}
                style={{flex:1,padding:"6px 8px",borderRadius:6,border:"1px solid "+C.border,fontSize:13,fontFamily:"inherit"}}/>
              <button onClick={()=>recalcularPlantoes(item)} disabled={loadPlantoes||!novoPlantoes}
                style={{background:C.teal,color:"#fff",border:"none",borderRadius:6,padding:"0 12px",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                {loadPlantoes?"…":"Recalcular"}
              </button>
            </div>
          </div>;})()}
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <span style={{flex:1,fontSize:11,color:execMode?"#166534":"#92400E"}}>
              {execMode?"→ Vai para o Histórico":"→ Permanece no Fluxo com nova data"}
            </span>
            <button onClick={confirmar} disabled={!!load}
              style={{background:execMode?C.green:C.accent,color:"#fff",borderRadius:6,padding:"6px 16px",fontSize:12,fontWeight:700,border:"none",cursor:"pointer",flexShrink:0}}>
              {load?("…"):execMode?"Executar":"Reagendar"}
            </button>
            <button onClick={()=>setConf(null)}
              style={{background:C.borderLight,color:C.textSub,borderRadius:6,padding:"6px 10px",fontSize:12,border:"none",cursor:"pointer",flexShrink:0}}>
              Cancelar
            </button>
          </div>
          {item.categoria!=="DCP_PROVISAO"&&String(item.obs||"").indexOf("FONTE_RECEITA")<0&&
            <SeletorEnvelopeItem aba="FLUXO" row={item.row} obsAtual={item.obs} data={data} onUpdate={onUpdate}/>}
          {item.categoria!=="DCP_PROVISAO"&&<div style={{marginTop:8,marginBottom:4}}>
            <span style={{fontSize:10,color:"#92400E",fontWeight:600,letterSpacing:".05em"}}>NOME DE EXIBIÇÃO (opcional)</span>
            <div style={{display:"flex",gap:6,marginTop:3}}>
              <input value={apelidoInput} onChange={e=>setApelidoInput(e.target.value.toUpperCase())}
                placeholder={item.descricao}
                style={{flex:1,padding:"5px 8px",borderRadius:6,border:"1px solid "+C.accent,fontSize:12,fontFamily:"inherit"}}/>
              <button onClick={()=>salvarApelidoFluxo(item)} disabled={loadApelido}
                style={{padding:"5px 10px",borderRadius:6,background:C.accent,color:"#fff",fontSize:11,fontWeight:700,border:"none",cursor:"pointer",fontFamily:"inherit"}}>
                {loadApelido?"…":"Salvar"}
              </button>
            </div>
            {(()=>{const cands=apelidosCandidatos(item.descricao,data);
              return cands.length>1&&<div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:5}}>
                <span style={{fontSize:9,color:C.textMuted,width:"100%"}}>Esse texto bate com mais de uma regra salva — escolhe qual vale aqui:</span>
                {cands.map((c,ci)=><button key={ci} onClick={()=>setApelidoInput(c.apelido)}
                  style={{fontSize:10,padding:"3px 8px",borderRadius:12,border:"1px solid "+C.accent,background:apelidoInput===c.apelido?C.accent:"transparent",color:apelidoInput===c.apelido?"#fff":C.accent,cursor:"pointer",fontFamily:"inherit"}}>
                  {c.apelido}
                </button>)}
              </div>;
            })()}
          </div>}
          {ehFatura&&<button onClick={async()=>{setLoad(item.row);try{onUpdate(await api({action:"mesclarFaturaComSeguinte",row:item.row}));}catch(e){alert(e.message);}setLoad(null);setConf(null);}} disabled={!!load}
            style={{width:"100%",marginTop:8,padding:"6px",borderRadius:6,background:"transparent",color:"#92400E",fontSize:11,border:"1px dashed #FED7AA",cursor:"pointer",fontFamily:"inherit"}}>
            🔀 Em vez disso, somar esse valor direto na próxima fatura
          </button>}
          <button onClick={()=>apagar(item)} disabled={!!load}

              style={{width:"100%",marginTop:6,padding:"6px",borderRadius:6,background:"transparent",color:C.red,fontSize:10,border:"1px dashed #FECACA",cursor:"pointer",fontFamily:"inherit"}}>
              🗑 Apagar TODOS os "{item.descricao}" futuros (Fluxo)
            </button>
            {(data.recorr||[]).some(r=>String(r[0]).toUpperCase()===String(item.descricao).toUpperCase()&&String(r[6]).toUpperCase()==="S")&&
              <button onClick={()=>onIrPara&&onIrPara({tab:"recorr"})}
                style={{width:"100%",marginTop:6,padding:"6px",borderRadius:6,background:"transparent",color:C.blue,fontSize:10,border:"1px dashed "+C.blue,cursor:"pointer",fontFamily:"inherit"}}>
                🔁 Gerenciar/apagar esta recorrência
              </button>}
          </>
          }
        </div>}
      </div>;})}
      {cartaoExibir.map(c=><div key={"cart-"+c.cartao+"-"+c.row}
        onClick={()=>onIrPara&&onIrPara({tab:"cartoes",row:c.row,cartao:c.cartao})}
        style={{display:"flex",alignItems:"center",gap:8,padding:"8px 14px",borderBottom:"1px solid "+C.borderLight,
          background:C.borderLight,opacity:0.8,cursor:onIrPara?"pointer":"default"}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:600,color:C.textMuted,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",fontStyle:"italic"}}>{c.descricao}</div>
          <div style={{fontSize:10,color:C.textMuted,marginTop:1}}>🏷 Cartão {c.cartao} · não conta aqui, já está na fatura<TagEnvelopeDCP envelope={c.dcpEnvelope} futuro={true}/></div>
        </div>
        <span style={{fontSize:13,fontWeight:700,color:C.textMuted,flexShrink:0}}>{fmt(c.valor)}</span>
        <span style={{fontSize:12,color:C.textMuted,flexShrink:0}}>→</span>
      </div>)}
    </div>;})}
    <BotaoLancar data={data} onUpdate={onUpdate}/>
  </div>;
}


// ── HISTÓRICO ─────────────────────────────────────────────────────────────────
function Historico({data,onUpdate,destaque,onIrPara}){
  const hj=hoje();
  useEffect(()=>{
    if(destaque?.tab==="historico"&&destaque.row){
      const el=document.getElementById("hist-item-"+destaque.row);
      if(el) el.scrollIntoView({behavior:"smooth",block:"center"});
    }
  },[destaque]);
  const [conf,setConf]=useState(null);
  const [desc,setDesc]=useState("");
  const [val,setVal]=useState("");
  const [neg,setNeg]=useState(true);
  const [dt,setDt]=useState("");
  const [categoria,setCategoria]=useState("");
  const [vincularRegraCategoria,setVincularRegraCategoria]=useState(false);
  const [load,setLoad]=useState(false);
  const [busca,setBusca]=useState("");
  const [limite,setLimite]=useState(30);

  const envelopesCustom=useMemo(()=>calcularEnvelopesCustom(data),[data.fluxo,data.cartaoPF,data.cartaoPJ,data.config]);
  const envelopesPorId=useMemo(()=>{const m={};envelopesCustom.forEach(e=>m[e.id]=e);return m;},[envelopesCustom]);
  const ultimoPorChave=useMemo(()=>{
    const m={};
    envelopesCustom.forEach(env=>{ const lista=env.periodicidade?(env.itensAtual||[]):env.itens; if(lista.length) m["fluxo:"+lista[0].row]={nome:env.nome,saldo:env.saldo}; });
    return m;
  },[envelopesCustom]);
  function infoEnvelopeItem(item){
    const envId=_obsEnvelopeId(item.obs);
    if(!envId||!envelopesPorId[envId]) return null;
    const ultimo=ultimoPorChave["fluxo:"+item.row];
    return {nome:envelopesPorId[envId].nome, saldo:ultimo?ultimo.saldo:null};
  }

  const CATEGORIAS=["DCP","DESPESA FIXA","RECEITA","DEPOSITO_AVULSO","DIVIDA_PARCELADA","DIVIDA_NAO_PARCELADA","EXTRAORDINARIA","IMPOSTO","INVESTIMENTO"];
  const ehFaturaCartao=item=>item.categoria==="CARTAO PF"||item.categoria==="CARTAO PJ"||item.tipo==="CARTAO PF"||item.tipo==="CARTAO PJ";

  const todos=useMemo(()=>(data.fluxo||[]).filter(r=>r.status==="EXECUTADO").sort((a,b)=>a.data<b.data?1:-1),[data.fluxo]);
  const filtrados=useMemo(()=>{
    if(!busca.trim())return todos;
    const b=busca.toUpperCase();
    return todos.filter(r=>String(r.descricao||"").toUpperCase().includes(b)||String(r.categoria||"").toUpperCase().includes(b));
  },[todos,busca]);
  // [CORRIGIDO 13/07] antes cortava por CONTAGEM BRUTA de itens (slice
  // simples) -- se um dia tivesse muitos lancamentos (ex: virada de ciclo
  // com varios emprestimos/pensoes de uma vez), o corte caia NO MEIO
  // daquele dia. Resultado: "Carregar mais" parecia so acrescentar itens
  // num dia que ja estava na tela, em vez de revelar dias novos mais atras
  // -- confuso, relatado pelo Marcus. Agora sempre estica o corte pra
  // incluir o dia inteiro antes de parar, nunca corta um dia ao meio.
  const ex=useMemo(()=>{
    const corte=filtrados.slice(0,limite);
    if(!corte.length||corte.length>=filtrados.length) return corte;
    const ultimaData=corte[corte.length-1].data;
    let fim=corte.length;
    while(fim<filtrados.length&&filtrados[fim].data===ultimaData) fim++;
    return filtrados.slice(0,fim);
  },[filtrados,limite]);

  // Gastos de cartao ja acontecidos (hoje ou antes) -- mesmo recurso do
  // Fluxo, so que aqui pega o que ja passou (Fluxo pega so o estritamente
  // futuro). Puramente informativo, nunca conta em nenhum saldo aqui.
  const cartaoPorData=useMemo(()=>{
    const m={};
    const add=(r,cartao)=>{
      const dataCompra=r[0];
      if(!dataCompra||dataCompra>hj) return;
      (m[dataCompra]=m[dataCompra]||[]).push({row:_linhaCartao(r),descricao:r[1],valor:r[2],cartao,status:r[7],dcpEnvelope:r[9]||null,dcpEnvelopeData:r[10]||null});
    };
    (data.cartaoPF||[]).forEach(r=>add(r,"PF"));
    (data.cartaoPJ||[]).forEach(r=>add(r,"PJ"));
    return m;
  },[data.cartaoPF,data.cartaoPJ,hj]);
  // [CORRIGIDO 13/07] a busca nunca filtrava as compras de cartao (o bloco
  // esmaecido "nao conta aqui, ja esta na fatura") -- so os lancamentos
  // normais. Resultado: buscar "PSICOL" ainda trazia o dia inteiro de
  // qualquer compra de cartao sem nenhuma relacao, so porque aquele dia
  // tinha ALGUMA compra -- parecia que a busca "nao funcionava". Agora as
  // compras de cartao tambem passam pelo mesmo filtro de texto.
  const cartaoPorDataFiltrado=useMemo(()=>{
    if(!busca.trim()) return cartaoPorData;
    const b=busca.toUpperCase();
    const m={};
    Object.entries(cartaoPorData).forEach(([d,itens])=>{
      const f=itens.filter(c=>String(c.descricao||"").toUpperCase().includes(b));
      if(f.length) m[d]=f;
    });
    return m;
  },[cartaoPorData,busca]);

  const grupos=useMemo(()=>{
    const m={};
    ex.forEach(item=>{ (m[item.data]=m[item.data]||[]).push(item); });
    Object.keys(cartaoPorDataFiltrado).forEach(d=>{if(!m[d])m[d]=[];});
    return Object.entries(m).sort((a,b)=>a[0]<b[0]?1:-1);
  },[ex,cartaoPorDataFiltrado]);

  function abrir(item){
    setConf(item.row); setDesc(item.descricao);
    setVal(formatarValorInicial(item.valor)); setNeg(item.valor<0);
    setDt(item.data); setCategoria(item.categoria||"");
    setVincularRegraCategoria(false);
  }

  async function salvar(item){
    setLoad(true);
    try{
      let r;
      if(desc.toUpperCase()!==item.descricao) r=await api({action:"editar",row:item.row,campo:"DESCRICAO",valor:desc});
      const novoValor=(neg?-1:1)*numBR(val);
      if(Math.abs(novoValor-item.valor)>0.005) r=await api({action:"editar",row:item.row,campo:"VALOR",valor:novoValor});
      if(dt!==item.data) r=await api({action:"editar",row:item.row,campo:"DATA",valor:dt});
      if(!ehFaturaCartao(item)&&categoria!==(item.categoria||"")){
        r=await api({action:"editar",row:item.row,campo:"CATEGORIA",valor:categoria});
        // [15/07] TIPO sempre acompanha CATEGORIA aqui -- nenhuma categoria
        // fora DCP pode ser DCP por conceito (Extraordinária, Despesa Fixa
        // etc. nunca sao "cotidianas"), entao editar a categoria tem que
        // mover o lancamento pra fora (ou pra dentro) do consumo semanal de
        // DCP de verdade, nao so trocar o rotulo visivel. Sem isso, um
        // lancamento reclassificado de DCP pra outra categoria continuava
        // contando no orcamento semanal por baixo (TIPO antigo nunca mudava).
        r=await api({action:"editar",row:item.row,campo:"TIPO",valor:tipoDaCategoria(categoria)});
        // [NOVO 20/07] Vincula esse texto a essa categoria como regra
        // permanente, se marcado -- Conciliação de Extrato passa a avisar
        // se um item futuro com o mesmo texto vier classificado diferente.
        if(vincularRegraCategoria){
          r=await api({action:"vincularCategoriaRegra",descricao:item.descricao,categoria:categoria});
        }
      }
      if(r) onUpdate(r);
      setConf(null);
    }catch(e){ alert(e.message); }
    setLoad(false);
  }

  async function apagar(item){
    if(!confirm("Apagar \""+item.descricao+"\" definitivamente?")) return;
    setLoad(true);
    try{ onUpdate(await api({action:"deletar",row:item.row})); setConf(null); }
    catch(e){ alert(e.message); }
    setLoad(false);
  }

  return <div style={{paddingBottom:8}}>
    <div style={{padding:"10px 14px",background:"#F9FAFB",borderBottom:"1px solid "+C.border}}>
      <input type="text" value={busca} onChange={e=>{setBusca(e.target.value);setLimite(30);}}
        placeholder="🔎 Buscar por descrição ou categoria..."
        style={{width:"100%",padding:"7px 10px",borderRadius:8,border:"1px solid "+C.border,fontSize:13,fontFamily:"inherit",boxSizing:"border-box",background:C.surface}}/>
    </div>
    {!ex.length&&<div style={{padding:"40px 20px",textAlign:"center",color:C.textMuted,fontSize:14}}>{busca?"Nenhum resultado pra essa busca.":"Nenhum lançamento executado."}</div>}
    {grupos.map(([gdt,itens])=>{
      const totalDia=itens.reduce((s,r)=>s+(r.valor||0),0);
      const spFim=itens.length?itens[0].saldoReal:null;
      const spIni=(spFim!=null&&isFinite(spFim))?(spFim-totalDia):null;
      return <div key={gdt}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 14px 4px",background:"#F9FAFB",borderBottom:"1px solid "+C.border}}>
          <span style={{fontSize:12,fontWeight:700,color:C.accent}}>{fmtD(gdt)} · {diaSemana(gdt)}</span>
          {spIni!=null&&isFinite(spIni)&&<span style={spIni<0?{fontSize:15,fontWeight:800,color:C.red,background:C.redLight,padding:"2px 7px",borderRadius:5}:{fontSize:14,fontWeight:700,color:C.blue}}>{"→ "+fmt(spIni)}</span>}
        </div>
        {itens.map(item=>{const {cor:corItem,selo,bg:bgItem,descCor,confirmadoExtrato}=corDoItem(item,hj);const isOpen=conf===item.row;const destacado=destaque?.tab==="historico"&&destaque.row===item.row;return <div key={item.row} id={"hist-item-"+item.row}>
          <div style={{display:"flex",alignItems:"center",gap:8,padding:"9px 14px",borderBottom:isOpen?"none":"1px solid "+C.borderLight,background:destacado?"#FEF3C7":(bgItem||C.surface),transition:"background 1s",
            borderLeft:corItem?"3px solid "+corItem:"none"}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:600,color:descCor||C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{nomeExibicao(item,data)}{selo&&<span style={{marginLeft:6,fontSize:9,fontWeight:700,color:corItem}}>{selo}</span>}{confirmadoExtrato&&<span style={{marginLeft:6,fontSize:9,background:C.greenLight,color:C.green,padding:"1px 6px",borderRadius:8,fontWeight:700}}>✅ Extrato</span>}</div>
              <div style={{fontSize:10,color:C.textMuted,marginTop:1}}>{item.categoria==="DCP_PROVISAO"?periodoDCP(item.data):(<>{tipoDisplay(item.tipo,data)}{item.categoria&&item.categoria!==item.tipo?" · "+item.categoria:""}</>)}<TagEnvelopeDCP envelope={item.categoria!=="DCP_PROVISAO"?item.dcpEnvelope:null} futuro={false}/>{(()=>{const ie=infoEnvelopeItem(item);return ie?<TagEnvelopeCustom nome={ie.nome} saldo={ie.saldo}/>:null;})()}</div>
            </div>
            {item.categoria==="DCP_PROVISAO"?<ValorDCPProvisao valor={item.valor} dataEnvelope={item.data}/>:<span style={{fontWeight:700,color:item.valor<0?C.red:C.blue,flexShrink:0,fontSize:12}}>{fmt(item.valor)}</span>}
            <button onClick={()=>isOpen?setConf(null):abrir(item)}
              style={{color:C.textSub,padding:"4px 8px",fontSize:14,background:isOpen?C.borderLight:"none",border:"1px solid "+C.border,borderRadius:5,cursor:"pointer",flexShrink:0}}>⋮</button>
          </div>
          {isOpen&&<div style={{background:C.accentLight,padding:"10px 14px",borderBottom:"1px solid "+C.borderLight,borderLeft:"3px solid "+C.accent}}>
            <input type="text" value={desc} onChange={e=>setDesc(e.target.value)}
              style={{width:"100%",padding:"7px 9px",borderRadius:6,border:"1px solid "+C.accent,fontSize:13,fontFamily:"inherit",marginBottom:6,background:C.surface,boxSizing:"border-box"}}/>
            <div style={{display:"grid",gridTemplateColumns:"30px 1fr 1fr",gap:6,marginBottom:6}}>
              <button type="button" onClick={()=>setNeg(n=>!n)}
                style={{width:30,borderRadius:6,border:"1px solid "+C.accent,
                  background:neg?C.redLight:C.blueLight,color:neg?C.red:C.blue,fontWeight:800,fontSize:14,cursor:"pointer"}}>
                {neg?"−":"+"}
              </button>
              <input type="text" inputMode="numeric" value={val} onChange={e=>setVal(formatarMoedaInput(e.target.value))}
                style={{padding:"5px 8px",borderRadius:6,border:"1px solid "+C.accent,fontSize:13,textAlign:"right",width:"100%",boxSizing:"border-box",background:C.surface}}/>
              <input type="date" value={dt} onChange={e=>setDt(e.target.value)}
                style={{padding:"5px 8px",borderRadius:6,border:"1px solid "+C.accent,fontSize:12,width:"100%",boxSizing:"border-box",background:C.surface}}/>
            </div>
            {!ehFaturaCartao(item)&&<div style={{marginBottom:8}}>
              <select value={categoria} onChange={e=>setCategoria(e.target.value)}
                style={{width:"100%",padding:"6px 8px",borderRadius:6,border:"1px solid "+(categoria?C.accent:C.red),fontSize:13,fontFamily:"inherit",background:C.surface}}>
                <option value="">Escolha uma categoria...</option>
                {CATEGORIAS.map(c=><option key={c} value={c}>{CAT_LABEL[c]||c}</option>)}
              </select>
              {categoria&&categoria!==(item.categoria||"")&&<label style={{display:"flex",alignItems:"center",gap:5,marginTop:6,fontSize:10,color:C.textMuted,cursor:"pointer"}}>
                <input type="checkbox" checked={vincularRegraCategoria} onChange={e=>setVincularRegraCategoria(e.target.checked)}/>
                Vincular esse texto a essa categoria também (avisa se aparecer classificado diferente de novo)
              </label>}
            </div>}
            {item.categoria!=="DCP_PROVISAO"&&String(item.obs||"").indexOf("FONTE_RECEITA")<0&&
              <SeletorEnvelopeItem aba="FLUXO" row={item.row} obsAtual={item.obs} data={data} onUpdate={onUpdate}/>}
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <button onClick={()=>apagar(item)} disabled={load}
                style={{color:C.red,padding:"6px 10px",fontSize:12,fontWeight:700,background:"none",border:"1px solid "+C.redLight,borderRadius:6,cursor:"pointer"}}>🗑 Apagar</button>
              <span style={{flex:1}}/>
              <button onClick={()=>setConf(null)} disabled={load}
                style={{background:C.borderLight,color:C.textSub,borderRadius:6,padding:"6px 10px",fontSize:12,border:"none",cursor:"pointer"}}>Cancelar</button>
              <button onClick={()=>salvar(item)} disabled={load||(!ehFaturaCartao(item)&&!categoria)}
                style={{background:C.accent,color:"#fff",borderRadius:6,padding:"6px 16px",fontSize:12,fontWeight:700,border:"none",cursor:"pointer"}}>
                {load?"…":(!ehFaturaCartao(item)&&!categoria)?"Escolha a categoria":"Salvar"}
              </button>
            </div>
          </div>}
        </div>;})}
        {(cartaoPorDataFiltrado[gdt]||[]).map(c=><div key={"cart-"+c.cartao+"-"+c.row}
          onClick={()=>onIrPara&&onIrPara({tab:"cartoes",row:c.row,cartao:c.cartao})}
          style={{display:"flex",alignItems:"center",gap:8,padding:"8px 14px",borderBottom:"1px solid "+C.borderLight,
            background:C.borderLight,opacity:0.8,cursor:onIrPara?"pointer":"default"}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:600,color:C.textMuted,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",fontStyle:"italic"}}>{c.descricao}</div>
            <div style={{fontSize:10,color:C.textMuted,marginTop:1}}>🏷 Cartão {c.cartao} · não conta aqui, já está na fatura<TagEnvelopeDCP envelope={c.dcpEnvelope} futuro={false}/></div>
          </div>
          <span style={{fontSize:13,fontWeight:700,color:C.textMuted,flexShrink:0}}>{fmt(c.valor)}</span>
          <span style={{fontSize:12,color:C.textMuted,flexShrink:0}}>→</span>
        </div>)}
      </div>;
    })}
    {filtrados.length>limite&&<div style={{padding:"14px",textAlign:"center"}}>
      <button onClick={()=>setLimite(l=>l+30)}
        style={{background:C.borderLight,color:C.text,border:"none",borderRadius:8,padding:"9px 18px",fontSize:13,fontWeight:700,cursor:"pointer"}}>
        Carregar mais 30 (mostrando {ex.length} de {filtrados.length})
      </button>
    </div>}
    <BotaoLancar data={data} onUpdate={onUpdate}/>
  </div>;
}

// ── TIMELINE (aba nova, em construção) ───────────────────────────────────────
// [21/07] Etapa 1: esqueleto do scroll-snap com destaque central, dado
// MOCKADO (nao le a planilha ainda). Objetivo desta etapa e so validar a
// sensacao de rolagem/encaixe/escala antes de plugar o dado real. Convive
// em paralelo com Previsao e Historico, que continuam 100% intocadas --
// so quando o Marcus aprovar o formato e que elas saem (ver alinhamento
// de 21/07). Proximas etapas: dado real (janela +-30 dias com infinite
// scroll), busca/filtro, reagendar + categoria editavel nos dois lados.

// Gera uma janela de dias mockados em volta de hoje, pro teste de rolagem.
// Mistura linha de saldo-do-dia + 0-2 lancamentos por dia, so pra ter
// altura/variedade parecida com o uso real (~1 saldo + ~1 lancamento a
// cada poucos dias, como vimos na planilha real: ~38 lancamentos/mes).
function _gerarMockTimeline(){
  const hj=new Date();
  const linhas=[];
  let saldo=26545.46;
  const descs=[
    {d:"ROSE (FAXINA)",c:"DESPESA FIXA · DOMÉSTICO · CONTA",v:-135,cat:null},
    {d:"MEOO (VW NIVUS)",c:"DESPESA FIXA · VEÍCULO · CONTA",v:-3726,cat:null},
    {d:"FATURA CARTÃO PJ",c:"Nubank INTENSIVA! · CARTÃO · CONTA",v:-9299.58,cat:null},
    {d:"CELESC (ENERGIA)",c:"DESPESA FIXA · MORADIA · CONTA",v:-350,cat:null},
    {d:"BENEVIX (PLANO SAÚDE)",c:"DESPESA FIXA · SAÚDE · CONTA",v:-1900,cat:null},
    {d:"PLANTÃO HSA",c:"RECEITA · ESTRUTURADA",v:4800,cat:null},
    {d:"IFOOD",c:"ALIMENTAÇÃO · CONTA",v:-68.9,cat:"DCP"},
    {d:"PADARIA",c:"ALIMENTAÇÃO · CONTA",v:-42.3,cat:"DCP"},
  ];
  for(let i=-20;i<=25;i++){
    const dt=new Date(hj); dt.setDate(dt.getDate()+i);
    const iso=dt.toISOString().slice(0,10);
    const ehHoje=i===0;
    const ehSeg=dt.getDay()===1;
    // pula uns dias sem nada, igual ao comportamento real (só aparece dia
    // com lançamento OU o próprio dia de hoje).
    const temAlgo = ehHoje || ehSeg || (Math.abs(i)%3===0);
    if(!temAlgo) continue;
    const n = ehHoje?1:(Math.abs(i)%5===0?2:1);
    const itens=[];
    for(let k=0;k<n;k++){
      const pick=descs[Math.floor(Math.random()*descs.length)];
      saldo+=pick.v;
      itens.push({tipo:"item",descricao:pick.d,categoriaTxt:pick.c,valor:pick.v,cat:pick.cat});
    }
    linhas.push({tipo:"dia",data:iso,dataObj:new Date(dt),saldo,hoje:ehHoje,seg:ehSeg,itens});
  }
  return linhas;
}

function _fmtDataCurta(d){
  const dias=["DOM","SEG","TER","QUA","QUI","SEX","SAB"];
  return String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+String(d.getFullYear()).slice(2)+" · "+dias[d.getDay()];
}

function Timeline({data}){
  const containerRef=useRef(null);
  const nodeRefs=useRef([]);
  const [busca,setBusca]=useState("");
  const [filtro,setFiltro]=useState("todos"); // todos|previsao|historico -- so visual nesta etapa (mock nao tem status real ainda)
  const linhas=useMemo(()=>_gerarMockTimeline(),[]);
  const hojeIdx=useMemo(()=>linhas.findIndex(l=>l.hoje),[linhas]);

  // Achata em "slots" (1 slot = 1 linha de saldo OU 1 item), pra cada um
  // virar um elemento centralizavel no scroll-snap.
  const slots=useMemo(()=>{
    const out=[];
    let itemOrdinal=0;
    linhas.forEach((l,li)=>{
      out.push({tipo:"saldo",linha:l,linhaIdx:li});
      l.itens.forEach((it,ii)=>{out.push({tipo:"item",linha:l,item:it,linhaIdx:li,itemIdx:ii,itemOrdinal});itemOrdinal++;});
    });
    return out;
  },[linhas]);

  const hojeSlotIdx=useMemo(()=>slots.findIndex(s=>s.tipo==="saldo"&&s.linha.hoje),[slots]);

  function atualizarDestaque(){
    const cont=containerRef.current;
    if(!cont) return;
    const rect=cont.getBoundingClientRect();
    const centerY=rect.top+rect.height/2;
    nodeRefs.current.forEach(node=>{
      if(!node) return;
      const r=node.getBoundingClientRect();
      const itemCenter=r.top+r.height/2;
      const signedNorm=Math.max(-1,Math.min(1,(itemCenter-centerY)/(rect.height/2)));
      const norm=Math.abs(signedNorm);
      const scale=1-norm*0.28;
      const opacity=1-norm*0.75;
      // [21/07] Curvatura tipo seletor do iPhone, mas com raio bem maior
      // (menos pronunciada) -- pedido do Marcus. rotateX pequeno + perspective
      // grande = curva sutil em vez do efeito "cilindro apertado" do iOS.
      const anguloMax=9; // graus -- raio grande = ângulo máximo pequeno
      const angulo=-signedNorm*anguloMax;
      node.style.transform="perspective(1400px) rotateX("+angulo.toFixed(2)+"deg) scale("+scale.toFixed(3)+")";
      // Opacidade so no CONTEUDO (texto), nunca na linha inteira -- aplicar
      // no node inteiro esmaecia junto o fundo/pauta, que ficava quase
      // invisivel fora do centro (bug reportado pelo Marcus).
      const fade=node.querySelector("[data-fade]");
      if(fade) fade.style.opacity=Math.max(opacity,0.35).toFixed(3);
    });
  }

  useEffect(()=>{
    const cont=containerRef.current;
    if(!cont) return;
    let raf=null;
    function onScroll(){
      if(raf) return;
      raf=requestAnimationFrame(()=>{raf=null;atualizarDestaque();});
    }
    cont.addEventListener("scroll",onScroll,{passive:true});
    // centraliza em "hoje" assim que monta
    const alvo=nodeRefs.current[hojeSlotIdx];
    if(alvo) alvo.scrollIntoView({block:"center"});
    atualizarDestaque();
    return ()=>cont.removeEventListener("scroll",onScroll);
  },[slots]);

  function voltarHoje(){
    const alvo=nodeRefs.current[hojeSlotIdx];
    if(alvo) alvo.scrollIntoView({behavior:"smooth",block:"center"});
  }

  const alturaContainer=520;

  return <div>
    <Card style={{padding:"7px 12px",marginBottom:7}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <span title="Protótipo em construção — dado ainda é mockado, não é a planilha real" style={{fontSize:13,cursor:"help"}}>🔴</span>
        <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Buscar (visual só, ainda não filtra)"
          style={{flex:1,padding:"7px 11px",border:"1px solid "+C.border,borderRadius:9,fontSize:13,fontFamily:"inherit"}}/>
      </div>
      <div style={{display:"flex",gap:6,marginTop:7}}>
        {[["todos","Todos"],["previsao","Só Previsão"],["historico","Só Histórico"]].map(([id,l])=>
          <button key={id} onClick={()=>setFiltro(id)} style={{flex:1,padding:"6px 4px",borderRadius:7,border:"none",cursor:"pointer",
            fontFamily:"inherit",fontSize:11,fontWeight:700,
            background:filtro===id?C.accentLight:C.borderLight,color:filtro===id?C.accent:C.textSub}}>{l}</button>)}
      </div>
    </Card>

    <div style={{position:"relative"}}>
      <div ref={containerRef} style={{height:alturaContainer,overflowY:"auto",scrollSnapType:"y mandatory",
        WebkitOverflowScrolling:"touch",borderRadius:16,background:C.surface,border:"1px solid "+C.border}}>
        <div style={{height:alturaContainer/2-19}}/>
        {slots.map((s,i)=>{
          const isHoje=s.tipo==="saldo"&&s.linha.hoje;
          return <div key={i} ref={n=>nodeRefs.current[i]=n}
            style={{scrollSnapAlign:"center",transition:"transform .06s linear",padding:"5px 13px"}}>
            {s.tipo==="saldo" ? (
              <div data-fade style={{display:"flex",justifyContent:"space-between",alignItems:"center",transition:"opacity .06s linear"}}>
                <div>
                  <div style={{fontWeight:800,color:C.accent,fontSize:isHoje?13:11}}>{_fmtDataCurta(s.linha.dataObj)}{isHoje&&<span style={{marginLeft:6,fontSize:9,background:C.accentLight,color:C.accent,padding:"1px 5px",borderRadius:5}}>HOJE</span>}</div>
                  {(isHoje||s.linha.seg)&&<div style={{fontSize:9,color:C.textMuted,marginTop:1}}>DCP semanal · 28/07 a 03/08</div>}
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{color:C.blue,fontWeight:900,fontSize:isHoje?17:13}}>→ {fmt(s.linha.saldo)}</div>
                  {(isHoje||s.linha.seg)&&<div style={{color:C.green,fontWeight:800,fontSize:11}}>Envelope: R$ 1.283,24</div>}
                </div>
              </div>
            ) : (
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                background:s.item.cat==="DCP"?C.yellowLight:"transparent",borderRadius:s.item.cat==="DCP"?8:0,
                borderLeft:s.item.cat==="DCP"?"3px solid #D97706":"3px solid transparent",
                borderBottom:s.item.cat==="DCP"?"none":"1px solid "+C.border,padding:"4px 7px"}}>
                <div data-fade style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",transition:"opacity .06s linear"}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:12}}>{s.item.descricao}</div>
                    <div style={{fontSize:9,color:C.textMuted}}>{s.item.categoriaTxt}</div>
                  </div>
                  <div style={{fontWeight:800,fontSize:12,color:s.item.valor<0?C.red:C.green}}>{fmt(s.item.valor)}</div>
                </div>
              </div>
            )}
          </div>;
        })}
        <div style={{height:alturaContainer/2-19}}/>
      </div>
      <div style={{position:"absolute",top:"50%",left:0,right:0,height:40,transform:"translateY(-50%)",
        borderTop:"2px solid "+C.accent,borderBottom:"2px solid "+C.accent,background:C.accentLight,
        opacity:0.35,pointerEvents:"none"}}/>
      <button onClick={voltarHoje} style={{position:"absolute",bottom:10,right:10,background:C.accent,color:"#fff",
        border:"none",borderRadius:20,padding:"8px 14px",fontSize:12,fontWeight:700,cursor:"pointer",boxShadow:"0 2px 6px rgba(0,0,0,.2)"}}>
        📍 Hoje
      </button>
    </div>
  </div>;
}

// ── SYSTEM PROMPT GEMINI ──────────────────────────────────────────────────────
function buildPrompt(data){
  const hj=hoje(),fluxo=data.fluxo||[],cfg=data.config||{};
  const ex=fluxo.filter(r=>r.status==="EXECUTADO").sort((a,b)=>a.data>b.data?1:-1);
  const prog=fluxo.filter(r=>r.status==="PROGRAMADO"&&r.data>=hj).sort((a,b)=>a.data>b.data?1:-1);

  // Saldo e DCP
  const saldo=ex.length?ex[ex.length-1].saldoReal||0:Number(cfg.SALDO_ATUAL||0);
  const dcpR=data.dcpResumo||{base:1250,numSemanas:0,totalGasto:0,semanas:[]};
  const dcpTeto=dcpR.base*dcpR.numSemanas;
  const dcpRestante=Math.max(0,dcpTeto-dcpR.totalGasto);

  // Menor liquidez global (próximos 90 dias)
  const d90=new Date(hj);d90.setDate(d90.getDate()+90);const d90s=d90.toISOString().slice(0,10);
  const futuro=prog.filter(r=>r.saldoProjetado!=null&&isFinite(r.saldoProjetado));
  const ml=futuro.length?futuro.reduce((m,r)=>r.saldoProjetado<m.saldoProjetado?r:m,futuro[0]):null;

  // Resumo por ciclo
  const cicloNomes=[...new Set(fluxo.map(r=>r.ciclo).filter(Boolean))].slice(0,6);
  const resumoCiclos=cicloNomes.map(nome=>{
    const rows=fluxo.filter(r=>r.ciclo===nome);
    const rec=rows.filter(r=>r.tipo==="RECEITA").reduce((s,r)=>s+r.valor,0);
    const sai=Math.abs(rows.filter(r=>r.tipo!=="RECEITA").reduce((s,r)=>s+r.valor,0));
    const sorted=[...rows].filter(r=>r.saldoProjetado!=null).sort((a,b)=>a.data>b.data?1:-1);
    const s15=sorted.length?sorted[sorted.length-1].saldoProjetado:null;
    const fut2=rows.filter(r=>r.data>=hj&&r.saldoProjetado!=null);
    const mlc=fut2.length?fut2.reduce((m,r)=>r.saldoProjetado<m.saldoProjetado?r:m,fut2[0]):null;
    const fatPF=Math.abs(rows.filter(r=>r.tipo==="CARTAO PF"||r.tipo==="CARTÃO PF").reduce((s,r)=>s+r.valor,0));
    const fatPJ=Math.abs(rows.filter(r=>r.tipo==="CARTAO PJ"||r.tipo==="CARTÃO PJ").reduce((s,r)=>s+r.valor,0));
    return nome+": rec "+fmt(rec)+" | sai "+fmt(sai)+(s15!=null?" | dia15 "+fmt(s15):"")+
           (mlc?" | menorLiq "+fmt(mlc.saldoProjetado)+" em "+fmtD(mlc.data):"")+
           (fatPF>0?" | fatPF "+fmt(fatPF):"")+
           (fatPJ>0?" | fatPJ "+fmt(fatPJ):"");
  }).join("\n");

  // Próximos 30 dias de lançamentos (mais detalhado)
  const d30=new Date(hj);d30.setDate(d30.getDate()+60);const d30s=d30.toISOString().slice(0,10);
  const prox30=prog.filter(r=>r.data<=d30s).map(r=>"row:"+r.row+"|"+r.data+"|"+r.descricao+"|"+fmt(r.valor)).join("\n");

  // Últimos executados (para contexto recente)
  const ultimos=ex.slice(-10).map(r=>"row:"+r.row+"|"+r.data+"|"+r.descricao+"|"+fmt(r.valor)).join("\n");

  const alertas=[];
  if(ml&&ml.saldoProjetado<0) alertas.push("⚠ LIQUIDEZ NEGATIVA: "+fmt(ml.saldoProjetado)+" em "+fmtD(ml.data)+" — checar se HSA cobre antes");
  if(ml&&ml.saldoProjetado>0&&ml.saldoProjetado<1000) alertas.push("⚠ LIQUIDEZ CRÍTICA: "+fmt(ml.saldoProjetado)+" em "+fmtD(ml.data));
  if(dcpTeto>0&&dcpR.totalGasto>dcpTeto*0.8) alertas.push("⚠ DCP em "+fmt(dcpR.totalGasto)+" de "+fmt(dcpTeto)+" — restam "+fmt(dcpRestante));

  return `Você é o assistente financeiro pessoal de quem está usando este app.

FORMATAÇÃO: Texto simples, sem markdown, sem asteriscos, sem hashtags. "•" para listas se necessário. JSON em linha isolada, nunca misturado com texto. Quando a resposta for puramente conversacional, responda SEM JSON.

SEU PERFIL: Você é o parceiro financeiro pessoal da pessoa. Trate-a pelo nome às vezes, quando souber. Seja direto, humano, opinativo quando fizer sentido. Não é um relatório — é uma conversa. Celebre melhorias, aponte riscos com clareza, mas sem dramatizar. Se a situação estiver boa, diga. Se tiver arriscada, diga também. Pense em voz alta quando útil. Não use listas numeradas para tudo — prose natural quando couber.

CONTEXTO PESSOAL: ${cfg.CONTEXTO_PESSOAL?cfg.CONTEXTO_PESSOAL:'(ainda não configurado.) Se esta é a primeira mensagem da conversa (histórico vazio), ANTES de qualquer outra coisa, se apresente brevemente e peça pra pessoa contar sobre a vida financeira dela — nome, profissão, se tem PF e/ou PJ, principais fontes de renda, e qualquer regra ou situação especial que ela ache importante você saber daqui pra frente (ex: alguém específico que ela paga com frequência, uma dívida com regra própria, etc). Depois que ela responder, emita a ação salvarContextoPessoal com um resumo do que ela contou (2-4 frases, objetivo) — isso fica salvo e você não pergunta de novo. Enquanto ela não responder essa apresentação, funcione normalmente com o que já sabe pelos dados abaixo, só não invente fatos pessoais que não estão nem no contexto nem na planilha.'}

APELIDOS DE DESCRIÇÃO (a pessoa configurou nomes mais claros pra esses padrões — use o apelido ao se referir a eles, tanto pra ler quanto pra reconhecer no extrato/CSV): ${(()=>{try{const ap=JSON.parse(cfg.APELIDOS_JSON||"[]");return ap.length?ap.map(a=>a.padrao+" = "+a.apelido).join(" | "):"(nenhum cadastrado)";}catch(e){return "(nenhum cadastrado)";}})()}

SITUAÇÃO HOJE (${hj}):
Saldo em conta: ${fmt(saldo)}
DCP realizado: ${fmt(dcpR.totalGasto)} / ${fmt(dcpTeto)} (${dcpR.numSemanas} semanas de ${fmt(dcpR.base)}) — restam ${fmt(dcpRestante)}
Ciclo atual: ${cfg.CICLO_INICIO||"?"} a ${cfg.CICLO_FIM||"?"}
${alertas.length?"ALERTAS:\n"+alertas.join("\n"):""}

PROJEÇÃO POR CICLO:
${resumoCiclos}

DCP = Despesas Cotidianas Provisionadas (alimentação, farmácia, gasolina, compras do dia). Teto = ${dcpR.numSemanas} semanas x ${fmt(dcpR.base)} = ${fmt(dcpTeto)}/ciclo, ajustado semana a semana por sobra/estouro. Compra parcelada desconta o valor TOTAL de uma vez, na semana da compra original — nunca por parcela.
Cartão NÃO afeta saldo imediato — só na fatura (dia ${cfg.CARTAO_DIA_VENCIMENTO||7} de cada mês).
Executado = apenas o marcado manualmente. Nunca automático por data.

RECORRÊNCIAS ATIVAS (dia_venc, valor, parcela atual/total, tolerância = quantos dias pode atrasar sem risco — 0 ou vazio = não pode atrasar; use isso pra responder sobre o que pode/não pode postergar, e trate cada parcela de empréstimo individualmente, nunca agrupada):
${(data.recorr||[]).filter(r=>r[6]==="S").map(r=>r[0]+" | dia_venc:"+r[3]+" | "+fmt(r[1])+" | parc:"+r[4]+"/"+r[5]+(r[10]!=null&&r[10]!==""?" | tolerancia:"+r[10]+"d":"")).join("\n")}

CARTÃO PF — aba CARTAO_PF — por fatura (vencimento). Cada item mostra "linha:N" = numero real da linha na aba CARTAO_PF:
${(()=>{const its=data.cartaoPF||[];const vs=[...new Set(its.map(r=>r[4]).filter(Boolean))].sort();return vs.map(v=>{const gr=its.filter(r=>r[4]===v);return "Fatura "+v+" ("+gr.filter(r=>r[7]==="PENDENTE").length+"p/"+gr.filter(r=>r[7]==="PAGO").length+"pg):\n"+gr.map(r=>"["+r[7]+"] linha:"+_linhaCartao(r)+" "+r[0]+" "+r[1]+" "+fmt(r[2])+" parc:"+r[3]).join("\n");}).join("\n\n");})()}

CARTÃO PJ — aba CARTAO_PJ — por fatura (vencimento). Cada item mostra "linha:N" = numero real da linha na aba CARTAO_PJ:
${(()=>{const its=data.cartaoPJ||[];const vs=[...new Set(its.map(r=>r[4]).filter(Boolean))].sort();return vs.map(v=>{const gr=its.filter(r=>r[4]===v);return "Fatura "+v+" ("+gr.filter(r=>r[7]==="PENDENTE").length+"p/"+gr.filter(r=>r[7]==="PAGO").length+"pg):\n"+gr.map(r=>"["+r[7]+"] linha:"+_linhaCartao(r)+" "+r[0]+" "+r[1]+" "+fmt(r[2])+" parc:"+r[3]).join("\n");}).join("\n\n");})()}

ATENÇÃO CRÍTICA — LINHAS DE ABAS DIFERENTES NUNCA SE MISTURAM:
Os números "row:N" em ÚLTIMOS EXECUTADOS e PRÓXIMOS 30 DIAS pertencem à aba FLUXO.
Os números "linha:N" dentro dos blocos CARTÃO PF/PJ acima pertencem à aba CARTAO_PF ou CARTAO_PJ.
São numerações completamente independentes — o mesmo número pode existir nas duas abas ao mesmo tempo, apontando pra coisas diferentes. Pra editar ou apagar um ITEM DE CARTÃO (uma compra dentro de uma fatura), use SEMPRE editarCartaoItem/deletarCartaoItem com a "linha:N" exata do bloco do cartão certo e o campo "aba" (CARTAO_PF ou CARTAO_PJ) correspondente. NUNCA use editar/deletar comuns pra mexer num item de cartão — essas ações mexem na aba FLUXO e vão editar ou apagar o lançamento errado.

ÚLTIMOS EXECUTADOS:
${ultimos}

PRÓXIMOS 30 DIAS:
${prox30}

REGRAS DE NEGÓCIO:

CONCILIAÇÃO DE EXTRATO/FATURA (quando receber CSV ou imagem):

Para EXTRATO de conta corrente:
- Compare com lançamentos EXECUTADOS no FLUXO pelo valor e data
- Já existente no FLUXO com valor correto: confirme, não relance
- Existe mas valor diferente: sugira editar
- Não existe: sugira lancar como EXECUTADO
- INFERÊNCIAS AUTOMÁTICAS (não perguntar): use as RECORRÊNCIAS ATIVAS listadas acima (nome, valor, dia) e o CONTEXTO PESSOAL pra reconhecer sem perguntar. Transferência entre contas da própria pessoa, aplicação/resgate de investimento (categoria INVESTIMENTO) e aporte pra empresa PJ dela mesma: não lançar no Fluxo, são movimentação patrimonial, não gasto/receita real.
- Pergunte APENAS sobre itens que realmente não dá para inferir dessas fontes

Para FATURA de cartão (CSV Nubank):
- "Pagamento recebido", "Pagamento efetuado": IGNORAR — é pagamento da fatura, não compra
- Estorno (valor positivo que não é pagamento): RECEITA
- CONCILIAÇÃO: o CSV tem a data da COMPRA; o vencimento é ~30 dias depois (ex: compra em junho → vence em julho)
- PASSO 1: identifique o vencimento desta fatura (dia ${cfg.CARTAO_DIA_VENCIMENTO||7} do mês seguinte ao fechamento, salvo configuração diferente)
- PASSO 2: nos dados do CARTÃO_PF/PJ acima, localize o bloco de vencimento correspondente (dia ${cfg.CARTAO_DIA_VENCIMENTO||7})
- PASSO 3: compare CSV com esse bloco — itens com mesma descrição (aproximada) e valor = JÁ LANÇADO
- PASSO 4: lance só o que NÃO está no bloco
- Se a pessoa pedir para listar o que já está na planilha: mostre o bloco do vencimento correspondente
- Cartão PF = cartao="PF", Cartão PJ = cartao="PJ"
- Parcelados: informe total de parcelas
- "RECEITA FED" ou "DARF" = tipo="IMPOSTO", dcp="N"
- Se não existe: usar lancarCartao
- Assinaturas = DESPESA FIXA, dcp="N": YouTube, Claude, ChatGPT, Google, Netlify, Jusbrasil, Folha de S.Paulo, Premiere, Disney, Netflix, Spotify
- Gastos do dia a dia = DCP, dcp="S"
- Restaurantes, alimentação, farmácia, posto = DCP
- Cartão PF = cartao="PF", Cartão PJ = cartao="PJ"
- Parcelados: coloque o total de parcelas (ex: "3x" no CSV = parcelas:3)
- "RECEITA FED" ou "DARF" = imposto, tipo="IMPOSTO", dcp="N"
- data_compra = data da compra no CSV (não do vencimento)

CATEGORIAS:
- DCP (Despesas Cotidianas Provisionadas): gasolina, alimentação, farmácia, compras do dia. Gasolina é SEMPRE DCP. Teto = num. de segundas do ciclo x valor base (editável, padrão R$1.250/semana), ajustado semana a semana. Parcelada desconta o total uma vez só, na compra original.
- DESPESA FIXA: assinaturas recorrentes (YouTube, Claude, ChatGPT, Jusbrasil, Serasa etc), condomínio, aluguel, seguros, empréstimos, gastos com André. NÃO entram no DCP. [ANDRÉ deixou de ser categoria em 19/07 — gastos com André agora são DESPESA FIXA + envelope "André" pra rastreio, nunca categoria própria.]
- EXTRAORDINÁRIA: viagens, eventos, presentes maiores. Fora do DCP se a pessoa determinar.

POSTERGAÇÕES — o que pode atrasar sem risco: use o campo tolerância de cada recorrência (listado acima em RECORRÊNCIAS ATIVAS). Tolerância 0 ou vazia = não pode atrasar (trate como prioridade, principalmente fatura de cartão e qualquer item com risco jurídico/bloqueio). Ao sugerir postergar, sempre recalcular fundo do poço e alertar sobre data limite.

RECEITAS: sempre pelo valor líquido real (NF ou cálculo bruto − retenção). Nunca usar estimativa se houver valor real disponível.

REGRAS DE OPERAÇÃO:
- Despesas = valor negativo. Receitas = valor positivo.
- Tipos: RECEITA | DCP | DESPESA FIXA | EMPRESTIMO | CARTÃO PF | CARTÃO PJ | FAMÍLIA | EXTRAORDINÁRIA
- Formas: CONTA | DÉBITO | CARTÃO PF | CARTÃO PJ

AÇÕES (use quando a pessoa pedir operações na planilha):
Coloque o JSON em linha isolada, ANTES da explicação. NUNCA misture JSON com texto corrido.

DESTINO AMBÍGUO (conta ou cartão) — pergunte antes de agir:
Se a pessoa mencionar um gasto novo em texto livre (ex: "gastei 45 na farmácia") sem dizer se foi na conta ou em qual cartão (PF/PJ), NÃO adivinhe e NÃO proponha JSON nenhum ainda — pergunte primeiro, em texto simples, algo como "Foi na conta, no cartão PF ou no cartão PJ?". Só monte o JSON de lancar/lancarCartao depois que ela responder. Isso vale só pra lançamento novo mencionado em texto solto — não se aplica à conciliação de CSV (que já tem suas próprias regras acima) nem quando ela já disse explicitamente onde foi.

Baixa: {"acao":"baixa","row":N,"valorReal":-100,"resumo":"texto"}
Baixa fatura: {"acao":"baixaFatura","cartao":"PF","vencimento":"YYYY-MM-DD","valorPago":-6800,"resumo":"texto"}
Editar campo: {"acao":"editar","row":N,"campo":"VALOR","valor":"-150","resumo":"texto"}
Editar varios: {"acao":"editar","lancamentos":[{"row":N,"campo":"DATA","valor":"2026-07-17"}],"resumo":"texto"}
Deletar: {"acao":"deletar","row":N,"resumo":"texto"}
