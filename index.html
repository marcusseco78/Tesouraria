// ── COMPRAS PARCELADAS -- extraido de dentro de Recorrencias (10/07), mesmo
// motivo. "Parcela atual" = a de maior numero cujo vencimento ja passou (ou
// que ja esta PAGA) -- nunca a de maior numero que existe na planilha
// (todas ja vem pre-extrapoladas, a ultima sempre existiria e "congelava"
// a parcela atual igual ao total).
function ComprasParceladas({data}){
  const {comprasParceladas,projecaoCiclos}=useMemo(()=>{
    const grupos={};
    const hj=hoje();
    const futuras=[]; // {data,valor} de toda parcela ainda nao paga/vencida, pra projecao de ciclos
    [["PF",data.cartaoPF],["PJ",data.cartaoPJ]].forEach(([cartao,arr])=>{
      (arr||[]).forEach(r=>{
        const parc=String(r[3]||"");
        const m=parc.match(/^(\d+)\/(\d+)$/);
        if(!m||Number(m[2])<=1) return;
        const numParc=Number(m[1]),totalParc=Number(m[2]),venc=r[4];
        const chave=cartao+"|"+r[1]+"|"+totalParc;
        if(!grupos[chave]) grupos[chave]={desc:r[1],cartao,total:totalParc,valorParcela:Math.abs(Number(r[2])),vencUltima:venc,parcAtual:0};
        const g=grupos[chave];
        if(numParc===totalParc) g.vencUltima=venc;
        const jaPassou=r[7]==="PAGO"||venc<=hj;
        if(jaPassou&&numParc>g.parcAtual) g.parcAtual=numParc;
        else if(!jaPassou) futuras.push({data:venc,valor:Math.abs(Number(r[2]))});
      });
    });
    const lista=Object.values(grupos).sort((a,b)=>(a.total-a.parcAtual)-(b.total-b.parcAtual));
    const cicloInicio=data.config?.CICLO_INICIO;
    const proj=cicloInicio?[1,2].map(desl=>{
      const jan=janelaCiclo(cicloInicio,desl);
      const total=futuras.filter(f=>f.data>=jan.inicio&&f.data<=jan.fim).reduce((s,f)=>s+f.valor,0);
      return {desl,total};
    }):[];
    return {comprasParceladas:lista,projecaoCiclos:proj};
  },[data.cartaoPF,data.cartaoPJ,data.config]);

  return <div style={{padding:12}}>
    <div style={{fontSize:11,fontWeight:800,color:C.textMuted,letterSpacing:".05em",marginBottom:10}}>COMPRAS PARCELADAS</div>
    {!comprasParceladas.length&&<div style={{padding:"30px 16px",textAlign:"center",fontSize:12,color:C.textMuted,fontStyle:"italic"}}>Nenhuma compra parcelada em andamento.</div>}
    {comprasParceladas.length>0&&<div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:10,background:C.accentLight,borderRadius:8,padding:"8px 10px"}}>
      Total das parcelas: {fmt(-comprasParceladas.reduce((s,c)=>s+c.valorParcela,0))}/ciclo
      {projecaoCiclos.length>0&&<div style={{fontSize:11,fontWeight:600,color:C.textMuted,marginTop:6,display:"flex",gap:14}}>
        {projecaoCiclos.map(p=><span key={p.desl}>{p.desl===1?"Próximo ciclo":"Ciclo seguinte"}: <b style={{color:C.red}}>{fmt(-p.total)}</b></span>)}
      </div>}
    </div>}
    {comprasParceladas.map((c,i)=><div key={i} style={{background:C.surface,border:"1px solid "+C.border,borderRadius:8,padding:10,marginBottom:6}}>
      <div style={{fontSize:13,fontWeight:700,color:C.text}}>{c.desc}</div>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:4,fontSize:11,color:C.textMuted}}>
        <span>Parcela: <b style={{color:C.red}}>{fmt(c.valorParcela)}</b></span>
        <span>{c.parcAtual}/{c.total} parcelas</span>
      </div>
      <div style={{fontSize:11,color:C.textMuted,marginTop:2}}>
        Cartão <b>{c.cartao}</b> · última parcela: <b>{fmtD(c.vencUltima)}</b>
      </div>
    </div>)}
  </div>;
}

// ── RECEITAS ESTRUTURADAS (HSA/HSI/HDWC) ────────────────────────────────────
// Desenhado com o Marcus em 11/07: cada fonte e CALCULADA (conta plantao por
// regra de dia-da-semana/ordinal, igual escala real dele) ou ESTAVEL (valor
// fixo, sem calculo de hora) -- as duas com um campo OBS livre. O motor de
// calculo (mesma logica replicada aqui so pra preview instantaneo -- a
// verdade sempre vem do backend depois de salvar) mora em
// _calcularPlantoesMes no script.
const DOW_NOMES=["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];
const ORDINAIS_LABEL=["1ª","2ª","3ª","4ª"];

// Mesma matematica de _calcularPlantoesMes no backend -- so para preview
// instantaneo no app, antes de salvar. A fonte da verdade continua sendo o
// backend (roda de novo, oficialmente, no salvarFontesReceita).
function _previewPlantoesMes(regras,ano,mes){
  if(!regras||!regras.length) return 0;
  const ultimoDia=new Date(ano,mes+1,0).getDate();
  const ordinalPorDow={};
  let total=0;
  for(let dia=1;dia<=ultimoDia;dia++){
    const d=new Date(ano,mes,dia);
    const dow=d.getDay();
    ordinalPorDow[dow]=(ordinalPorDow[dow]||0)+1;
    const ordinalAtual=ordinalPorDow[dow];
    regras.forEach(r=>{
      if(Number(r.dow)!==dow) return;
      if(r.modo==="toda") total+=Number(r.qtd)||1;
      else if(r.modo==="ordinal" && (r.ordinais||[]).indexOf(ordinalAtual)>=0) total+=Number(r.qtd)||1;
    });
  }
  return total;
}

function FormModo({modo,onChange,onRemover,podeRemover,onLancarAvulso}){
  function upd(campo,valor){ onChange({...modo,[campo]:valor}); }
  function addRegra(){ upd("regras",[...(modo.regras||[]),{dow:1,modo:"toda",ordinais:[],qtd:1}]); }
  function updRegra(i,nova){ upd("regras",(modo.regras||[]).map((r,idx)=>idx===i?nova:r)); }
  function removerRegra(i){ upd("regras",(modo.regras||[]).filter((_,idx)=>idx!==i)); }

  const hj=new Date();
  let mesRef=hj.getMonth()-1, anoRef=hj.getFullYear();
  if(mesRef<0){mesRef=11;anoRef--;}
  const ehEstavel=modo.tipoValor==="ESTAVEL";
  const ehCalculada=!ehEstavel&&!!modo.calculada;
  const ehEsporadica=modo.tipoRecorrencia==="ESPORADICA";
  // valorHora/valorFixo/valorReferencia ficam como STRING mascarada enquanto
  // o campo esta sendo editado (mesmo padrao de EditorEnvelope) -- nunca
  // converte pra numero a cada tecla, so na hora de salvar (FontesReceita)
  // ou aqui no preview via numBR (aceita string mascarada OU numero puro).
  const plantoesPreview=ehCalculada?_previewPlantoesMes(modo.regras,anoRef,mesRef):0;
  const valorPreview=ehCalculada
    ?_round2(plantoesPreview*(Number(modo.horasPlantao)||12)*(numBR(modo.valorHora)||0)*(1-(Number(modo.percDesconto)||0)/100))
    :(numBR(modo.valorFixo)||0);
  const liquidoReferenciaPreview=_round2((numBR(modo.valorReferencia)||0)*(1-(Number(modo.percDesconto)||0)/100));
  function _round2(n){return Math.round(n*100)/100;}
  // Exibicao do campo mascarado: se o valor ainda for um numero puro (vindo
  // do backend ou dos padroes FONTES_PADRAO, nunca editado nesta sessao),
  // formata pra mascara na hora de mostrar; se ja for string (usuario
  // editou), mostra exatamente o que esta digitado.
  const dispValorHora=typeof modo.valorHora==="string"?modo.valorHora:formatarValorInicial(modo.valorHora);
  const dispValorFixo=typeof modo.valorFixo==="string"?modo.valorFixo:formatarValorInicial(modo.valorFixo);
  const dispValorReferencia=typeof modo.valorReferencia==="string"?modo.valorReferencia:formatarValorInicial(modo.valorReferencia);

  // [NOVO 14/07] Lancamento avulso direto daqui, sem precisar navegar ate o
  // "+" -- pedido do Marcus depois de se confundir achando que "Salvar" (o
  // botao do rodape da tela, que so grava o CADASTRO) tambem lancava no
  // Fluxo. Data por calendario + liquido visivel, exatamente como ele pediu.
  // Nunca sobrescreve modo.valorReferencia/percDesconto -- so LE esses
  // valores como ponto de partida; o que for digitado aqui fica local, so
  // desta vez.
  const [lancarAberto,setLancarAberto]=useState(false);
  const [dataLanc,setDataLanc]=useState(()=>hoje());
  const [valorLanc,setValorLanc]=useState("");
  const [descLanc,setDescLanc]=useState("");
  const [loadLanc,setLoadLanc]=useState(false);
  const liquidoLanc=_round2((numBR(valorLanc)||0)*(1-(Number(descLanc)||0)/100));
  function abrirLancar(){
    setValorLanc(formatarValorInicial(modo.valorReferencia||0));
    setDescLanc(String(modo.percDesconto||0));
    setDataLanc(hoje());
    setLancarAberto(true);
  }
  async function confirmarLancar(){
    if(!numBR(valorLanc)) return;
    setLoadLanc(true);
    try{
      await onLancarAvulso({valor:liquidoLanc,data:dataLanc});
      setLancarAberto(false);
    }catch(e){alert(e.message);}
    setLoadLanc(false);
  }

      </label>

        <div style={{flex:1}}>
          <label style={{fontSize:9,color:C.textMuted}}>VALOR/HORA</label>
          <input type="text" inputMode="numeric" value={dispValorHora} onChange={e=>upd("valorHora",formatarMoedaInput(e.target.value))}
            style={{width:"100%",padding:"5px 8px",borderRadius:6,border:"1px solid "+C.border,fontSize:12,textAlign:"right",boxSizing:"border-box",fontFamily:"inherit"}}/>
        </div>
        <div style={{flex:1}}>
          <label style={{fontSize:9,color:C.textMuted}}>HORAS/PLANTÃO</label>
          <input type="number" value={modo.horasPlantao} onChange={e=>upd("horasPlantao",Number(e.target.value)||12)}
            style={{width:"100%",padding:"5px 8px",borderRadius:6,border:"1px solid "+C.border,fontSize:12,textAlign:"right",boxSizing:"border-box",fontFamily:"inherit"}}/>
        </div>
        <div style={{width:70,flexShrink:0}}>
          <label style={{fontSize:9,color:C.textMuted}}>DESCONTO</label>
          <input type="number" value={modo.percDesconto} onChange={e=>upd("percDesconto",Number(e.target.value)||0)}
            style={{width:"100%",padding:"5px 8px",borderRadius:6,border:"1px solid "+C.border,fontSize:12,textAlign:"right",boxSizing:"border-box",fontFamily:"inherit"}}/>
        </div>
      </div>
      <div style={{fontSize:10,color:C.textMuted,fontWeight:700,marginBottom:4}}>REGRA DOS PLANTÕES</div>
      {(modo.regras||[]).map((r,i)=><RegraPlantaoRow key={i} regra={r} onChange={nova=>updRegra(i,nova)} onRemover={()=>removerRegra(i)}/>)}
      <button onClick={addRegra} style={{background:"none",border:"1px dashed "+C.border,borderRadius:6,color:C.teal,fontSize:11,padding:"5px 10px",cursor:"pointer",marginBottom:8}}>
        + Adicionar regra
      </button>
      <div style={{background:C.tealLight,borderRadius:8,padding:"8px 10px",fontSize:11,color:C.teal,fontWeight:600}}>
        Mês de referência atual ({String(mesRef+1).padStart(2,"0")}/{anoRef}): <b>{plantoesPreview} plantões</b> → {fmt(valorPreview)}
      </div>
    </>:ehEstavel?<>
      <div style={{marginBottom:8}}>
        <label style={{fontSize:9,color:C.textMuted}}>VALOR FIXO</label>
        <input type="text" inputMode="numeric" value={dispValorFixo} onChange={e=>upd("valorFixo",formatarMoedaInput(e.target.value))}
          style={{width:"100%",padding:"5px 8px",borderRadius:6,border:"1px solid "+C.border,fontSize:12,textAlign:"right",boxSizing:"border-box",fontFamily:"inherit"}}/>
      </div>
    </>:<>
      {/* Variavel + nao-calculada: o valor de verdade varia a cada vez, mas
          precisa de um VALOR DE REFERENCIA guardado no cadastro por dois
          motivos -- (1) se o modo for REGULAR, e esse valor que gera
          sozinho todo mes (sem ele, geraria R$0,00 -- bug real encontrado
          13/07); (2) se for ESPORADICA, pre-preenche o lancamento avulso
          (veja o botao "Lancar um pagamento agora" acima), sempre editavel
          naquele momento -- nunca sobrescreve esse valor de referencia. */}
      <div style={{display:"flex",gap:6,marginBottom:6}}>
        <div style={{flex:1}}>
          <label style={{fontSize:9,color:C.textMuted}}>VALOR {ehEsporadica?"DE REFERÊNCIA":""}</label>
          <input type="text" inputMode="numeric" value={dispValorReferencia} onChange={e=>upd("valorReferencia",formatarMoedaInput(e.target.value))}
            style={{width:"100%",padding:"5px 8px",borderRadius:6,border:"1px solid "+C.border,fontSize:12,textAlign:"right",boxSizing:"border-box",fontFamily:"inherit"}}/>
        </div>
        <div style={{width:70,flexShrink:0}}>
          <label style={{fontSize:9,color:C.textMuted}}>DESCONTO</label>
          <input type="number" value={modo.percDesconto} onChange={e=>upd("percDesconto",Number(e.target.value)||0)}
            style={{width:"100%",padding:"5px 8px",borderRadius:6,border:"1px solid "+C.border,fontSize:12,textAlign:"right",boxSizing:"border-box",fontFamily:"inherit"}}/>
        </div>
      </div>
      <div style={{background:C.tealLight,borderRadius:8,padding:"7px 10px",fontSize:11,color:C.teal,fontWeight:600,marginBottom:8}}>
        Líquido de referência: {fmt(liquidoReferenciaPreview)}{ehEsporadica?" — editável em cada lançamento, isso aqui é só um valor de partida.":""}
      </div>
    </>}
    <div>
      <label style={{fontSize:9,color:C.textMuted}}>OBS (livre)</label>
      <input type="text" value={modo.obs||""} onChange={e=>upd("obs",e.target.value)} placeholder="Anotação livre sobre esse modo"
        style={{width:"100%",padding:"5px 8px",borderRadius:6,border:"1px solid "+C.border,fontSize:12,boxSizing:"border-box",fontFamily:"inherit"}}/>
    </div>
  </div>;
}

function FontesReceita({data,onUpdate}){
  const salvas=data.fontesReceita||[];
  const [fontes,setFontes]=useState(()=>salvas.length?salvas:[]);
  const [load,setLoad]=useState(false);
  const [loadRefresh,setLoadRefresh]=useState(false);
  const [loadFonte,setLoadFonte]=useState(null); // nome da fonte gerando individualmente agora
  const [msg,setMsg]=useState(null);

  function novoModoVazio(){
    return {id:"", tipoValor:"VARIAVEL", calculada:false, tipoRecorrencia:"REGULAR",
      diaPagamento:1, ativo:true, obs:"", valorHora:0, horasPlantao:12, percDesconto:0, regras:[]};
  }
  function atualizarNomeFonte(i,novoNome){ setFontes(fs=>fs.map((f,idx)=>idx===i?{...f,nome:novoNome}:f)); }
  // [NOVO 17/07] Termos alternativos de identificacao (de onde o dinheiro
  // realmente vem no extrato -- ex: HDWC cai de uma conta salario do Banco
  // do Brasil, HSA/HSI caem da conta da Intensiva). So usado por
  // Conciliacao de Extrato, nunca muda a descricao das linhas geradas.
  function atualizarAliasFonte(i,novoAlias){ setFontes(fs=>fs.map((f,idx)=>idx===i?{...f,alias:novoAlias}:f)); }
  function removerFonte(i){ setFontes(fs=>fs.filter((_,idx)=>idx!==i)); }
  function addFonte(){ setFontes(fs=>[...fs,{nome:"",modos:[novoModoVazio()]}]); }
  function addModo(fi){ setFontes(fs=>fs.map((f,idx)=>idx===fi?{...f,modos:[...(f.modos||[]),novoModoVazio()]}:f)); }
  function atualizarModo(fi,mi,novoModo){ setFontes(fs=>fs.map((f,idx)=>idx===fi?{...f,modos:f.modos.map((m,midx)=>midx===mi?novoModo:m)}:f)); }
  function removerModo(fi,mi){ setFontes(fs=>fs.map((f,idx)=>idx===fi?{...f,modos:f.modos.filter((_,midx)=>midx!==mi)}:f)); }
  function carregarPadrao(){ setFontes(FONTES_PADRAO.map(f=>({...f,modos:(f.modos||[]).map(m=>({...m,regras:m.regras?m.regras.map(r=>({...r})):undefined}))}))); }

  // Converte os campos de valor mascarado (string OU numero puro) pra numero
  // de verdade, EM CADA MODO de cada fonte, e persiste o array INTEIRO em
  // CONFIG -- usado antes de QUALQUER acao que dependa do estado salvo no
  // backend (gerar, apagar), pra nunca mais correr o risco de uma acao usar
  // uma regra desatualizada so porque o Marcus esqueceu de "Salvar" antes.
  async function persistir(){
    const fontesLimpo=fontes.map(f=>({
      ...f,
      modos:(f.modos||[]).map(m=>({...m,valorHora:numBR(m.valorHora)||0,valorFixo:numBR(m.valorFixo)||0,valorReferencia:numBR(m.valorReferencia)||0}))
    }));
    return await api({action:"salvarFontesReceita",fontes:fontesLimpo});
  }

  // [NOVO 14/07] Lancamento avulso de um modo ESPORADICO, direto do proprio
  // card (botao "Lancar um pagamento agora" dentro de FormModo) -- e a acao
  // que de fato registra uma linha no Fluxo pra esse modo. Nao tem nenhuma
  // relacao com o botao "Salvar" do rodape da tela (esse so grava o
  // CADASTRO/config, nunca lanca nada sozinho pra modo esporadico -- ponto
  // de confusao real do Marcus, 14/07). Mesmo formato de marcador que o
  // motor de geracao automatica usa (FONTE_RECEITA:NOME:MODOID:DATA), so
  // que aqui SEMPRE via acao "lancar" simples, nunca "gerarReceitasFontes"
  // (que so atua sobre modos REGULAR).
  async function lancarAvulsoModo(fonteNome,modo,{valor,data}){
    const nomeNorm=String(fonteNome).toUpperCase().replace(/[^A-Z0-9_ ]/g,"").replace(/ /g,"");
    const obsMarcador="FONTE_RECEITA:"+nomeNorm+":"+modo.id+":"+data;
    const r=await api({action:"lancar",data,descricao:(fonteNome+" (ESPORÁDICA)").toUpperCase(),
      valor,tipo:"RECEITA",categoria:"RECEITA",forma:"CONTA",
      status:data<=hoje()?"EXECUTADO":"PROGRAMADO",obs:obsMarcador});
    onUpdate&&onUpdate(r);
    setMsg("Lançamento de "+fonteNome+" registrado no Fluxo.");
  }

  async function salvar(){
    setLoad(true); setMsg(null);
    try{
      const r=await persistir();
      onUpdate&&onUpdate(r);
      setMsg((r.receitasGeradas||0)+" lançamento(s) novo(s) gerado(s)/atualizado(s) no Fluxo.");
    }catch(e){alert(e.message);}
    setLoad(false);
  }
  // "Recalcular TODAS": salva a tela, apaga TODOS os futuros gerados (de
  // qualquer fonte/modo) e regera do zero com as regras/valores atuais.
  async function recalcularTodas(){
    if(!window.confirm("Recalcular TODAS as fontes? Isso apaga os lançamentos futuros ainda programados de modo Regular (de qualquer fonte) e regera do zero com os valores/regras atuais da tela. Esporádica nunca é tocada por aqui — nunca é gerada sozinha. Já executados nunca são tocados."))return;
    setLoadRefresh(true); setMsg(null);
    try{
      await persistir();
      await api({action:"apagarFuturosFonte",tipos:["REGULAR"]});
      const r=await api({action:"gerarReceitasFontes"});
      onUpdate&&onUpdate(r);
      setMsg("Todas as fontes recalculadas: "+(r.itensAdicionados||0)+" lançamento(s) gerado(s).");
    }catch(e){alert(e.message);}
    setLoadRefresh(false);
  }
  // "Recalcular" UMA fonte (todos os modos dela juntos) -- mesma logica do
  // botao "Todas", so que filtrada. E o botao que resolve "mudei valor-hora/
  // aliquota/regra de algum modo, quero que os lancamentos futuros reflitam".
  async function recalcularUmaFonte(nome){
    if(!window.confirm("Recalcular \""+nome+"\"? Isso apaga os lançamentos futuros de modo Regular já gerados dessa fonte e regera do zero com os valores/regra atuais da tela. Esporádica nunca é tocada por aqui. Já executados nunca são tocados."))return;
    setLoadFonte(nome); setMsg(null);
    try{
      await persistir();
      await api({action:"apagarFuturosFonte",fonte:nome,tipos:["REGULAR"]});
      const r=await api({action:"gerarReceitasFontes",fonte:nome});
      onUpdate&&onUpdate(r);
      setMsg(nome+": recalculado, "+(r.itensAdicionados||0)+" lançamento(s) gerado(s).");
    }catch(e){alert(e.message);}
    setLoadFonte(null);
  }
  // Apaga futuros SEM regerar -- pra quando o Marcus so quer remover (ex:
  // desativou o modo) sem recriar nada. [15/07] agora com filtro por tipo:
  // Regular e/ou Esporadica marcados separadamente, nunca um seletor global
  // de fonte (cada fonte ja tem seu proprio card, isso so vive dentro dele).
  const [loadApagar,setLoadApagar]=useState(null);
  const [tiposApagar,setTiposApagar]=useState({});// {nome: {regular:bool, esporadica:bool}}
  function setTipoApagar(nome,campo,valor){
    setTiposApagar(prev=>({...prev,[nome]:{...(prev[nome]||{regular:true,esporadica:true}),[campo]:valor}}));
  }
  async function apagarFuturosDaFonte(nome){
    const sel=tiposApagar[nome]||{regular:true,esporadica:true};
    const tipos=[];
    if(sel.regular)tipos.push("REGULAR");
    if(sel.esporadica)tipos.push("ESPORADICA");
    if(!tipos.length){alert("Marque pelo menos um tipo (Regulares ou Esporádicas).");return;}
    const desc=tipos.length===2?"todos os modos (Regulares e Esporádicas)":tipos[0]==="REGULAR"?"só os modos Regulares":"só os modos Esporádicas";
    if(!window.confirm("Apagar "+desc+" ainda programados de \""+nome+"\", SEM regerar? Já executados não são tocados."))return;
    setLoadApagar(nome); setMsg(null);
    try{
      await persistir();
      const r=await api({action:"apagarFuturosFonte",fonte:nome,tipos});
      onUpdate&&onUpdate(r);
      setMsg(nome+": "+(r.apagados||0)+" lançamento(s) apagado(s).");
    }catch(e){alert(e.message);}
    setLoadApagar(null);
  }

  // Proximos lancamentos ja gerados no Fluxo pra cada FONTE (soma de todos
  // os modos dela junto -- o marcador "FONTE_RECEITA:NOME:" ainda casa com
  // qualquer modo, o id do modo vem depois no marcador) -- so leitura.
  function proximosDaFonte(nome){
    const marcador="FONTE_RECEITA:"+String(nome||"").toUpperCase().replace(/[^A-Z0-9_ ]/g,"").replace(/ /g,"")+":";
    return (data.fluxo||[])
      .filter(r=>String(r.obs||"").toUpperCase().replace(/ /g,"").indexOf(marcador)===0 && r.status==="PROGRAMADO")
      .sort((a,b)=>a.data<b.data?-1:1).slice(0,3);
  }
  const jaSalva=nome=>salvas.some(f=>String(f.nome||"").toUpperCase()===String(nome||"").toUpperCase());

  // [13/07, 2a rodada] Total mensal discriminado (Regular vs Esporádica) +
  // média dos últimos 12 meses civis. Agora precisa achar o MODO exato que
  // gerou cada linha (nao so a fonte) pra saber se aquele modo especifico e
  // regular ou esporadico -- duas fontes podem ter o mesmo nome de modo
  // gerando linhas diferentes, entao a chave de busca e nome+idDoModo.
  const resumoMensal=useMemo(()=>{
    const porChaveModo={};
    fontes.forEach(f=>{
      const nomeNorm=String(f.nome||"").toUpperCase().replace(/[^A-Z0-9_ ]/g,"").replace(/ /g,"");
      (f.modos||[]).forEach(m=>{ if(m.id) porChaveModo[nomeNorm+":"+m.id]=m; });
    });
    const porMes={};
    (data.fluxo||[]).forEach(r=>{
      const m=String(r.obs||"").match(/FONTE_RECEITA:([A-Z0-9_]+):([A-Za-z0-9_]+):(\d{4}-\d{2})/);
      if(!m) return;
      const modo=porChaveModo[m[1]+":"+m[2]];
      const esporadica=modo&&modo.tipoRecorrencia==="ESPORADICA";
      const chave=m[3];
      if(!porMes[chave]) porMes[chave]={regular:0,esporadica:0};
      if(esporadica) porMes[chave].esporadica+=Number(r.valor)||0;
      else porMes[chave].regular+=Number(r.valor)||0;
    });
    return porMes;
  },[data.fluxo,fontes]);
  const hojeMesChave=hoje().slice(0,7);
  const mesAtual=resumoMensal[hojeMesChave]||{regular:0,esporadica:0};
  const ultimos12=Object.keys(resumoMensal).filter(m=>m<=hojeMesChave).sort().slice(-12);
  const mediaSemEsporadicas=ultimos12.length?ultimos12.reduce((s,m)=>s+resumoMensal[m].regular,0)/ultimos12.length:0;
  const mediaComEsporadicas=ultimos12.length?ultimos12.reduce((s,m)=>s+resumoMensal[m].regular+resumoMensal[m].esporadica,0)/ultimos12.length:0;

  return <div style={{padding:12}}>
    <div style={{fontSize:11,fontWeight:800,color:C.textMuted,letterSpacing:".05em",marginBottom:10}}>
      RECEITAS ESTRUTURADAS
    </div>
    <div style={{fontSize:11,color:C.textMuted,marginBottom:12,fontStyle:"italic"}}>
      Cada fonte pode ter vários modos de pagamento (ex: HSI regular por plantão + um bônus esporádico). Cada modo calcula sozinho (por plantão), usa valor fixo, ou é lançado manualmente — e modos regulares já lançam a Receita programada nos próximos ~13 meses. Corrija a linha no Fluxo se algo mudar (feriado, plantão cancelado etc). Qualquer botão abaixo (💾, 🔄, 🗑) já salva as edições da tela primeiro, sozinho.
    </div>

    {(mesAtual.regular>0||mesAtual.esporadica>0||ultimos12.length>0)&&<div style={{background:C.tealLight,borderRadius:10,padding:"10px 12px",marginBottom:14}}>
      <div style={{fontSize:11,fontWeight:700,color:C.teal,marginBottom:4}}>
        Total do mês ({hojeMesChave}): {fmt(mesAtual.regular+mesAtual.esporadica)}
      </div>
      <div style={{fontSize:10,color:C.teal,marginBottom:8}}>
        Regular: {fmt(mesAtual.regular)} · Esporádico: {fmt(mesAtual.esporadica)}
      </div>
      <div style={{fontSize:10,color:C.teal,borderTop:"1px solid rgba(0,0,0,0.08)",paddingTop:6}}>
        Média/mês (últimos {ultimos12.length} mês(es)): {fmt(mediaComEsporadicas)} com esporádicas · {fmt(mediaSemEsporadicas)} sem
      </div>
    </div>}

    {!fontes.length&&<div style={{textAlign:"center",padding:"20px 10px"}}>
      <div style={{fontSize:12,color:C.textMuted,marginBottom:10}}>Nenhuma fonte cadastrada ainda.</div>
      <button onClick={carregarPadrao} style={{background:C.teal,color:"#fff",border:"none",borderRadius:8,padding:"9px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}}>
        Carregar HSA / HSI / HDWC-SESSC
      </button>
    </div>}

    {fontes.map((f,i)=><div key={i} style={{background:C.surface,border:"1px solid "+C.border,borderRadius:10,padding:12,marginBottom:10}}>
      <div style={{display:"flex",gap:6,marginBottom:10}}>
        <input type="text" value={f.nome} onChange={e=>atualizarNomeFonte(i,e.target.value.toUpperCase())} placeholder="Nome da fonte"
          style={{flex:1,padding:"6px 8px",borderRadius:6,border:"1px solid "+C.border,fontSize:13,fontWeight:700,fontFamily:"inherit"}}/>
        <button onClick={()=>removerFonte(i)} style={{background:"none",border:"1px dashed "+C.border,borderRadius:6,color:C.red,fontSize:11,padding:"0 8px",cursor:"pointer"}}>Remover fonte</button>
      </div>
      <div style={{marginBottom:10}}>
        <input type="text" value={f.alias||""} onChange={e=>atualizarAliasFonte(i,e.target.value.toUpperCase())}
          placeholder="Termos alternativos no extrato (ex: BANCO DO BRASIL; FOLHA)"
          style={{width:"100%",padding:"6px 8px",borderRadius:6,border:"1px solid "+C.border,fontSize:11,fontFamily:"inherit",boxSizing:"border-box"}}/>
        <div style={{fontSize:9,color:C.textMuted,marginTop:2}}>Separe vários com ";". Ajuda a Conciliação de Extrato a reconhecer esse depósito mesmo com nome diferente no banco.</div>
      </div>

      {(f.modos||[]).map((m,mi)=><FormModo key={mi} modo={m} podeRemover={(f.modos||[]).length>1}
        onChange={novo=>atualizarModo(i,mi,novo)} onRemover={()=>removerModo(i,mi)}
        onLancarAvulso={info=>lancarAvulsoModo(f.nome,m,info)}/>)}

      <button onClick={()=>addModo(i)} style={{width:"100%",background:"none",border:"1px dashed "+C.border,borderRadius:8,color:C.teal,fontSize:11,fontWeight:600,padding:"7px",cursor:"pointer",marginBottom:8}}>
        + Adicionar modo de pagamento
      </button>

      <div>
        {proximosDaFonte(f.nome).length>0&&<>
          <div style={{fontSize:9,color:C.textMuted,fontWeight:700,marginBottom:3}}>PRÓXIMOS JÁ NO FLUXO</div>
          {proximosDaFonte(f.nome).map((r,j)=><div key={j} style={{fontSize:11,color:C.textSub,display:"flex",justifyContent:"space-between",padding:"2px 0"}}>
            <span>{fmtD(r.data)}</span><span style={{fontWeight:700,color:C.green}}>{fmt(r.valor)}</span>
          </div>)}
        </>}
        {jaSalva(f.nome)&&<div style={{marginTop:6}}>
          <div style={{display:"flex",gap:6,marginBottom:6}}>
            <button onClick={()=>recalcularUmaFonte(f.nome)} disabled={loadFonte===f.nome}
              style={{background:"none",border:"1px dashed "+C.teal,borderRadius:6,color:C.teal,fontSize:10,fontWeight:600,padding:"4px 9px",cursor:"pointer"}}>
              {loadFonte===f.nome?"Recalculando…":"🔄 Recalcular essa fonte"}
            </button>
          </div>
          <div style={{background:C.redLight,border:"1px dashed "+C.red,borderRadius:6,padding:8}}>
            <div style={{fontSize:9,color:C.red,fontWeight:700,marginBottom:5}}>🗑 APAGAR FUTUROS DESSA FONTE (sem regerar)</div>
            <div style={{display:"flex",gap:12,marginBottom:6}}>
              <label style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:C.text,cursor:"pointer"}}>
                <input type="checkbox" checked={(tiposApagar[f.nome]||{regular:true}).regular!==false} onChange={e=>setTipoApagar(f.nome,"regular",e.target.checked)}/>
                Regulares
              </label>
              <label style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:C.text,cursor:"pointer"}}>
                <input type="checkbox" checked={(tiposApagar[f.nome]||{esporadica:true}).esporadica!==false} onChange={e=>setTipoApagar(f.nome,"esporadica",e.target.checked)}/>
                Esporádicas
              </label>
            </div>
            <button onClick={()=>apagarFuturosDaFonte(f.nome)} disabled={loadApagar===f.nome}
              style={{width:"100%",background:"none",border:"1px solid "+C.red,borderRadius:6,color:C.red,fontSize:11,fontWeight:700,padding:"6px",cursor:"pointer"}}>
              {loadApagar===f.nome?"Apagando…":"Apagar futuros"}
            </button>
          </div>
          <div style={{fontSize:9,color:C.textMuted,marginTop:5,lineHeight:1.4}}>
            <b>Recalcular</b>: mudou valor-hora, alíquota ou a regra de algum modo Regular? Refaz TODOS os meses futuros Regulares com o valor certo (Esporádica nunca é tocada — não tem fórmula pra reaplicar). <b>Apagar futuros</b>: só some com o que já estava programado, sem recriar — marque Regulares e/ou Esporádicas conforme o que quer limpar.
          </div>
        </div>}
      </div>
    </div>)}

    <button onClick={addFonte} style={{width:"100%",background:"none",border:"1px dashed "+C.border,borderRadius:8,color:C.teal,fontSize:12,fontWeight:600,padding:"8px",cursor:"pointer",marginBottom:12}}>
      + Adicionar outra fonte
    </button>

    {fontes.length>0&&<div style={{display:"flex",gap:8}}>
      <button onClick={salvar} disabled={load}
        style={{flex:1,background:C.teal,color:"#fff",border:"none",borderRadius:8,padding:"10px",fontSize:13,fontWeight:700,cursor:"pointer"}}>
        {load?"Salvando…":"💾 Salvar"}
      </button>
      <button onClick={recalcularTodas} disabled={loadRefresh}
        style={{background:C.borderLight,color:C.text,border:"none",borderRadius:8,padding:"10px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}}>
        {loadRefresh?"…":"🔄 Recalcular todas"}
      </button>
    </div>}
    {fontes.length>0&&<div style={{fontSize:9,color:C.textMuted,marginTop:5,lineHeight:1.4}}>
      <b>Salvar</b>: grava suas edições e preenche os meses que ainda faltam — não mexe no que já existe. <b>Recalcular todas</b>: refaz TODOS os meses futuros de TODAS as fontes/modos com os valores atuais (equivale a clicar "Recalcular" em cada uma).
    </div>}
    {msg&&<div style={{marginTop:8,fontSize:11,color:C.teal,textAlign:"center"}}>{msg}</div>}
  </div>;
}

// ── ENVELOPES CUSTOMIZADOS (TELA) ────────────────────────────────────────────
// Meta simples: nome + teto + janela de tempo. Sem motor nenhum -- so soma
// gastos classificados e mostra quanto sobrou. Nunca mexe no saldo real do
// Fluxo. Ideia do Marcus (11/07): rastrear gasto de um "projeto" (viagem,
// festa, reforma) sem misturar com o controle DCP semanal.
function EnvelopesCustom({data,onUpdate}){
  const envelopes=useMemo(()=>calcularEnvelopesCustom(data),[data.fluxo,data.cartaoPF,data.cartaoPJ,data.config]);
  const [form,setForm]=useState(null); // null=fechado, {} preenchido = form aberto (novo ou edicao)
  const [expandido,setExpandido]=useState(null);
  const [load,setLoad]=useState(false);

  function abrirNovo(){ setForm({id:"",nome:"",teto:"",dataIni:hoje(),dataFim:hoje(),periodicidade:"",ancoraDia:1,ativo:"S",cofreId:""}); }
  function abrirEdicao(env){
    setForm({id:env.id,nome:env.nome,teto:formatarValorInicial(env.teto),dataIni:env.dataIni,
      dataFim:env.dataFim||hoje(),periodicidade:env.periodicidade||"",
      ancoraDia:env.ancoraDia!=null?env.ancoraDia:1,ativo:env.ativo||"S",cofreId:env.cofreId||""});
  }

  async function vincularCofre(novoCofreId){
    setLoad(true);
    try{
      const r=await api({action:"vincularCofreEnvelope",envelopeId:form.id,cofreId:novoCofreId});
      onUpdate(r);
      setForm(f=>({...f,cofreId:novoCofreId}));
    }catch(e){alert(e.message);}
    setLoad(false);
  }

  async function salvar(){
    if(!form.nome.trim()||!numBR(form.teto)||!form.dataIni) return;
    if(!form.periodicidade&&!form.dataFim) return;
    setLoad(true);
    try{
      const r=await api({action:"salvarEnvelope",id:form.id,nome:form.nome.trim(),teto:numBR(form.teto),
        dataIni:form.dataIni,dataFim:form.dataFim,periodicidade:form.periodicidade,
        ancoraDia:form.ancoraDia,ativo:form.ativo});
      onUpdate(r); setForm(null);
    }catch(e){alert(e.message);}
    setLoad(false);
  }

  async function alternarAtivo(env){
    setLoad(true);
    try{
      const r=await api({action:"salvarEnvelope",id:env.id,nome:env.nome,teto:env.teto,dataIni:env.dataIni,
        periodicidade:env.periodicidade,ancoraDia:env.ancoraDia,ativo:env.ativo==="N"?"S":"N"});
      onUpdate(r);
    }catch(e){alert(e.message);}
    setLoad(false);
  }

  async function apagar(env){
    if(!window.confirm('Apagar o envelope "'+env.nome+'"? Os lançamentos já classificados continuam no Fluxo/Cartões normalmente, só perdem a etiqueta.')) return;
    setLoad(true);
    try{ onUpdate(await api({action:"apagarEnvelope",id:env.id})); }
    catch(e){alert(e.message);}
    setLoad(false);
  }

  return <div>
    <div style={{padding:"12px 14px"}}>
      <button onClick={abrirNovo} style={{width:"100%",padding:"10px",borderRadius:10,background:C.purple,color:"#fff",fontSize:13,fontWeight:700,border:"none",cursor:"pointer",fontFamily:"inherit"}}>
        + Novo envelope
      </button>
    </div>

    {form&&<div style={{background:C.purpleLight,border:"1px solid "+C.purple,borderRadius:10,padding:"14px 16px",margin:"0 14px 14px"}}>
      <div style={{fontSize:12,fontWeight:700,color:C.purple,marginBottom:8}}>{form.id?"Editar envelope":"Novo envelope"}</div>
      <input value={form.nome} onChange={e=>setForm({...form,nome:e.target.value})} placeholder="Nome (ex: Festa de aniversário da filha)"
        style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"1px solid "+C.border,fontSize:13,fontFamily:"inherit",marginBottom:8}}/>
      <input type="text" inputMode="numeric" value={form.teto} onChange={e=>setForm({...form,teto:formatarMoedaInput(e.target.value)})} placeholder="Teto (R$)"
        disabled={!!form.cofreId}
        style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"1px solid "+C.border,fontSize:13,fontFamily:"inherit",marginBottom:8,background:form.cofreId?C.borderLight:C.surface}}/>

      {form.id&&<div style={{background:C.surface,borderRadius:8,padding:"8px 10px",marginBottom:8}}>
        <div style={{fontSize:9,color:C.textMuted,marginBottom:4}}>VINCULAR A UM COFRE (teto passa a ser o saldo dele, sempre)</div>
        {form.cofreId
          ?<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:12,color:C.teal,fontWeight:700}}>
              🏦 {(data.cofres||[]).find(c=>c.id===form.cofreId)?.nome||"(cofre removido)"}
            </span>
            <button onClick={()=>vincularCofre("")} disabled={load}
              style={{fontSize:11,color:C.textMuted,background:"none",border:"1px solid "+C.border,borderRadius:6,padding:"4px 8px",cursor:"pointer",fontFamily:"inherit"}}>
              Desvincular
            </button>
          </div>
          :<select onChange={e=>{if(e.target.value)vincularCofre(e.target.value);}} value=""
            style={{width:"100%",padding:"6px 8px",borderRadius:6,border:"1px solid "+C.border,fontSize:12,fontFamily:"inherit",background:C.surface}} disabled={load}>
            <option value="">Nenhum (teto fixo, como hoje)</option>
            {(data.cofres||[]).map(c=><option key={c.id} value={c.id}>{c.nome} · {fmt(c.saldo)}</option>)}
          </select>}
        {!(data.cofres||[]).length&&!form.cofreId&&<div style={{fontSize:10,color:C.textMuted,marginTop:4,fontStyle:"italic"}}>Nenhum cofre criado ainda (Ferramentas → Cofres).</div>}
      </div>}

      <div style={{fontSize:9,color:C.textMuted,marginBottom:3}}>TIPO</div>
      <select value={form.periodicidade} onChange={e=>setForm({...form,periodicidade:e.target.value})}
        style={{width:"100%",padding:"7px 8px",borderRadius:8,border:"1px solid "+C.border,fontSize:12,fontFamily:"inherit",marginBottom:8,background:C.surface}}>
        {Object.entries(PERIODICIDADE_LABEL).map(([k,v])=><option key={k} value={k}>{v}</option>)}
      </select>

      <div style={{display:"flex",gap:8,marginBottom:8}}>
        <div style={{flex:1}}>
          <div style={{fontSize:9,color:C.textMuted,marginBottom:3}}>INÍCIO</div>
          <input type="date" value={form.dataIni} onChange={e=>setForm({...form,dataIni:e.target.value})}
            style={{width:"100%",padding:"7px 8px",borderRadius:8,border:"1px solid "+C.border,fontSize:12,fontFamily:"inherit"}}/>
        </div>
        {!form.periodicidade&&<div style={{flex:1}}>
          <div style={{fontSize:9,color:C.textMuted,marginBottom:3}}>FIM</div>
          <input type="date" value={form.dataFim} onChange={e=>setForm({...form,dataFim:e.target.value})}
            style={{width:"100%",padding:"7px 8px",borderRadius:8,border:"1px solid "+C.border,fontSize:12,fontFamily:"inherit"}}/>
        </div>}
        {form.periodicidade==="semanal"&&<div style={{flex:1}}>
          <div style={{fontSize:9,color:C.textMuted,marginBottom:3}}>RENOVA TODA</div>
          <select value={form.ancoraDia} onChange={e=>setForm({...form,ancoraDia:Number(e.target.value)})}
            style={{width:"100%",padding:"7px 8px",borderRadius:8,border:"1px solid "+C.border,fontSize:12,fontFamily:"inherit",background:C.surface}}>
            {DIAS_SEMANA_LABEL.map((d,i)=><option key={i} value={i}>{d}</option>)}
          </select>
        </div>}
        {(form.periodicidade==="mensal"||form.periodicidade==="trimestral"||form.periodicidade==="semestral")&&<div style={{flex:1}}>
          <div style={{fontSize:9,color:C.textMuted,marginBottom:3}}>VIRA NO DIA</div>
          <select value={form.ancoraDia} onChange={e=>setForm({...form,ancoraDia:Number(e.target.value)})}
            style={{width:"100%",padding:"7px 8px",borderRadius:8,border:"1px solid "+C.border,fontSize:12,fontFamily:"inherit",background:C.surface}}>
            <option value={1}>Dia 1</option>
            <option value={15}>Dia 15</option>
          </select>
        </div>}
      </div>
      {form.periodicidade==="quinzenal"&&<div style={{fontSize:10,color:C.textMuted,marginBottom:8,fontStyle:"italic"}}>Corte fixo: todo dia 1 e todo dia 15 do mês.</div>}
      {form.periodicidade&&<div style={{fontSize:10,color:C.textMuted,marginBottom:8}}>Renova sozinho, sem data fim — o 1º período pode ser mais curto se {fmtD(form.dataIni)} não cair no dia da virada.</div>}

      <div style={{display:"flex",gap:8}}>
        <button onClick={salvar} disabled={load} style={{flex:1,padding:"9px",borderRadius:8,background:C.purple,color:"#fff",fontSize:12,fontWeight:700,border:"none",cursor:"pointer",fontFamily:"inherit"}}>
          {load?"Salvando...":"Salvar"}
        </button>
        <button onClick={()=>setForm(null)} style={{padding:"9px 14px",borderRadius:8,background:"transparent",color:C.textMuted,fontSize:12,border:"1px solid "+C.border,cursor:"pointer",fontFamily:"inherit"}}>
          Cancelar
        </button>
      </div>
    </div>}

    {!envelopes.length&&!form&&<div style={{padding:"40px 20px",textAlign:"center",color:C.textMuted,fontSize:14}}>Nenhum envelope criado ainda — toca "+ Novo envelope" acima.</div>}

    {envelopes.map(env=>{
      const aberto=expandido===env.id;
      const pct=env.teto>0?Math.min(100,Math.max(0,(env.gasto/env.teto)*100)):0;
      const estourado=env.saldo<0;
      const periodoLabel=env.periodicidade
        ?(env.periodoAtual?periodoEnvelopeCompacto(env.periodoAtual.inicio,env.periodoAtual.fim):"—")
        :periodoEnvelopeCompacto(env.dataIni,env.dataFim);
      const nLancamentos=env.periodicidade?(env.itensAtual||[]).length:env.itens.length;
      return <div key={env.id} style={{borderBottom:"1px solid "+C.borderLight}}>
        <div onClick={()=>setExpandido(aberto?null:env.id)} style={{padding:"12px 14px",cursor:"pointer",opacity:env.encerrado?0.65:1}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:700,color:C.text}}>
                {env.nome}
                {env.periodicidade&&<span style={{marginLeft:6,fontSize:9,fontWeight:700,color:C.purple,background:C.purpleLight,padding:"1px 5px",borderRadius:4}}>🔁 {PERIODICIDADE_LABEL[env.periodicidade]}</span>}
                {env.encerrado&&<span style={{marginLeft:6,fontSize:9,fontWeight:700,color:C.textMuted}}>{env.periodicidade?"PAUSADO":"ENCERRADO"}</span>}
              </div>
              <div style={{fontSize:10,color:C.textMuted,marginTop:1}}>{periodoLabel} · {nLancamentos} lançamento(s)</div>
            </div>
            <span style={{fontSize:12,color:C.textMuted}}>{aberto?"▲":"▼"}</span>
          </div>
          <div style={{height:6,background:C.borderLight,borderRadius:3,overflow:"hidden",marginBottom:4}}>
            <div style={{height:"100%",width:pct+"%",background:estourado?"#B45309":C.green,borderRadius:3}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:11}}>
            <span style={{color:C.textMuted}}>{fmt(env.gasto)} de {fmt(env.teto)}</span>
            <span style={{fontWeight:700,color:estourado?"#B45309":C.green}}>{estourado?"estourou ":"disponível "}{fmt(Math.abs(env.saldo))}</span>
          </div>
        </div>
        {aberto&&<div style={{background:"#FAFAFA",padding:"4px 0"}}>
          {env.periodicidade
            ? (!(env.itensAtual||[]).length
                ? <div style={{padding:"10px 20px",fontSize:12,color:C.textMuted,fontStyle:"italic"}}>Nenhum lançamento classificado neste período ainda.</div>
                : env.itensAtual.map(it=><div key={it.origem+":"+it.row} style={{display:"flex",justifyContent:"space-between",padding:"6px 16px",fontSize:12}}>
                    <span style={{color:C.textSub}}>{fmtD(it.data)} · {it.descricao}</span>
                    <span style={{fontWeight:600,color:it.valor<0?C.red:C.blue}}>{fmt(it.valor)}</span>
                  </div>))
            : (!env.itens.length
                ? <div style={{padding:"10px 20px",fontSize:12,color:C.textMuted,fontStyle:"italic"}}>Nenhum lançamento classificado ainda.</div>
                : env.itens.map(it=><div key={it.origem+":"+it.row} style={{display:"flex",justifyContent:"space-between",padding:"6px 16px",fontSize:12}}>
                    <span style={{color:C.textSub}}>{fmtD(it.data)} · {it.descricao}</span>
                    <span style={{fontWeight:600,color:it.valor<0?C.red:C.blue}}>{fmt(it.valor)}</span>
                  </div>))
          }
          {env.periodicidade&&env.historico.length>0&&<div style={{padding:"8px 16px 2px"}}>
            <div style={{fontSize:9,color:C.textMuted,fontWeight:700,letterSpacing:".05em",marginBottom:4}}>PERÍODOS ANTERIORES</div>
            {env.historico.slice(0,8).map(h=>{
              const hEstourado=h.saldo<0;
              const hPct=env.teto>0?Math.min(100,Math.max(0,(h.gasto/env.teto)*100)):0;
              return <div key={h.inicio} style={{marginBottom:5}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:C.textSub,marginBottom:2}}>
                  <span>{periodoEnvelopeCompacto(h.inicio,h.fim)}</span>
                  <span style={{fontWeight:700,color:hEstourado?"#B45309":C.textMuted}}>{fmt(h.gasto)}{hEstourado?" (estourou)":""}</span>
                </div>
                <div style={{height:4,background:C.borderLight,borderRadius:2,overflow:"hidden"}}>
                  <div style={{height:"100%",width:hPct+"%",background:hEstourado?"#B45309":C.green,borderRadius:2}}/>
                </div>
              </div>;
            })}
          </div>}
          <div style={{display:"flex",gap:8,padding:"10px 16px 4px"}}>
            <button onClick={()=>abrirEdicao(env)} style={{flex:1,padding:"7px",borderRadius:6,background:C.purpleLight,color:C.purple,fontSize:11,fontWeight:700,border:"none",cursor:"pointer",fontFamily:"inherit"}}>
              Editar
            </button>
            {env.periodicidade&&<button onClick={()=>alternarAtivo(env)} disabled={load} style={{flex:1,padding:"7px",borderRadius:6,background:"transparent",color:C.textSub,fontSize:11,fontWeight:700,border:"1px solid "+C.border,cursor:"pointer",fontFamily:"inherit"}}>
              {env.encerrado?"▶ Reativar":"⏸ Pausar"}
            </button>}
            <button onClick={()=>apagar(env)} style={{flex:1,padding:"7px",borderRadius:6,background:"transparent",color:C.red,fontSize:11,fontWeight:700,border:"1px dashed #FECACA",cursor:"pointer",fontFamily:"inherit"}}>
              🗑 Apagar envelope
            </button>
          </div>
        </div>}
      </div>;
    })}
  </div>;
}

// ── CONCILIAR EXTRATO (conta corrente) ───────────────────────────────────────
// Fechado 13/07/2026 -- mesmo espirito da conciliação de fatura, mas pra
// conta corrente. Upload único de .csv ou .ofx do extrato Nubank; o backend
// devolve 3 grupos: paraBaixar (PROGRAMADO que bateu com o extrato -- ex.
// boleto do dia 16 que debitou de verdade), novos (no extrato mas não no
// Fluxo) e aguardando (no Fluxo mas ainda não apareceu no extrato). Cada
// "novo" já vem com sugestão de categoria (Rose/André/Bianca/Intensiva/RDB)
// calculada no backend por palavra-chave -- nunca Gemini.
// ── HUB DE CONCILIAÇÃO ───────────────────────────────────────────────────────
// Ponto único de organização, pedido pelo Marcus (13/07) só pra não precisar
// lembrar "onde fica cada coisa" -- NÃO move a conciliação de fatura de
// verdade (isso continua morando dentro da tela Cartões, entrelaçado com a
// lista de lançamentos, selos 🟡/🟠 e o ⋮ de cada item -- mover de fato
// exigiria reestruturar esse estado pra ser compartilhado entre telas, risco
// desnecessário pra um pedido que era só organizacional). Cartão PF/PJ aqui
// só navegam pra aba Cartões já com o cartão certo pré-selecionado
// (reaproveita o mesmo mecanismo de "destaque" que a aba DCP já usa pra
// pular pro lançamento certo -- só que sem `row`, então só troca de cartão,
// não rola a tela). Extrato mostra a tela de conciliação de extrato embutida
// aqui mesmo, sem navegar pra lugar nenhum.
// [NOVO 19/07] Contexto pessoal (o que o Gemini sabe sobre quem está usando
// o app) + apelidos de descrição (padrao->apelido, ex: "RDB"->"CAIXINHA
// NUBANK") -- os dois substituem o que antes eram regras fixas no prompt,
// especificas de uma pessoa so. Qualquer instancia configura o proprio.
// [NOVO 20/07] Tela de Configurações -- reune o que era espalhado (botão
// Servidor no cabeçalho, config de cartão dentro da própria tela Cartões)
// num lugar só. A edição de cartão em si continua morando na tela Cartões
// (dentro do painel "⚙️ Configurações de cartão", protegido) -- aqui só
// mostra um resumo + atalho, pra não duplicar estado/lógica em dois lugares.
// [NOVO 20/07] Cofres -- etapa 1 da spec (MODELO_COFRES_ESPECIFICACAO_COMPLETA.md):
// cadastro + aporte/resgate como lançamento comum. Ainda sem vínculo com
// Envelope (isso é a etapa 2) nem correção CDI (etapa 3) -- o campo % CDI já
// fica salvo no cadastro pra não precisar migrar depois, mas não faz nada
// ainda.
function CardCofre({cofre,onUpdate}){
  const [tipoAcao,setTipoAcao]=useState("aporte");
  const [valor,setValor]=useState("");
  const [load,setLoad]=useState(false);
  const [loadApagar,setLoadApagar]=useState(false);
  const [loadRendimento,setLoadRendimento]=useState(false);
  const [resultadoRendimento,setResultadoRendimento]=useState(null);
  const [ajustando,setAjustando]=useState(false);
  const [saldoReal,setSaldoReal]=useState("");
  const [loadAjuste,setLoadAjuste]=useState(false);

  async function ajustar(){
    const v=numBR(saldoReal);
    if(saldoReal===""||isNaN(v)){ alert("Informe o saldo real que você vê no banco."); return; }
    setLoadAjuste(true);
    try{
      const r=await api({action:"ajustarSaldoCofre",cofreId:cofre.id,saldoReal:v});
      onUpdate&&onUpdate(r);
      setAjustando(false);setSaldoReal("");
      const res=r._resultadoAjusteCofre;
      if(res) alert((res.diferenca>=0?"Corrigido: +":"Corrigido: ")+fmt(res.diferenca)+" em relação ao que o app tinha calculado.");
    }catch(e){alert(e.message);}
    setLoadAjuste(false);
  }

  async function atualizarRendimento(){
    setLoadRendimento(true);
    try{
      const r=await api({action:"atualizarRendimentoCofre",cofreId:cofre.id});
      setResultadoRendimento(r._resultadoRendimentoCofre||null);
      onUpdate&&onUpdate(r);
    }catch(e){alert(e.message);}
    setLoadRendimento(false);
  }

  async function lancar(){
    const v=numBR(valor);
    if(!v||v<=0){ alert("Informe um valor válido."); return; }
    setLoad(true);
    try{
      const r=await api({action:"lancarCofre",cofreId:cofre.id,tipoCofre:tipoAcao,valor:v});
      onUpdate&&onUpdate(r);
      setValor("");
    }catch(e){alert(e.message);}
    setLoad(false);
  }
  async function apagar(){
    if(!confirm("Apagar o cofre \""+cofre.nome+"\"? Só funciona se o saldo estiver zerado."))return;
    setLoadApagar(true);
    try{ onUpdate&&onUpdate(await api({action:"apagarCofre",id:cofre.id})); }
    catch(e){alert(e.message);}
    setLoadApagar(false);
  }

  return <div style={{background:C.tealLight,border:"1px solid #99F6E4",borderRadius:10,padding:10,marginBottom:8}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
      <div>
        <div style={{fontSize:13,fontWeight:700,color:C.text}}>🏦 {cofre.nome}</div>
        <div style={{fontSize:10,color:C.textMuted}}>correção {cofre.percentualCdi}% CDI · rendimento acumulado: {fmt(cofre.rendimentoAcumulado||0)}</div>
      </div>
      <div style={{fontSize:16,fontWeight:800,color:C.teal}}>{fmt(cofre.saldo)}</div>
    </div>
    <button onClick={atualizarRendimento} disabled={loadRendimento}
      style={{width:"100%",marginTop:6,background:"none",border:"1px solid "+C.teal,color:C.teal,borderRadius:6,padding:"5px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
      {loadRendimento?"Buscando CDI no Banco Central…":"🔄 Atualizar rendimento agora"}
    </button>
    {resultadoRendimento&&<div style={{fontSize:10,color:resultadoRendimento.atualizado?C.textSub:C.textMuted,marginTop:4,fontStyle:resultadoRendimento.atualizado?"normal":"italic"}}>
      {resultadoRendimento.atualizado
        ?`${resultadoRendimento.diasUteis} dia(s) útil(eis): +${fmt(resultadoRendimento.jurosAcumulado)} de rendimento`
        :resultadoRendimento.motivo}
    </div>}
    <div style={{fontSize:9,color:C.textMuted,marginTop:4,fontStyle:"italic"}}>Também roda sozinho, automaticamente, na virada de ciclo (dia 16).</div>

    {!ajustando
      ?<button onClick={()=>{setSaldoReal(formatarValorInicial(cofre.saldo));setAjustando(true);}}

function ConciliarExtratoTab({data,onUpdate}){
  const CATEGORIAS=["DCP","DESPESA FIXA","RECEITA","DEPOSITO_AVULSO","DIVIDA_PARCELADA","DIVIDA_NAO_PARCELADA","EXTRAORDINARIA","IMPOSTO","INVESTIMENTO"];
  const [resultado,setResultado]=useState(null);
  const [load,setLoad]=useState(false);
  const [cfgNovos,setCfgNovos]=useState({}); // chave estavel (chaveNovo) -> {incluir,categoria,descricao}
  const fileRef=useRef(null);

  // Chave ESTAVEL de um "novo" -- nunca a posicao no array. Usar indice como
  // chave e uma armadilha: toda vez que um item e lancado/dispensado, a
  // lista encolhe e os itens seguintes deslizam pra posicoes menores, mas o
  // cfgNovos guardado por indice fica parado na posicao antiga -- o proximo
  // item que ocupa aquela posicao "herda" a configuracao (categoria/desc)
  // de um item completamente diferente que ja foi embora. Foi exatamente
  // isso que fez um Resgate RDB aparecer sugerido como "ROSE (FAXINA)" e
  // marcado pra lancar (bug real, 13/07). Usar o identificador (ou, na
  // falta dele, data+valor+descricao) resolve de vez -- a chave sempre
  // aponta pro MESMO item, nao importa quantos outros sumiram da lista.
  function chaveNovo(n){ return n.identificador || (n.data+"|"+n.valor+"|"+n.descricao); }

  // Regra confirmada pelo Marcus (13/07): quem escolhe a fatura que um
  // pagamento abate e a propria DATA do pagamento no extrato -- mesma regra
  // de fechamento/vencimento usada em toda a tela de Cartões (agora
  // configurável, ver configFatura/mesFechamentoDaData/calcVencimentoFaturaISO).
  function vencimentoFaturaDoMes(dataISO){
    const fv=configFatura(data);
    const mf=mesFechamentoDaData(dataISO,fv.fechamento);
    return calcVencimentoFaturaISO(mf.ano,mf.mes,fv.fechamento,fv.vencimento);
  }
  // Acha a linha real do FLUXO da fatura (aberta OU fechada, tanto faz --
  // pagarFaturaAvulso nao se importa com o status) pro cartao e vencimento
  // calculados. Usa data.fluxo, que ja esta carregado -- sem ida ao backend.
  function acharFaturaRow(cartao,vencimentoISO){
    const tipoAlvo="CARTAO"+cartao;
    const achado=(data.fluxo||[]).find(r=>{
      const tNorm=String(r.tipo||"").toUpperCase().replace(/[^A-Z0-9]/g,"");
      return tNorm===tipoAlvo&&r.data===vencimentoISO;
    });
    return achado?achado.row:null;
  }

  async function processar(file){
    setLoad(true);
    try{
      const lido=await lerArquivoExtrato(file);
      if(!lido.transacoes.length){ alert("Não encontrei transações nesse arquivo."); setLoad(false); return; }
      const r=await api({action:"conciliarExtrato",transacoes:lido.transacoes,acctid:lido.acctid||"",
        saldoBanco:lido.saldoFinal,dataSaldoBanco:lido.dataSaldoFinal});
      setResultado(r);
      const pre={};
      r.novos.forEach(n=>{
        const s=n.sugestao||{};
        pre[chaveNovo(n)]={incluir:!s.ignorar, categoria:s.categoria||(n.valor>0?"DEPOSITO_AVULSO":"EXTRAORDINARIA"), descricao:s.descricaoSugerida||n.descricao.slice(0,60).toUpperCase(), pagFatura:null};
      });
      setCfgNovos(pre);
    }catch(e){ alert(e.message); }
    setLoad(false);
  }

  async function criarAjuste(){
    if(!resultado||!resultado.comparacaoSaldo||resultado.comparacaoSaldo.bate) return;
    const {diferenca,data}=resultado.comparacaoSaldo;
    setLoad(true);
    try{
      const r=await api({action:"lancar",data,descricao:"AJUSTE",valor:diferenca,tipo:"EXTRAORDINARIA",
        categoria:"EXTRAORDINARIA",forma:"CONTA",status:"EXECUTADO",obs:""});
      onUpdate(r);
      setResultado(res=>({...res,comparacaoSaldo:{...res.comparacaoSaldo,bate:true,ajustado:true}}));
    }catch(e){ alert(e.message); }
    setLoad(false);
  }

  async function confirmarBaixa(item){
    setLoad(true);
    try{
      const r=await api({action:"baixa",row:item.row,valorReal:item.valor,dataReal:item.dataReal});
      onUpdate(r);
      setResultado(res=>({...res,paraBaixar:res.paraBaixar.filter(x=>x.row!==item.row)}));
    }catch(e){ alert(e.message); }
    setLoad(false);
  }

  async function lancarNovo(n){
    const cfg=cfgNovos[chaveNovo(n)];
    if(!cfg) return;
    setLoad(true);
    try{
      let r;
      if(cfg.pagFatura){
        const venc=vencimentoFaturaDoMes(n.data);
        const row=acharFaturaRow(cfg.pagFatura,venc);
        if(!row){ alert("Não achei a fatura "+cfg.pagFatura+" com vencimento "+fmtD(venc)+" no Fluxo -- confirme se esse ciclo já foi gerado."); setLoad(false); return; }
        r=await api({action:"pagarFaturaAvulso",row,valorPago:Math.abs(Number(n.valor)),data:n.data});
      }else{
        let obsNovo={};
        if(n.identificador) obsNovo.extratoId=n.identificador;
        if(cfg.envelopeId) obsNovo.envelope=cfg.envelopeId;
        r=await api({action:"lancar",data:n.data,descricao:cfg.descricao.toUpperCase(),
          valor:Number(n.valor),tipo:cfg.categoria,categoria:cfg.categoria,forma:"CONTA",
          status:"EXECUTADO",obs:JSON.stringify(obsNovo)});
      }
      onUpdate(r);
      setResultado(res=>({...res,novos:res.novos.filter(x=>chaveNovo(x)!==chaveNovo(n))}));
    }catch(e){ alert(e.message); }
    setLoad(false);
  }

  // "Lancar todos os marcados" -- poupa tempo de clicar item por item.
  // Itens normais vao numa UNICA escrita em lote (lancarLote); itens
  // marcados como pagamento de fatura precisam ser processados um a um
  // (pagarFaturaAvulso mexe na linha da fatura + cria a linha do pagamento,
  // nao da pra combinar isso numa escrita em lote generica sem arriscar
  // duas chamadas mirando a MESMA linha de fatura ao mesmo tempo).
  async function lancarTodosMarcados(){
    const marcados=resultado.novos.filter(n=>cfgNovos[chaveNovo(n)]?.incluir);
    if(!marcados.length) return;
    setLoad(true);
    try{
      const normais=marcados.filter(n=>!cfgNovos[chaveNovo(n)].pagFatura);
      const pagamentos=marcados.filter(n=>cfgNovos[chaveNovo(n)].pagFatura);

      if(normais.length){
        const itens=normais.map(n=>{
          const cfg=cfgNovos[chaveNovo(n)];
          let obsNovo={};
          if(n.identificador) obsNovo.extratoId=n.identificador;
          if(cfg.envelopeId) obsNovo.envelope=cfg.envelopeId;
          return {data:n.data, descricao:cfg.descricao.toUpperCase(), valor:Number(n.valor), tipo:cfg.categoria,
            categoria:cfg.categoria, forma:"CONTA", status:"EXECUTADO",
            obs:Object.keys(obsNovo).length?JSON.stringify(obsNovo):""};
        });
        onUpdate(await api({action:"lancarLote",itens}));
      }
      for(const n of pagamentos){
        const cfg=cfgNovos[chaveNovo(n)];
        const venc=vencimentoFaturaDoMes(n.data);
        const row=acharFaturaRow(cfg.pagFatura,venc);
        if(!row){ alert("Não achei a fatura "+cfg.pagFatura+" com vencimento "+fmtD(venc)+" pra \""+n.descricao.slice(0,40)+"\" -- pulei esse, os outros continuam."); continue; }
        onUpdate(await api({action:"pagarFaturaAvulso",row,valorPago:Math.abs(Number(n.valor)),data:n.data}));
      }

      const chavesLancadas=new Set(marcados.map(chaveNovo));
      setResultado(res=>({...res,novos:res.novos.filter(x=>!chavesLancadas.has(chaveNovo(x)))}));
    }catch(e){ alert(e.message); }
    setLoad(false);
  }

  function dispensar(n){
    setResultado(res=>({...res,novos:res.novos.filter(x=>chaveNovo(x)!==chaveNovo(n))}));
  }

  return <div style={{padding:"12px 14px"}}>
    <div style={{fontSize:12,color:C.textMuted,marginBottom:12,lineHeight:1.5}}>
      Sobe o extrato da conta corrente (.csv ou .ofx do Nubank) — o app compara com o que já está no Fluxo e separa em três grupos: contas programadas que já debitaram de verdade (pra dar baixa), gastos novos que ainda não foram lançados, e lançamentos que ainda não apareceram no extrato.
    </div>

    <input ref={fileRef} type="file" accept=".csv,.ofx" style={{display:"none"}}
      onChange={e=>{const f=e.target.files[0];if(f)processar(f);e.target.value="";}}/>
    <button onClick={()=>fileRef.current.click()} disabled={load}
      style={{width:"100%",padding:"10px",borderRadius:10,background:C.orange,color:"#fff",
        fontSize:13,fontWeight:700,border:"none",cursor:load?"default":"pointer",fontFamily:"inherit",
        marginBottom:16,opacity:load?.6:1}}>
      {load?"Processando...":"📥 Conciliar extrato (CSV ou OFX)"}
    </button>

    {!resultado&&!load&&<div style={{textAlign:"center",color:C.textMuted,fontSize:13,padding:"20px 0"}}>
      Nenhum extrato conciliado ainda nesta sessão.
    </div>}

    {resultado&&<>
      <div style={{fontSize:11,color:C.textMuted,marginBottom:14}}>
        Período do extrato: {fmtD(resultado.periodo.inicio)} a {fmtD(resultado.periodo.fim)} · {resultado.totalTransacoes} transação(ões)
      </div>

      {resultado.comparacaoSaldo&&<div style={{marginBottom:18,padding:"12px 14px",borderRadius:10,
        background:resultado.comparacaoSaldo.bate?C.greenLight:"#FEF3C7",
        border:"1px solid "+(resultado.comparacaoSaldo.bate?C.green:"#F59E0B")}}>
        {resultado.comparacaoSaldo.bate?
          <div style={{fontSize:13,fontWeight:700,color:C.green}}>
            ✓ Saldo bate em {fmtD(resultado.comparacaoSaldo.data)}{resultado.comparacaoSaldo.ajustado?" (ajustado agora)":""} — {fmt(resultado.comparacaoSaldo.saldoBanco)}
          </div>
        :<>
          <div style={{fontSize:13,fontWeight:700,color:"#92400E",marginBottom:4}}>
            ⚠️ Saldo não bate em {fmtD(resultado.comparacaoSaldo.data)}
          </div>
          <div style={{fontSize:11,color:"#78350F",marginBottom:8}}>
            Banco: {fmt(resultado.comparacaoSaldo.saldoBanco)} · App: {fmt(resultado.comparacaoSaldo.saldoApp)} · Diferença: {fmt(resultado.comparacaoSaldo.diferenca)}
          </div>
          {resultado.comparacaoSaldo.candidatos&&resultado.comparacaoSaldo.candidatos.length>0&&<div style={{marginBottom:8}}>
            <div style={{fontSize:10,fontWeight:700,color:"#92400E",marginBottom:4,letterSpacing:".05em"}}>CANDIDATOS MAIS PROVÁVEIS</div>
            {resultado.comparacaoSaldo.candidatos.map(c=><div key={c.row} style={{display:"flex",justifyContent:"space-between",fontSize:11,padding:"3px 0"}}>
              <span style={{color:"#78350F"}}>{fmtD(c.data)} · {c.desc}</span>
              <span style={{fontWeight:600,color:"#92400E"}}>{fmt(c.valor)}</span>
            </div>)}
          </div>}
          <button onClick={criarAjuste} disabled={load}
            style={{width:"100%",padding:"8px",borderRadius:6,background:"#D97706",color:"#fff",fontSize:11,fontWeight:700,border:"none",cursor:"pointer",fontFamily:"inherit"}}>
            Criar lançamento de ajuste ({fmt(resultado.comparacaoSaldo.diferenca)})
          </button>
        </>}
      </div>}

      {resultado.paraBaixar.length>0&&<div style={{marginBottom:20}}>
        <div style={{fontSize:11,fontWeight:700,color:C.accent,marginBottom:6,letterSpacing:".05em"}}>
          ✅ JÁ DEBITOU — DAR BAIXA ({resultado.paraBaixar.length})
        </div>
        {resultado.paraBaixar.map(item=><div key={item.row} style={{background:C.accentLight,borderRadius:8,padding:"10px 12px",marginBottom:6}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <span style={{fontSize:13,fontWeight:600,color:C.text}}>{item.desc}</span>
            <span style={{fontSize:13,fontWeight:700,color:C.red}}>{fmt(item.valor)}</span>
          </div>
          <div style={{fontSize:10,color:C.textMuted,marginBottom:8}}>Programado pra {fmtD(item.dataProgramada)} · debitou de fato em {fmtD(item.dataReal)}</div>
          <button onClick={()=>confirmarBaixa(item)} disabled={load}
            style={{width:"100%",padding:"7px",borderRadius:6,background:C.accent,color:"#fff",fontSize:11,fontWeight:700,border:"none",cursor:"pointer",fontFamily:"inherit"}}>
            Dar baixa
          </button>
        </div>)}
      </div>}

      {(()=>{
        const comAviso=(resultado.confirmados||[]).filter(c=>c.avisoClassificacao)
          .map(c=>({...c,item:(data.fluxo||[]).find(f=>f.row===c.row)})).filter(c=>c.item);
        return comAviso.length>0&&<div style={{marginBottom:20}}>
          <div style={{fontSize:11,fontWeight:700,color:"#B45309",marginBottom:6,letterSpacing:".05em"}}>
            ⚠️ POSSÍVEL CLASSIFICAÇÃO ERRADA ({comAviso.length})
          </div>
          {comAviso.map(c=><div key={c.row} style={{background:"#FFF7ED",border:"1px solid #FDBA74",borderRadius:8,padding:"10px 12px",marginBottom:6}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <span style={{fontSize:13,fontWeight:600,color:C.text}}>{c.item.descricao}</span>
              <span style={{fontSize:13,fontWeight:700,color:C.red}}>{fmt(c.item.valor)}</span>
            </div>
            <div style={{fontSize:11,color:"#92400E",marginBottom:8}}>
              Está como <b>{CAT_LABEL[c.avisoClassificacao.categoriaAtual]||c.avisoClassificacao.categoriaAtual}</b>, mas o texto bate com uma regra que espera <b>{CAT_LABEL[c.avisoClassificacao.categoriaEsperada]||c.avisoClassificacao.categoriaEsperada}</b>.
            </div>
            <button onClick={async()=>{setLoad(true);try{onUpdate(await api({action:"editar",row:c.row,campo:"CATEGORIA",valor:c.avisoClassificacao.categoriaEsperada}));}catch(e){alert(e.message);}setLoad(false);}} disabled={load}
              style={{width:"100%",padding:"7px",borderRadius:6,background:"#B45309",color:"#fff",fontSize:11,fontWeight:700,border:"none",cursor:"pointer",fontFamily:"inherit"}}>
              Corrigir para {CAT_LABEL[c.avisoClassificacao.categoriaEsperada]||c.avisoClassificacao.categoriaEsperada}
            </button>
          </div>)}
        </div>;
      })()}

      {resultado.novos.length>0&&<div style={{marginBottom:20}}>
        <div style={{fontSize:11,fontWeight:700,color:"#C2410C",marginBottom:6,letterSpacing:".05em"}}>
          🔴 NOVOS NO EXTRATO ({resultado.novos.length})
        </div>
        {(()=>{const nMarcados=resultado.novos.filter(n=>cfgNovos[chaveNovo(n)]?.incluir).length;return <button onClick={lancarTodosMarcados} disabled={load||!nMarcados}
          style={{width:"100%",padding:"9px",borderRadius:8,background:nMarcados?"#C2410C":C.borderLight,color:nMarcados?"#fff":C.textMuted,fontSize:12,fontWeight:700,border:"none",cursor:nMarcados?"pointer":"default",fontFamily:"inherit",marginBottom:10}}>
          Lançar todos os marcados ({nMarcados})
        </button>;})()}
        {resultado.novos.map(n=>{
          const chave=chaveNovo(n);
          const cfg=cfgNovos[chave]||{incluir:true,categoria:"EXTRAORDINARIA",descricao:"",pagFatura:null,envelopeId:envelopeRegraSugerido(n.descricao,data)};
          const s=n.sugestao||{};
          const vencAuto=vencimentoFaturaDoMes(n.data);
          return <div key={chave} style={{background:"#FFF7ED",border:"1px solid #FED7AA",borderRadius:8,padding:"10px 12px",marginBottom:6}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
              <span style={{fontSize:11,color:C.textMuted}}>{fmtD(n.data)}</span>
              <span style={{fontSize:13,fontWeight:700,color:n.valor<0?C.red:C.blue}}>{fmt(n.valor)}</span>
            </div>
            <div style={{fontSize:11,color:C.textSub,marginBottom:8,wordBreak:"break-word"}}>{n.descricao}</div>
            {s.motivo&&<div style={{fontSize:10,color:"#92400E",background:"#FEF3C7",borderRadius:6,padding:"6px 8px",marginBottom:8}}>ℹ️ {s.motivo} — desmarcado por padrão, mas você pode lançar mesmo assim.</div>}
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
              <input type="checkbox" checked={cfg.incluir} onChange={e=>setCfgNovos({...cfgNovos,[chave]:{...cfg,incluir:e.target.checked}})}/>
              <span style={{fontSize:11,color:C.textSub}}>Lançar este item</span>
            </div>
            <input value={cfg.descricao} onChange={e=>setCfgNovos({...cfgNovos,[chave]:{...cfg,descricao:e.target.value.toUpperCase()}})}
              placeholder="Descrição"
              style={{width:"100%",padding:"6px 8px",borderRadius:6,border:"1px solid "+C.border,fontSize:12,fontFamily:"inherit",marginBottom:6,textTransform:"uppercase"}}/>

            <div style={{fontSize:9,color:C.textMuted,fontWeight:700,letterSpacing:".05em",marginBottom:4}}>ISSO É PAGAMENTO DE FATURA?</div>
            <div style={{display:"flex",gap:6,marginBottom:8}}>
              {[["","Não"],["PJ","Fatura PJ"],["PF","Fatura PF"]].map(([val,label])=>(
                <button key={val} onClick={()=>setCfgNovos({...cfgNovos,[chave]:{...cfg,pagFatura:val||null}})}
                  style={{flex:1,padding:"6px",borderRadius:6,fontSize:11,fontWeight:700,fontFamily:"inherit",cursor:"pointer",
                    border:"1px solid "+((cfg.pagFatura||"")===val?C.accent:C.border),
                    background:(cfg.pagFatura||"")===val?C.accentLight:C.surface,
                    color:(cfg.pagFatura||"")===val?C.accent:C.textMuted}}>
                  {label}
                </button>
              ))}
            </div>

            {cfg.pagFatura
              ? <div style={{fontSize:11,color:C.accent,background:C.accentLight,borderRadius:6,padding:"6px 8px",marginBottom:8}}>
                  💳 Vai abater a fatura {cfg.pagFatura} vencendo em {fmtD(vencAuto)} (calculado pela data do pagamento).
                </div>
              : <select value={cfg.categoria} onChange={e=>setCfgNovos({...cfgNovos,[chave]:{...cfg,categoria:e.target.value}})}
                  style={{width:"100%",padding:"6px 8px",borderRadius:6,border:"1px solid "+C.border,fontSize:12,fontFamily:"inherit",background:C.surface,marginBottom:8}}>
                  {CATEGORIAS.map(c=><option key={c} value={c}>{CAT_LABEL[c]||c}</option>)}
                </select>}

            {!cfg.pagFatura&&parseEnvelopesCustom(data).length>0&&
              <select value={cfg.envelopeId||""} onChange={e=>setCfgNovos({...cfgNovos,[chave]:{...cfg,envelopeId:e.target.value}})}
                style={{width:"100%",padding:"6px 8px",borderRadius:6,border:"1px solid "+C.border,fontSize:12,fontFamily:"inherit",background:C.surface,marginBottom:8}}>
                <option value="">Envelope: nenhum</option>
                {parseEnvelopesCustom(data).map(env=><option key={env.id} value={env.id}>Envelope: {env.nome}</option>)}
              </select>}

            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>lancarNovo(n)} disabled={load||!cfg.incluir}
                style={{flex:1,padding:"7px",borderRadius:6,background:cfg.incluir?"#EA580C":C.borderLight,color:cfg.incluir?"#fff":C.textMuted,fontSize:11,fontWeight:700,border:"none",cursor:cfg.incluir?"pointer":"default",fontFamily:"inherit"}}>
                Lançar
              </button>
              <button onClick={()=>dispensar(n)}
                style={{padding:"7px 12px",borderRadius:6,background:"transparent",color:C.textMuted,fontSize:11,border:"1px solid "+C.border,cursor:"pointer",fontFamily:"inherit"}}>
                Dispensar
              </button>
            </div>
          </div>;
        })}
      </div>}

      {resultado.aguardando.length>0&&<div>
        <div style={{fontSize:11,fontWeight:700,color:C.textMuted,marginBottom:6,letterSpacing:".05em"}}>
          🟡 AINDA NÃO APARECEU NO EXTRATO ({resultado.aguardando.length})
        </div>
        {resultado.aguardando.map(item=><div key={item.row} style={{display:"flex",justifyContent:"space-between",padding:"6px 4px",fontSize:12,borderBottom:"1px solid "+C.borderLight}}>
          <span style={{color:C.textSub}}>{fmtD(item.data)} · {item.desc}</span>
          <span style={{fontWeight:600,color:C.textMuted}}>{fmt(item.valor)}</span>
        </div>)}
      </div>}

      {!resultado.paraBaixar.length&&!resultado.novos.length&&!resultado.aguardando.length&&
        <div style={{textAlign:"center",color:C.green,fontSize:13,padding:"20px 0",fontWeight:600}}>
          ✓ Tudo conciliado — nada pendente nesse período.
        </div>}
    </>}
  </div>;
}
