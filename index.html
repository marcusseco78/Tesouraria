  async function salvarConfigFatura(){
    setLoadFatura(true);
    try{ onUpdate(await api({action:"editarConfigFatura",fechamento:fechamentoEditado,vencimento:vencimentoEditado})); setEditandoFatura(false); }
    catch(e){ alert(e.message); }
    setLoadFatura(false);
  }
  async function salvarNomeCartao(){
    setLoad(true);
    try{ onUpdate(await api({action:"editarNomeCartao",cartao,nome:nomeEditado})); setEditandoNome(false); }
    catch(e){ alert(e.message); }
    setLoad(false);
  }
  // form novo lançamento
  const [nDesc,setNDesc]=useState("");
  const [nValor,setNValor]=useState("");
  const [nData,setNData]=useState(hoje());
  const [nParc,setNParc]=useState("1");
  const [nCat,setNCat]=useState("");
  // edição/exclusão de item existente do cartão
  const [editRow,setEditRow]=useState(null);
  const [eDesc,setEDesc]=useState("");
  const [eValor,setEValor]=useState("");
  const [eData,setEData]=useState("");
  const [eCategoria,setECategoria]=useState("");
  const [eNeg,setENeg]=useState(true);
  const [eAlias,setEAlias]=useState("");
  const [eApelido,setEApelido]=useState("");
  const [eLoad,setELoad]=useState(false);
  // resultado da última conciliação de CSV rodada nesta aba (sem Gemini)
  const [conciliacao,setConciliacao]=useState(null); // {cartao, vencimentoAlvo, foraDaPlanilha, aguardandoFatura, possiveisDivergencias}

  const rows=cartao==="PJ"?(data.cartaoPJ||[]):(data.cartaoPF||[]);
  const abaCartao="CARTAO_"+cartao;

  function abrirEdicaoItem(r){
    setEditRow(_linhaCartao(r));setEDesc(r[1]);setEValor(formatarValorInicial(r[2]));setENeg(r[2]<0);setECategoria(r[5]||"");setEData(String(r[0]||"").slice(0,10));
    setEAlias(_obsAliasCartao(_obsCartaoRaw(r)));
    setEApelido(_obsApelidoCartao(_obsCartaoRaw(r)));
  }

  async function salvarEdicaoItem(origValor){
    setELoad(true);
    try{
      let res;
      if(eDesc.toUpperCase()!==String(origValor.desc||"").toUpperCase()){
        res=await api({action:"editar",aba:abaCartao,row:editRow,campo:"DESCRICAO",valor:eDesc.toUpperCase()});
      }
      const novoValor=(eNeg?-1:1)*Math.abs(numBR(eValor));
      if(Math.abs(novoValor-origValor.valor)>0.001){
        res=await api({action:"editar",aba:abaCartao,row:editRow,campo:"VALOR_PARCELA",valor:String(novoValor)});
      }
      if(eData&&eData!==String(origValor.data||"").slice(0,10)){
        // Corrige a DATA_COMPRA -- ex: uma assinatura prevista pro dia 14 mas
        // que debitou de fato no dia 11. So muda a data da COMPRA em si, nao
        // o vencimento da fatura (que continua fixo, dia 07 do mes seguinte).
        res=await api({action:"editar",aba:abaCartao,row:editRow,campo:"DATA_COMPRA",valor:eData});
      }
      if(eCategoria!==String(origValor.categoria||"")){
        res=await api({action:"editar",aba:abaCartao,row:editRow,campo:"CATEGORIA",valor:eCategoria});
        // Mantem a flag DCP (coluna G) consistente com a categoria -- sem isso,
        // um item recategorizado pra fora de DCP continuaria contando no
        // consumo semanal (o motor considera DCP=S OU categoria=DCP).
        res=await api({action:"editar",aba:abaCartao,row:editRow,campo:"DCP",valor:eCategoria==="DCP"?"S":"N"});
      }
      const aliasNovo=eAlias.trim().toUpperCase();
      if(aliasNovo!==String(origValor.alias||"").trim().toUpperCase()){
        res=await api({action:"editarAliasCartao",aba:abaCartao,row:editRow,alias:aliasNovo});
      }
      const apelidoNovo=eApelido.trim().toUpperCase();
      if(apelidoNovo!==String(origValor.apelido||"").trim().toUpperCase()){
        res=await api({action:"editarApelidoItem",aba:abaCartao,row:editRow,apelido:apelidoNovo});
      }
      onUpdate(res||await api({action:"getData"}));
      setEditRow(null);
    }catch(e){alert(e.message);}
    setELoad(false);
  }

  async function apagarItem(){
    if(!window.confirm("Apagar este item do cartão? Não pode ser desfeito pelo app."))return;
    setELoad(true);
    try{
      onUpdate(await api({action:"deletar",aba:abaCartao,row:editRow}));
      setEditRow(null);
    }catch(e){alert(e.message);}
    setELoad(false);
  }

  async function apagarTodosItemComEssaDescricao(desc){
    if(!window.confirm("Apagar TODOS os itens ainda PENDENTES com a descrição \""+desc+"\" no cartão "+cartao+"? Itens já PAGOS não são tocados."))return;
    setELoad(true);
    try{
      const r=await api({action:"deletarPorDescricao",aba:abaCartao,descricao:desc,apenasFuturas:false,apenasProgramadas:true});
      onUpdate(r);
      setEditRow(null);
      alert((r.apagados||0)+" item(ns) apagado(s).");
    }catch(e){alert(e.message);}
    setELoad(false);
  }

  // 🟠 Aplica direto os dados do CSV na linha da planilha (descrição + valor),
  // sem precisar editar campo a campo -- usado no painel quando o item aberto
  // tem uma divergência pendente.
  // Preserva qualquer anotação pessoal entre parênteses que já estivesse na
  // descrição da planilha (ex: "SHOPPING PARK (ESTACIONAMENTO)") -- o CSV
  // nunca vai ter essa informação, então sobrescrever a descrição inteira
  // apagaria uma nota que o Marcus escreveu de propósito pra se lembrar do
  // motivo da compra.
  function descComNotaPreservada(divergencia){
    const notaMatch=String(divergencia.planilha.desc||"").match(/\(([^)]*)\)/);
    const nota=notaMatch?" ("+notaMatch[1]+")":"";
    return divergencia.csv.title.toUpperCase()+nota;
  }

  async function usarDadosDoCSV(divergencia){
    setELoad(true);
    try{
      await api({action:"editarCartaoItem",aba:abaCartao,row:divergencia.planilha.row,campo:"DESCRICAO",valor:descComNotaPreservada(divergencia)});
      await api({action:"editarCartaoItem",aba:abaCartao,row:divergencia.planilha.row,campo:"VALOR_PARCELA",valor:String(-Math.abs(divergencia.csv.amount))});
      // [CORRIGIDO 13/07] faltava a DATA -- o botao dizia "usar dados do CSV"
      // mas so aplicava descricao e valor, nunca a data real da compra. Por
      // isso o item voltava sempre pra data antiga, mesmo depois de clicar.
      const r=await api({action:"editarCartaoItem",aba:abaCartao,row:divergencia.planilha.row,campo:"DATA_COMPRA",valor:String(divergencia.csv.date).slice(0,10)});
      onUpdate(r);
      setEditRow(null);
      // remove essa divergência da conciliação em tela, já que foi resolvida
      setConciliacao(c=>c?{...c,possiveisDivergencias:(c.possiveisDivergencias||[]).filter(d=>d.planilha.row!==divergencia.planilha.row)}:c);
    }catch(e){alert(e.message);}
    setELoad(false);
  }

  // 🔴 Item que está no CSV mas não na planilha -- ainda não tem linha própria,
  // então "resolver" aqui é lançar de vez (lancarCartao) ou dispensar (o
  // Marcus decidiu que não precisa lançar, ex: pagamento de fatura mal
  // categorizado pelo CSV).
  function removerNovoDoCSV(item){
    setConciliacao(c=>c?{...c,foraDaPlanilha:(c.foraDaPlanilha||[]).filter(n=>n!==item)}:c);
  }

  // [NOVO 20/07] "Lançar todos os marcados" pro cartão -- mesma ideia que
  // ja existia so na Conciliação de Extrato. syncNovosCartao e um espelho
  // (chave estavel -> config atual) que cada NovoDoCSV atualiza sozinho via
  // onSync, sem tirar a responsividade de digitar em cada campo.
  const [syncNovosCartao,setSyncNovosCartao]=useState({});
  const marcadosNovosCartao=useMemo(()=>
    Object.entries(syncNovosCartao).filter(([,cfg])=>cfg.incluir&&cfg.cat&&cfg.desc.trim()&&cfg.valor),
  [syncNovosCartao]);

  async function lancarTodosNovosCartao(){
    if(!marcadosNovosCartao.length) return;
    setLoad(true);
    const chavesLancadas=[];
    try{
      for(const [chave,cfg] of marcadosNovosCartao){
        const r=await api({action:"lancarCartao",cartao,descricao:cfg.desc.toUpperCase(),
          valor:(-1)*Math.abs(numBR(cfg.valor)),parcelas:parseInt(cfg.parc)||1,
          categoria:cfg.cat,dcp:cfg.cat==="DCP"?"S":"N",data_compra:novosDoCSV.find((item,i)=>item.date+"|"+item.title+"|"+item.amount+"|"+i===chave)?.date,
          envelopeId:cfg.envelopeId});
        onUpdate(r);
        chavesLancadas.push(chave);
      }
    }catch(e){alert(e.message);}
    // Remove da lista os que deram certo, mesmo se algum no meio falhar --
    // evita relancar por engano os que ja foram, so o alerta acima ja avisa
    // qual travou.
    setConciliacao(c=>c?{...c,foraDaPlanilha:(c.foraDaPlanilha||[]).filter((item,i)=>
      !chavesLancadas.includes(item.date+"|"+item.title+"|"+item.amount+"|"+i))}:c);
    setLoad(false);
  }

  // Agrupar por vencimento, ordenado cronologicamente
  const faturas=useMemo(()=>{
    const mp={};
    rows.forEach(r=>{
      const v=r[4]||"";
      if(!mp[v])mp[v]={venc:v,itens:[]};
      mp[v].itens.push(r);
    });
    return Object.values(mp).sort((a,b)=>a.venc>b.venc?1:-1);
  },[rows]);

  const hj=hoje();
  // Fatura ABERTA = a que recebe as compras de hoje, segundo o fechamento/
  // vencimento configurados (CARTAO_DIA_FECHAMENTO/CARTAO_DIA_VENCIMENTO em
  // CONFIG — ver configFatura). Padrao sem nada configurado reproduz o
  // comportamento fixo de antes (mês civil inteiro, vence dia 7 do mês
  // seguinte). Nunca depende de comparar vencimento com hoje (isso gerava
  // selo errado: toda fatura futura passava no teste "venc>=hoje" e ficava
  // marcada como se fosse a aberta).
  const vencAberta=useMemo(()=>{
    const fv=configFatura(data);
    const mf=mesFechamentoDaData(hj,fv.fechamento);
    return calcVencimentoFaturaISO(mf.ano,mf.mes,fv.fechamento,fv.vencimento);
  },[hj,data.config]);

  const idxAberta=useMemo(()=>{
    const iExato=faturas.findIndex(f=>f.venc===vencAberta);
    if(iExato>=0) return iExato;
    // Fallback se por algum motivo a linha exata ainda nao existe na aba
    // (ex: virada de ciclo ainda nao rodou pra esse mes): pega a mais
    // próxima igual ou posterior ao alvo calculado.
    const iProx=faturas.findIndex(f=>f.venc>=vencAberta);
    return iProx>=0?iProx:faturas.length-1;
  },[faturas,vencAberta]);

  // Navegacao vinda da aba DCP ("ir pro lancamento"): primeiro garante que o
  // cartao certo (PF/PJ) esta selecionado -- so depois disso "rows"/"faturas"
  // refletem o cartao certo e da pra calcular em qual fatura o item cai.
  // Roda em duas passadas (o proprio useEffect refaz sozinho quando "cartao"
  // muda, por estar na lista de dependencias).
  useEffect(()=>{
    if(!destaque||destaque.tab!=="cartoes") return;
    if(cartao!==destaque.cartao){ setCartao(destaque.cartao); return; }
    const alvo=rows.find(r=>_linhaCartao(r)===destaque.row);
    if(!alvo) return;
    const idxAlvo=faturas.findIndex(f=>f.venc===alvo[4]);
    if(idxAlvo>=0) setFatIdx(idxAlvo-idxAberta);
    const t=setTimeout(()=>{
      const el=document.getElementById("cart-item-"+destaque.row);
      if(el) el.scrollIntoView({behavior:"smooth",block:"center"});
    },50);
    return ()=>clearTimeout(t);
  },[destaque,cartao,rows,faturas,idxAberta]);

  const idxInicial=idxAberta;

  const faturaAtual=faturas[idxInicial+fatIdx];

  if(!faturaAtual) return <div style={{padding:"40px 20px",textAlign:"center",color:C.textMuted,fontSize:14}}>
    Nenhuma fatura encontrada. Suba um CSV ou adicione um lançamento.
  </div>;

  // Separar confirmados e previstos
  // Previstos = PENDENTE + data_compra no futuro OU lançados por virada (sem correspondência no CSV ainda)
  // Simplificação: PENDENTE com data_compra >= hoje = previsto; PENDENTE com data_compra < hoje = confirmado aguardando pagamento
  const confirmados=faturaAtual.itens.filter(r=>r[7]==="PAGO"||(r[7]==="PENDENTE"&&r[0]<=hj));
  const previstos  =faturaAtual.itens.filter(r=>r[7]==="PENDENTE"&&r[0]>hj);

  const totalConf =confirmados.reduce((s,r)=>s+Math.abs(Number(r[2])||0),0);
  const totalPrev =previstos.reduce((s,r)=>s+Math.abs(Number(r[2])||0),0);
  const totalFatura=totalConf+totalPrev;

  // Cruza com o Fluxo para achar quanto ja foi pago (e quanto falta) dessa
  // fatura, seguindo a cadeia inteira de restantes (linha original + todas
  // as continuacoes marcadas com faturaOriginalVenc igual ao vencimento
  // desta fatura).
  // [CORRIGIDO 18/07] Comparacao de TIPO tolerante a espaco sobrando e
  // acento -- achado real: edicao manual na planilha deixou "CARTAO PJ "
  // (espaco no fim) na celula, e a comparacao exata "===" simplesmente
  // nunca batia, sem erro nenhum pra avisar. Normaliza os dois lados antes
  // de comparar (mesmo espirito de _normTipo no backend).
  const tipoAlvo="CARTAO "+cartao;
  const _tipoNorm=t=>String(t||"").trim().toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const linhasDaFatura=useMemo(()=>(data.fluxo||[]).filter(r=>{
    if(_tipoNorm(r.tipo)!==_tipoNorm(tipoAlvo)) return false;
    if(r.data===faturaAtual.venc) return true;
    let obs={};
    try{obs=JSON.parse(r.obs||"{}");}catch(e){}
    return obs.faturaOriginalVenc===faturaAtual.venc;
  }),[data.fluxo,faturaAtual.venc,tipoAlvo]);
  const totalPago  =linhasDaFatura.filter(r=>r.status==="EXECUTADO").reduce((s,r)=>s+Math.abs(r.valor||0),0);
  const totalFalta =linhasDaFatura.filter(r=>r.status==="PROGRAMADO").reduce((s,r)=>s+Math.abs(r.valor||0),0);
  const faturaVencida=faturaAtual.venc<hj;
  const corFaturaAtual=totalFalta<0.01&&totalPago>0.01?C.green:(faturaVencida&&totalFalta>0.01?C.red:(totalPago>0.01?C.orange:null));

  // [13/07] Nota informativa: na vida real, o PAGAMENTO de uma fatura
  // acontece por volta do vencimento dela (dia 07) -- que cai DENTRO do
  // periodo de compras da fatura SEGUINTE. Entao, ao olhar a fatura atual,
  // mostra (so informativo, nunca conta em nada) o(s) pagamento(s) ja
  // vinculados a fatura ANTERIOR -- com link direto pro Historico, onde
  // podem ser alterados de verdade. Usa o mesmo marcador obs.faturaOriginalVenc
  // que baixa()/pagarFaturaAvulso ja gravam -- nenhum dado novo precisou
  // ser criado.
  const vencAnterior=useMemo(()=>{
    const [y,m,d]=faturaAtual.venc.split("-").map(Number);
    let ano=y,mes=m-1;
    if(mes<1){mes=12;ano--;}
    const ultimoDia=new Date(ano,mes,0).getDate();
    return `${ano}-${String(mes).padStart(2,"0")}-${String(Math.min(d,ultimoDia)).padStart(2,"0")}`;
  },[faturaAtual.venc]);
  const pagamentosFaturaAnterior=useMemo(()=>(data.fluxo||[]).filter(r=>{
    if(_tipoNorm(r.tipo)!==_tipoNorm(tipoAlvo)) return false;
    if(r.data===vencAnterior) return false; // a propria linha da fatura anterior, nao um pagamento dela
    let obs={};
    try{obs=JSON.parse(r.obs||"{}");}catch(e){}
    return obs.faturaOriginalVenc===vencAnterior;
  }),[data.fluxo,vencAnterior,tipoAlvo,cartao]);

  // [NOVO 18/07] Card "Fatura anterior" -- mesmo raciocinio que ja existia
  // pra pagamentosFaturaAnterior (nota informativa), agora tambem vira os
  // 3 numeros de topo: total da fatura que fechou, quanto ja foi pago dela
  // (so EXECUTADO -- "efetuado" de verdade, nao agendado) ate o fechamento
  // desta fatura atual, e quanto ainda resta (se sobrou rotativo).
  const faturaAnteriorObj=faturas[idxInicial+fatIdx-1];
  const totalFaturaAnterior=useMemo(()=>
    faturaAnteriorObj?faturaAnteriorObj.itens.reduce((s,r)=>s+Math.abs(Number(r[2])||0),0):0,
  [faturaAnteriorObj]);
  const totalPagoFaturaAnterior=useMemo(()=>
    pagamentosFaturaAnterior.filter(r=>r.status==="EXECUTADO").reduce((s,r)=>s+Math.abs(r.valor||0),0),
  [pagamentosFaturaAnterior]);
  const restanteFaturaAnterior=Math.max(0,totalFaturaAnterior-totalPagoFaturaAnterior);

  // Só aplica os selos de conciliação se ela foi rodada pro MESMO cartão e
  // (quando identificado) pra MESMA fatura que está em tela agora -- senão um
  // resultado antigo de outra fatura ficaria "vazando" selo em fatura errada.
  const concValida=conciliacao&&conciliacao.cartao===cartao&&
    (!conciliacao.vencimentoAlvo||conciliacao.vencimentoAlvo===faturaAtual.venc);
  const confirmadosRows=useMemo(()=>{
    if(!concValida)return new Set();
    return new Set((conciliacao.confirmadosFatura||[]).map(a=>a.row));
  },[concValida,conciliacao]);
  const divergenciasByRow=useMemo(()=>{
    const mp=new Map();
    if(concValida)(conciliacao.possiveisDivergencias||[]).forEach(d=>mp.set(d.planilha.row,d));
    return mp;
  },[concValida,conciliacao]);
  const novosDoCSV=concValida?(conciliacao.foraDaPlanilha||[]):[];

  async function lancarNovo(){
    if(!nDesc.trim()||!nValor)return;
    setLoad(true);
    try{
      const r=await api({action:"lancarCartao",cartao,descricao:nDesc.toUpperCase(),
        valor:(-1)*Math.abs(numBR(nValor)),parcelas:parseInt(nParc)||1,
        categoria:nCat,dcp:nCat==="DCP"?"S":"N",data_compra:nData});
      onUpdate(r);setShowForm(false);setNDesc("");setNValor("");setNParc("1");setNData(hoje());
    }catch(e){alert(e.message);}
    setLoad(false);
  }

  const navBtn=(dir,disabled)=><button onClick={()=>setFatIdx(i=>i+dir)} disabled={disabled}
    style={{padding:"6px 14px",borderRadius:8,border:"1px solid "+C.border,background:C.surface,
      color:disabled?C.textMuted:C.text,fontSize:16,cursor:disabled?"default":"pointer",fontFamily:"inherit"}}>
    {dir<0?"‹":"›"}
  </button>;

  return <div style={{paddingBottom:80}}>
    {/* Seletor PF/PJ */}
    <div style={{display:"flex",gap:6,marginBottom:6}}>
      {["PJ","PF"].map(t=><button key={t} onClick={()=>{setCartao(t);setFatIdx(0);setConciliacao(null);}}
        style={{flex:1,padding:"9px",borderRadius:9,border:"1px solid "+(cartao===t?C.accent:C.border),
          background:cartao===t?C.accentLight:"transparent",color:cartao===t?C.accent:C.textSub,
          fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
        {nomeCartao(t,data)}
      </button>)}
    </div>
    <div style={{textAlign:"right",marginBottom:12}}>
      <button onClick={()=>setConfigCartaoAberta(v=>!v)}
        style={{background:"none",border:"none",color:C.textMuted,fontSize:10,cursor:"pointer",fontFamily:"inherit",textDecoration:"underline"}}>
        ⚙️ {configCartaoAberta?"Fechar configurações":"Configurações de cartão"}
      </button>
      {configCartaoAberta&&<div style={{background:C.borderLight,borderRadius:10,padding:"12px",textAlign:"left",marginTop:8}}>
        <div style={{fontSize:9,color:"#92400E",background:"#FEF3C7",borderRadius:6,padding:"6px 8px",marginBottom:10}}>
          Área protegida — nome do cartão, dia de fechamento/vencimento e as 3 ações abaixo mexem em como o app inteiro calcula faturas. Reconstruir do zero em especial apaga e reescreve a aba inteira.
        </div>

        <div style={{fontSize:10,fontWeight:700,color:C.textSub,marginBottom:4}}>NOME DESTE CARTÃO</div>
        {!editandoNome
          ?<button onClick={()=>{setNomeEditado(data.config&&data.config["NOME_CARTAO_"+cartao]||"");setEditandoNome(true);}}
            style={{background:"none",border:"1px solid "+C.border,borderRadius:6,color:C.textSub,fontSize:11,padding:"5px 10px",cursor:"pointer",fontFamily:"inherit",marginBottom:12}}>
            ✏️ Renomear "{nomeCartao(cartao,data)}"
          </button>
          :<div style={{display:"flex",gap:6,alignItems:"center",marginBottom:12}}>
            <input value={nomeEditado} onChange={e=>setNomeEditado(e.target.value)}
              placeholder={"Cartão "+cartao+" (padrão)"}
              style={{flex:1,padding:"5px 8px",borderRadius:6,border:"1px solid "+C.border,fontSize:12,fontFamily:"inherit"}}/>
            <button onClick={salvarNomeCartao} disabled={load}
              style={{padding:"5px 10px",borderRadius:6,background:C.accent,color:"#fff",fontSize:11,fontWeight:700,border:"none",cursor:"pointer",fontFamily:"inherit"}}>
              Salvar
            </button>
            <button onClick={()=>setEditandoNome(false)}
              style={{padding:"5px 8px",borderRadius:6,background:"none",color:C.textMuted,fontSize:11,border:"1px solid "+C.border,cursor:"pointer",fontFamily:"inherit"}}>
              X
            </button>
          </div>}

        <div style={{fontSize:10,fontWeight:700,color:C.textSub,marginBottom:4}}>FECHAMENTO E VENCIMENTO (vale pros dois cartões)</div>
        {!editandoFatura
          ?<button onClick={()=>{const fv=configFatura(data);setFechamentoEditado(String(fv.fechamento));setVencimentoEditado(String(fv.vencimento));setEditandoFatura(true);}}
            style={{background:"none",border:"1px solid "+C.border,borderRadius:6,color:C.textSub,fontSize:11,padding:"5px 10px",cursor:"pointer",fontFamily:"inherit",marginBottom:12}}>
            📅 Editar dia de fechamento/vencimento
          </button>
          :<div style={{background:C.surface,borderRadius:8,padding:"10px 12px",marginBottom:12}}>
            <div style={{fontSize:9,color:C.textMuted,marginBottom:6}}>Padrão sem configurar: fecha no último dia do mês, vence dia 7 do mês seguinte.</div>
            <div style={{display:"flex",gap:10,marginBottom:8}}>
              <div style={{flex:1}}>
                <span style={{fontSize:9,color:C.textMuted}}>FECHA NO DIA</span>
                <input type="number" min="1" max="31" value={fechamentoEditado} onChange={e=>setFechamentoEditado(e.target.value)}
                  style={{width:"100%",padding:"5px 8px",borderRadius:6,border:"1px solid "+C.border,fontSize:13,textAlign:"center",fontFamily:"inherit",boxSizing:"border-box"}}/>
              </div>
              <div style={{flex:1}}>
                <span style={{fontSize:9,color:C.textMuted}}>VENCE NO DIA</span>
                <input type="number" min="1" max="31" value={vencimentoEditado} onChange={e=>setVencimentoEditado(e.target.value)}
                  style={{width:"100%",padding:"5px 8px",borderRadius:6,border:"1px solid "+C.border,fontSize:13,textAlign:"center",fontFamily:"inherit",boxSizing:"border-box"}}/>
              </div>
            </div>
            <div style={{display:"flex",gap:6,justifyContent:"flex-end"}}>
              <button onClick={salvarConfigFatura} disabled={loadFatura}
                style={{padding:"5px 12px",borderRadius:6,background:C.accent,color:"#fff",fontSize:11,fontWeight:700,border:"none",cursor:"pointer",fontFamily:"inherit"}}>
                {loadFatura?"…":"Salvar"}
              </button>
              <button onClick={()=>setEditandoFatura(false)}
                style={{padding:"5px 10px",borderRadius:6,background:"none",color:C.textMuted,fontSize:11,border:"1px solid "+C.border,cursor:"pointer",fontFamily:"inherit"}}>
                Cancelar
              </button>
            </div>
          </div>}

        <div style={{fontSize:10,fontWeight:700,color:C.textSub,marginBottom:4}}>AÇÕES DE FATURA</div>
        <ConciliarCartao cartao={cartao} data={data} onResultado={setConciliacao}/>
        <ResetCartao cartao={cartao} data={data} onUpdate={onUpdate}/>
        <ImportarAssinaturas onUpdate={onUpdate}/>
      </div>}
    </div>

    {/* Navegação entre faturas */}
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
      {navBtn(-1,fatIdx<=(-(idxInicial)))}
      <div style={{flex:1,textAlign:"center"}}>
        <div style={{fontSize:12,color:C.textMuted}}>Vencimento</div>
        <div style={{fontSize:16,fontWeight:800,color:corFaturaAtual||C.accent}}>{fmtD(faturaAtual.venc)}</div>
        {corFaturaAtual===C.green&&<span style={{fontSize:10,background:C.greenLight,color:C.green,padding:"2px 8px",borderRadius:10,fontWeight:700}}>PAGA</span>}
        {corFaturaAtual===C.orange&&<span style={{fontSize:10,background:C.orangeLight,color:C.orange,padding:"2px 8px",borderRadius:10,fontWeight:700}}>PARCIAL</span>}
        {corFaturaAtual===C.red&&<span style={{fontSize:10,background:"#FEE2E2",color:C.red,padding:"2px 8px",borderRadius:10,fontWeight:700}}>VENCIDA</span>}
        {!corFaturaAtual&&(idxInicial+fatIdx)===idxAberta&&<span style={{fontSize:10,background:C.accentLight,color:C.accent,padding:"2px 8px",borderRadius:10,fontWeight:700}}>ABERTA</span>}
        {faturaTravada(cartao,faturaAtual.venc,data)&&<span style={{fontSize:10,background:"#DBEAFE",color:"#1E40AF",padding:"2px 8px",borderRadius:10,fontWeight:700,marginLeft:4}}>🔒 TRAVADA</span>}
      </div>
      {navBtn(1,idxInicial+fatIdx>=faturas.length-1)}
    </div>

    {/* [NOVO 18/07] Card "Fatura anterior" -- so aparece se existe uma fatura
        anterior de verdade (ja teve pelo menos 1 fatura antes desta). Mostra
        total, quanto ja foi pago (efetuado, ate o fechamento da fatura atual)
        e quanto ainda resta -- clique em cada pagamento leva pro Histórico. */}
    {faturaAnteriorObj&&<Card style={{marginBottom:10,padding:"12px 16px",background:C.borderLight}}>
      <div style={{fontSize:11,fontWeight:800,color:C.textSub,marginBottom:8,textTransform:"uppercase",letterSpacing:".05em"}}>
        Fatura anterior · {fmtD(vencAnterior)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,textAlign:"center",marginBottom:pagamentosFaturaAnterior.length>0?10:0}}>
        <div>
          <div style={{fontSize:9,color:C.textMuted,marginBottom:3}}>TOTAL</div>
          <div style={{fontSize:13,fontWeight:800,color:C.text}}>{fmt(totalFaturaAnterior)}</div>
        </div>
        <div>
          <div style={{fontSize:9,color:C.textMuted,marginBottom:3}}>PAGO ATÉ {fmtD(faturaAtual.venc).slice(0,5)}</div>
          <div style={{fontSize:13,fontWeight:800,color:C.green}}>{fmt(totalPagoFaturaAnterior)}</div>
        </div>
        <div>
          <div style={{fontSize:9,color:C.textMuted,marginBottom:3}}>RESTANTE</div>
          <div style={{fontSize:13,fontWeight:800,color:restanteFaturaAnterior>0.01?C.orange:C.textMuted}}>{fmt(restanteFaturaAnterior)}</div>
        </div>
      </div>
      {pagamentosFaturaAnterior.map(p=><div key={"pagant-"+p.row}
        onClick={()=>onIrPara&&onIrPara({tab:"historico",row:p.row})}
        style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,
          background:C.surface,borderRadius:8,padding:"7px 10px",marginBottom:4,
          cursor:onIrPara?"pointer":"default",fontSize:11}}>
        <span style={{color:C.textMuted}}>{fmtD(p.data)}{p.status==="PROGRAMADO"?" (agendado)":""}</span>
        <span style={{fontWeight:700,color:C.textMuted,flexShrink:0}}>{fmt(p.valor)}</span>
      </div>)}
    </Card>}

    {/* Card "Fatura atual" -- Confirmado/Previsto/Total + Pago no período/Falta
        quitar juntos no mesmo card, pra ficar claro que sao a MESMA fatura
        vista de dois angulos (o que foi lançado vs. o que já foi pago dela). */}
    <Card style={{marginBottom:12,padding:"14px 16px"}}>
      <div style={{fontSize:11,fontWeight:800,color:C.textSub,marginBottom:8,textTransform:"uppercase",letterSpacing:".05em"}}>
        Fatura atual · {fmtD(faturaAtual.venc)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,textAlign:"center"}}>
        <div>
          <div style={{fontSize:10,color:C.textMuted,marginBottom:3}}>CONFIRMADO</div>
          <div style={{fontSize:15,fontWeight:800,color:C.text}}>{fmt(totalConf)}</div>
        </div>
        <div>
          <div style={{fontSize:10,color:C.textMuted,marginBottom:3}}>PREVISTO</div>
          <div style={{fontSize:15,fontWeight:800,color:C.textMuted}}>{fmt(totalPrev)}</div>
        </div>
        <div>
          <div style={{fontSize:10,color:C.textMuted,marginBottom:3}}>TOTAL FATURA</div>
          <div style={{fontSize:15,fontWeight:800,color:C.red}}>{fmt(totalFatura)}</div>
        </div>
      </div>
      {(totalPago>0.01||totalFalta>0.01)&&<div style={{display:"flex",gap:8,marginTop:10,fontSize:11}}>
        <div style={{flex:1,background:C.greenLight,borderRadius:8,padding:"6px 10px",textAlign:"center"}}>
          <div style={{color:C.textMuted,fontSize:9}}>PAGO NO PERÍODO (01/{(()=>{const[y,m]=faturaAtual.venc.split("-").map(Number);const mi=m===1?12:m-1;return String(mi).padStart(2,"0");})()} em diante)</div>
          <div style={{color:C.green,fontWeight:800,fontSize:13}}>{fmt(totalPago)}</div>
        </div>
        <div style={{flex:1,background:totalFalta>0.01?"#FEF3C7":C.borderLight,borderRadius:8,padding:"6px 10px",textAlign:"center"}}>
          <div style={{color:C.textMuted,fontSize:9}}>FALTA QUITAR</div>
          <div style={{color:totalFalta>0.01?C.orange:C.textMuted,fontWeight:800,fontSize:13}}>{fmt(totalFalta)}</div>
        </div>
      </div>}
    </Card>

    {/* Botão novo lançamento */}
    <button onClick={()=>setShowForm(s=>!s)}
      style={{width:"100%",padding:"10px",borderRadius:10,background:showForm?C.borderLight:C.accent,
        color:showForm?C.textSub:"#fff",fontSize:13,fontWeight:700,border:"none",cursor:"pointer",
        fontFamily:"inherit",marginBottom:8}}>
      {showForm?"Cancelar":"+ Nova compra"}
    </button>

    {/* 🔴 Itens que apareceram no CSV mas ainda não têm linha na planilha */}
    {novosDoCSV.length>0&&<div style={{marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 4px"}}>
        <span style={{fontSize:11,fontWeight:700,color:C.red,letterSpacing:".05em"}}>
          🔴 NOVOS NO CSV — ainda não lançados ({novosDoCSV.length})
        </span>
        {novosDoCSV.length>1&&<button onClick={lancarTodosNovosCartao} disabled={load||!marcadosNovosCartao.length}
          style={{fontSize:11,fontWeight:700,padding:"5px 10px",borderRadius:6,background:marcadosNovosCartao.length?"#EA580C":C.borderLight,
            color:marcadosNovosCartao.length?"#fff":C.textMuted,border:"none",cursor:marcadosNovosCartao.length?"pointer":"default",fontFamily:"inherit"}}>
          🚀 Lançar todos marcados ({marcadosNovosCartao.length})
        </button>}
      </div>
      {novosDoCSV.map((item,i)=>{const chave=item.date+"|"+item.title+"|"+item.amount+"|"+i;
        return <NovoDoCSV key={chave}
        item={item} cartao={cartao} onUpdate={onUpdate} data={data}
        onResolvido={()=>removerNovoDoCSV(item)}
        onSync={cfg=>setSyncNovosCartao(s=>({...s,[chave]:cfg}))}/>;})}
    </div>}

    {/* Form novo lançamento */}
    {showForm&&<Card style={{marginBottom:12,padding:"14px 16px"}}>
      <input value={nDesc} onChange={e=>setNDesc(e.target.value.toUpperCase())} placeholder="Descrição"
        style={{width:"100%",padding:"8px 10px",borderRadius:7,border:"1px solid "+C.border,fontSize:13,fontFamily:"inherit",marginBottom:8,textTransform:"uppercase"}}/>
      <div style={{display:"flex",gap:8,marginBottom:8}}>
        <input type="text" inputMode="numeric" value={nValor} onChange={e=>setNValor(formatarMoedaInput(e.target.value))} placeholder="Valor total"
          style={{flex:1,padding:"8px 10px",borderRadius:7,border:"1px solid "+C.border,fontSize:13,fontFamily:"inherit"}}/>
        <input type="date" value={nData} onChange={e=>setNData(e.target.value)}
          style={{flex:1,padding:"8px 10px",borderRadius:7,border:"1px solid "+C.border,fontSize:12,fontFamily:"inherit"}}/>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:8}}>
        {["1","2","3","6","12"].map(n=><button key={n} onClick={()=>setNParc(n)}
          style={{flex:1,padding:"6px 4px",borderRadius:7,border:"1px solid "+(nParc===n?C.accent:C.border),
            background:nParc===n?C.accentLight:"transparent",color:nParc===n?C.accent:C.textSub,
            fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{n}x</button>)}
      </div>
      <select value={nCat} onChange={e=>setNCat(e.target.value)}
        style={{width:"100%",padding:"8px 10px",borderRadius:7,border:"1px solid "+(nCat?C.border:C.red),fontSize:13,fontFamily:"inherit",background:C.surface,marginBottom:8}}>
        <option value="">Escolha uma categoria...</option>
        {["DCP","DESPESA FIXA","EXTRAORDINARIA","IMPOSTO"].map(c=><option key={c} value={c}>{CAT_LABEL[c]||c}</option>)}
      </select>
      <button onClick={lancarNovo} disabled={load||!nDesc.trim()||!nValor||!nCat}
        style={{width:"100%",padding:"9px",borderRadius:8,background:C.accent,color:"#fff",
          fontSize:13,fontWeight:700,border:"none",cursor:"pointer",fontFamily:"inherit"}}>
        {load?"Salvando...":!nCat?"Escolha a categoria":"Confirmar compra"}
      </button>
    </Card>}

    {/* Lista unica, cronologica decrescente -- confirmados e previstos juntos.
        Previsto (ainda nao caiu no CSV) so muda o ESTILO (apagado/tracejado),
        nao a posicao -- parcelas do mes anterior (dia 28/30/31) naturalmente
        vao pro fim por serem as datas mais antigas da fatura. */}
    {faturaAtual.itens.length>0&&<div style={{marginBottom:4}}>
      <div style={{fontSize:11,fontWeight:700,color:C.textSub,padding:"6px 4px",letterSpacing:".05em"}}>
        LANÇAMENTOS ({faturaAtual.itens.length}) · {confirmados.length} confirmado(s) · {previstos.length} previsto(s)
      </div>
      {[...faturaAtual.itens].sort((a,b)=>b[0]>a[0]?1:-1).map((r,i)=>{
        const linhaR=_linhaCartao(r);
        const isOpen=editRow!=null&&editRow===linhaR;
        const previsto=r[7]==="PENDENTE"&&r[0]>hj;
        const divergencia=divergenciasByRow.get(linhaR);
        const confirmado=confirmadosRows.has(linhaR);
        const motivo=divergencia?{tipo:"divergencia",dado:divergencia}:null;
        const destacado=destaque?.tab==="cartoes"&&destaque.row===linhaR;
        return <div key={linhaR!=null?linhaR:i} id={"cart-item-"+linhaR}>
        <div style={{display:"flex",alignItems:"center",gap:8,padding:"9px 12px",
          background:destacado?"#FEF3C7":(divergencia?"#FFF7ED":(confirmado?"#F0FDF4":(previsto?C.borderLight:(r[7]==="PAGO"?C.greenLight:C.surface)))),transition:"background 1s",
          opacity:previsto?0.85:1,
          borderLeft:divergencia?"3px solid #FB923C":(confirmado?"3px solid "+C.green:(previsto?"3px dashed "+C.textMuted:"none")),
          borderBottom:"1px solid "+C.borderLight,borderRadius:i===0?10:0}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:600,color:previsto?C.textSub:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{r[1]}</div>
            <div style={{fontSize:10,color:C.textMuted,marginTop:1}}>{fmtD(r[0])} · parc:{r[3]} · {r[5]}{(()=>{const envId=_obsEnvelopeId(_obsCartaoRaw(r));if(!envId)return null;const env=parseEnvelopesCustom(data).find(e=>e.id===envId);return env?<TagEnvelopeCustom nome={env.nome}/>:null;})()}</div>
          </div>
          <span style={{fontSize:12,fontWeight:700,color:previsto?C.textSub:(r[7]==="PAGO"?C.green:C.red),flexShrink:0}}>{fmt(r[2])}</span>
          {divergencia?<span style={{fontSize:9,background:"#FFEDD5",color:"#C2410C",padding:"2px 7px",borderRadius:10,flexShrink:0,fontWeight:700}}>🟠 DIVERGE</span>
          :confirmado?<span style={{fontSize:9,background:C.greenLight,color:C.green,padding:"2px 7px",borderRadius:10,flexShrink:0,fontWeight:700}}>✅ CSV/OFX</span>
          :previsto?<span style={{fontSize:9,color:C.textMuted,padding:"2px 7px",borderRadius:10,
            border:"1px dashed "+C.border,flexShrink:0,fontWeight:600}}>PREVISTO</span>
          :<span style={{fontSize:9,background:r[7]==="PAGO"?C.greenLight:C.accentLight,
            color:r[7]==="PAGO"?C.green:C.accent,padding:"2px 7px",borderRadius:10,flexShrink:0,fontWeight:700}}>
            {r[7]}
          </span>}
          {linhaR!=null&&<button onClick={()=>isOpen?setEditRow(null):abrirEdicaoItem(r)} disabled={eLoad}
            style={{background:previsto?"transparent":C.borderLight,color:C.textSub,borderRadius:8,padding:"5px 10px",fontSize:16,border:"1px solid "+C.border,cursor:"pointer",flexShrink:0,lineHeight:1}}>
            {isOpen?"×":"⋮"}
          </button>}
        </div>
        {isOpen&&<PainelEdicaoItemCartao r={r} eDesc={eDesc} setEDesc={setEDesc} eValor={eValor} setEValor={setEValor}
          eData={eData} setEData={setEData}
          eNeg={eNeg} setENeg={setENeg} eCategoria={eCategoria} setECategoria={setECategoria}
          eAlias={eAlias} setEAlias={setEAlias} eApelido={eApelido} setEApelido={setEApelido} eLoad={eLoad} motivo={motivo}
          onSalvar={()=>salvarEdicaoItem({desc:r[1],valor:r[2],categoria:r[5],data:r[0],alias:_obsAliasCartao(_obsCartaoRaw(r)),apelido:_obsApelidoCartao(_obsCartaoRaw(r))})} onApagar={apagarItem} onApagarTodos={()=>apagarTodosItemComEssaDescricao(r[1])} onCancelar={()=>setEditRow(null)}
          onUsarCSV={divergencia?()=>usarDadosDoCSV(divergencia):null} previewCSV={divergencia?descComNotaPreservada(divergencia):null}
          data={data} abaCartao={abaCartao} onUpdate={onUpdate} onIrPara={onIrPara}/>}
      </div>;})}
    </div>}
  </div>;
}

// Painel inline de edição/exclusão de um item de CARTAO_PF/PJ (usado em
// Confirmados e Previstos). Mesmo estilo do painel ⋮ do Fluxo, mas mais
// simples: só descrição, valor (com toggle de sinal) e apagar.
function PainelEdicaoItemCartao({r,eDesc,setEDesc,eValor,setEValor,eData,setEData,eNeg,setENeg,eCategoria,setECategoria,eAlias,setEAlias,eApelido,setEApelido,eLoad,motivo,onSalvar,onApagar,onApagarTodos,onCancelar,onUsarCSV,previewCSV,data,abaCartao,onUpdate,onIrPara}){
  const cartaoSigla=abaCartao==="CARTAO_PJ"?"PJ":"PF";
  const vencItem=String(r[4]||"").slice(0,10);
  const travada=data&&faturaTravada(cartaoSigla,vencItem,data);
  const [loadDestrava,setLoadDestrava]=useState(false);
  async function destravar(){
    if(!confirm("Destravar a fatura "+cartaoSigla+" de vencimento "+fmtD(vencItem)+"? Ela foi marcada como conciliada por completo. Só destrave se precisar mesmo corrigir algo nela."))return;
    setLoadDestrava(true);
    try{ onUpdate(await api({action:"destravarFatura",cartao:cartaoSigla,vencimento:vencItem})); }
    catch(e){ alert(e.message); }
    setLoadDestrava(false);
  }
  return <div style={{background:C.accentLight,padding:"10px 14px",
    borderBottom:"1px solid "+C.accent,borderLeft:"3px solid "+C.accent}}>
    {travada&&<div style={{background:"#EFF6FF",border:"1px solid #BFDBFE",borderRadius:8,padding:"8px 10px",marginBottom:10}}>
      <div style={{fontSize:11,fontWeight:700,color:"#1E40AF",marginBottom:4}}>🔒 Fatura travada</div>
      <div style={{fontSize:10,color:"#1E40AF",marginBottom:6}}>Conciliada por completo via OFX — valor, data e apagar ficam bloqueados nesse item. Categoria, alias, apelido e envelope continuam editáveis.</div>
      <button onClick={destravar} disabled={loadDestrava}
        style={{width:"100%",padding:"6px",borderRadius:6,background:"#1E40AF",color:"#fff",fontSize:11,fontWeight:700,border:"none",cursor:"pointer",fontFamily:"inherit"}}>
        {loadDestrava?"…":"🔓 Destravar esta fatura"}
      </button>
    </div>}
    {motivo&&motivo.tipo==="divergencia"&&<div style={{background:"#FFF7ED",border:"1px solid #FED7AA",borderRadius:8,padding:"8px 10px",marginBottom:10,fontSize:11,color:"#92400E"}}>
      <div style={{fontWeight:700,marginBottom:4}}>🟠 Provável mesmo gasto, lançado diferente do CSV:</div>
      <div>CSV: {motivo.dado.csv.date} · {motivo.dado.csv.title} · R$ {motivo.dado.csv.amount}</div>
      {previewCSV&&<div style={{marginTop:6,fontStyle:"italic"}}>Vai virar: "{previewCSV}"{previewCSV.includes("(")?" (nota entre parênteses preservada)":""}</div>}
      <button onClick={onUsarCSV} disabled={eLoad||travada}
        style={{marginTop:6,width:"100%",background:C.accent,color:"#fff",borderRadius:6,padding:"6px",fontSize:11,fontWeight:700,border:"none",cursor:"pointer"}}>
        ✏️ Usar dados do CSV (sobrescreve descrição e valor abaixo)
      </button>
    </div>}
    <div style={{display:"flex",gap:8,marginBottom:8}}>
      <div style={{display:"flex",flexDirection:"column",gap:3,flex:2}}>
        <span style={{fontSize:10,color:"#92400E",fontWeight:600,letterSpacing:".05em"}}>DESCRIÇÃO</span>
        <input value={eDesc} onChange={e=>setEDesc(e.target.value)} disabled={travada}
          style={{padding:"5px 8px",borderRadius:6,border:"1px solid "+C.accent,fontSize:13,fontFamily:"inherit",width:"100%",background:travada?C.borderLight:C.surface}}/>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:3,flex:1}}>
        <span style={{fontSize:10,color:"#92400E",fontWeight:600,letterSpacing:".05em"}}>VALOR</span>
        <div style={{display:"flex",gap:4}}>
          <button type="button" onClick={()=>setENeg(n=>!n)} disabled={travada}
            style={{width:30,flexShrink:0,borderRadius:6,border:"1px solid "+C.accent,
              background:eNeg?C.redLight:C.blueLight,color:eNeg?C.red:C.blue,fontWeight:800,fontSize:14,cursor:"pointer"}}>
            {eNeg?"−":"+"}
          </button>
          <input type="text" inputMode="numeric" value={eValor} onChange={e=>setEValor(formatarMoedaInput(e.target.value))} disabled={travada}
            style={{padding:"5px 8px",borderRadius:6,border:"1px solid "+C.accent,fontSize:13,textAlign:"right",width:"100%",background:travada?C.borderLight:C.surface}}/>
        </div>
      </div>
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:3,marginBottom:8}}>
      <span style={{fontSize:10,color:"#92400E",fontWeight:600,letterSpacing:".05em"}}>DATA (da compra/débito real)</span>
      <input type="date" value={eData||""} onChange={e=>setEData(e.target.value)} disabled={travada}
        style={{padding:"6px 8px",borderRadius:6,border:"1px solid "+C.accent,fontSize:13,fontFamily:"inherit",background:travada?C.borderLight:C.surface}}/>
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:3,marginBottom:8}}>
      <span style={{fontSize:10,color:"#92400E",fontWeight:600,letterSpacing:".05em"}}>CATEGORIA</span>
      <select value={eCategoria} onChange={e=>setECategoria(e.target.value)}
        style={{padding:"6px 8px",borderRadius:6,border:"1px solid "+(eCategoria?C.accent:C.red),fontSize:13,fontFamily:"inherit",background:C.surface}}>
        <option value="">Escolha uma categoria...</option>
        {["DCP","DESPESA FIXA","EXTRAORDINARIA","IMPOSTO"].map(c=><option key={c} value={c}>{CAT_LABEL[c]||c}</option>)}
      </select>
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:3,marginBottom:8}}>
      <span style={{fontSize:10,color:"#92400E",fontWeight:600,letterSpacing:".05em"}}>TERMOS ALTERNATIVOS (como o banco pode chamar esse gasto)</span>
      <input value={eAlias} onChange={e=>setEAlias(e.target.value)}
        placeholder="ex: CANAIS STREAMING; AMAZON VAREJO"
        style={{padding:"6px 8px",borderRadius:6,border:"1px solid "+C.accent,fontSize:12,fontFamily:"inherit",background:C.surface}}/>
      <span style={{fontSize:9,color:"#92400E"}}>Separe vários com ";". Ajuda a conciliação a reconhecer o mesmo gasto com nome diferente no CSV.</span>
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:3,marginBottom:8}}>
      <span style={{fontSize:10,color:"#92400E",fontWeight:600,letterSpacing:".05em"}}>NOME DE EXIBIÇÃO (opcional)</span>
      <input value={eApelido} onChange={e=>setEApelido(e.target.value.toUpperCase())}
        placeholder={r[1]}
        style={{padding:"6px 8px",borderRadius:6,border:"1px solid "+C.accent,fontSize:12,fontFamily:"inherit",background:C.surface}}/>
      {data&&(()=>{const cands=apelidosCandidatos(r[1],data);
        return cands.length>1&&<div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:2}}>
          <span style={{fontSize:9,color:"#92400E",width:"100%"}}>Esse texto bate com mais de uma regra salva — escolhe qual vale aqui:</span>
          {cands.map((c,ci)=><button key={ci} type="button" onClick={()=>setEApelido(c.apelido)}
            style={{fontSize:10,padding:"3px 8px",borderRadius:12,border:"1px solid "+C.accent,background:eApelido===c.apelido?C.accent:"transparent",color:eApelido===c.apelido?"#fff":C.accent,cursor:"pointer",fontFamily:"inherit"}}>
            {c.apelido}
          </button>)}
        </div>;
      })()}
    </div>
    {data&&onUpdate&&<SeletorEnvelopeItem aba={abaCartao} row={_linhaCartao(r)} obsAtual={_obsCartaoRaw(r)} data={data} onUpdate={onUpdate}/>}
    <div style={{display:"flex",gap:8}}>
      <button onClick={onSalvar} disabled={eLoad||!eDesc.trim()||!eValor||!eCategoria}
        style={{flex:1,background:C.accent,color:"#fff",borderRadius:6,padding:"7px",fontSize:12,fontWeight:700,border:"none",cursor:"pointer"}}>
        {eLoad?"…":"Salvar"}
      </button>
      <button onClick={onCancelar} disabled={eLoad}
        style={{background:C.borderLight,color:C.textSub,borderRadius:6,padding:"7px 12px",fontSize:12,border:"none",cursor:"pointer"}}>
        Cancelar
      </button>
    </div>
    <button onClick={onApagar} disabled={eLoad||travada}
      style={{width:"100%",marginTop:8,padding:"6px",borderRadius:6,background:"transparent",color:C.red,fontSize:11,border:"1px dashed #FECACA",cursor:"pointer",fontFamily:"inherit"}}>
      🗑 Apagar este item
    </button>
    {onApagarTodos&&<button onClick={onApagarTodos} disabled={eLoad||travada}
      style={{width:"100%",marginTop:6,padding:"6px",borderRadius:6,background:"transparent",color:C.red,fontSize:10,border:"1px dashed #FECACA",cursor:"pointer",fontFamily:"inherit"}}>
      🗑 Apagar TODOS os "{eDesc}" pendentes neste cartão
    </button>}
    {data&&(data.recorr||[]).some(rec=>String(rec[0]).toUpperCase()===String(r[1]).toUpperCase()&&String(rec[6]).toUpperCase()==="S")&&
      <button onClick={()=>onIrPara&&onIrPara({tab:"recorr"})}
        style={{width:"100%",marginTop:6,padding:"6px",borderRadius:6,background:"transparent",color:C.blue,fontSize:10,border:"1px dashed "+C.blue,cursor:"pointer",fontFamily:"inherit"}}>
        🔁 Gerenciar/apagar esta recorrência
      </button>}
  </div>;
}

// ── APP ───────────────────────────────────────────────────────────────────────
function Tesouraria(){
  const [data,setData]=useState(null);const [load,setLoad]=useState(true);const [err,setErr]=useState(null);
  const [tab,setTab]=useState("dashboard");const [chatInit,setChatInit]=useState(null);
  const [destaque,setDestaque]=useState(null); // {tab,row,cartao} -- pra onde "ir pro lancamento" na aba DCP aponta

  // Navegacao com historico do navegador: TODA troca de aba passa por aqui
  // (nunca chamar setTab(...) direto em outro lugar) -- assim o botao
  // voltar do Android/navegador navega dentro do app em vez de sair dele.
  function navegar(novaTab,opts){
    opts=opts||{};
    setTab(novaTab);
    if(!opts.semHistorico && novaTab!==tab){
      try{ history.pushState({tesourariaTab:novaTab},"","#"+novaTab); }catch(e){}
    }
  }
  useEffect(()=>{
    // primeira entrada no historico, pra "voltar" da aba inicial ainda
    // ficar dentro do app (sair exige apertar voltar de novo, comportamento
    // normal de qualquer app com uma tela raiz).
    try{ history.replaceState({tesourariaTab:"dashboard"},"","#dashboard"); }catch(e){}
    function aoVoltar(e){
      const t=(e.state&&e.state.tesourariaTab)||"dashboard";
      setTab(t); // so sincroniza o estado, nao empurra historico de novo
    }
    window.addEventListener("popstate",aoVoltar);
    return ()=>window.removeEventListener("popstate",aoVoltar);
  },[]);

  function irPara(destino){ setDestaque(destino); navegar(destino.tab); }
  useEffect(()=>{
    if(!destaque) return;
    const t=setTimeout(()=>setDestaque(null),3000); // pisca e depois esquece sozinho
    return ()=>clearTimeout(t);
  },[destaque]);
  const [msgs,setMsgs]=useState(()=>{try{const s=localStorage.getItem("t_chat");return s?JSON.parse(s):[];}catch{return [];}});
  useEffect(()=>{try{localStorage.setItem("t_chat",JSON.stringify(msgs));}catch{}},[msgs]);
  useEffect(()=>{carregar();},[]);

  async function carregar(){setLoad(true);setErr(null);
    try{
      const d=await api({action:"sincronizarFaturas"});
      if(d.sheets) console.log("Abas da planilha:",d.sheets);
      setData(d);
    }catch(e){setErr(e.message);}setLoad(false);}

  function goChat(txt){setChatInit(txt);navegar("conversar");}

  const TABS=[{id:"dashboard",l:"Dashboard"},{id:"fluxo",l:"Previsão"},{id:"historico",l:"Histórico"},{id:"timeline",l:"🧪 Timeline"},{id:"ferramentas",l:"Ferramentas"}];
  const TAB_CORES={
    dashboard:{cor:C.blue,bg:C.blueLight},
    fluxo:{cor:C.accent,bg:C.accentLight},
    historico:{cor:C.green,bg:C.greenLight},
    timeline:{cor:C.teal,bg:C.tealLight},
    ferramentas:{cor:C.purple,bg:C.purpleLight},
  };

  return <div style={{minHeight:"100dvh",background:C.bg,fontFamily:"'Inter','Segoe UI',sans-serif",color:C.text}}>
    <div style={{maxWidth:480,margin:"0 auto",padding:"20px 16px 40px"}}>
      {/* Header leve — sem barra escura */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18}}>
        <div>
          <div style={{fontSize:32,fontWeight:900,color:C.accent,letterSpacing:"-.03em",fontStyle:"italic"}}>Tesouraria</div>
          <div style={{fontSize:12,color:C.textMuted,fontWeight:600,marginTop:2}}>Suas contas, previsíveis.</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:9,color:C.textMuted,marginBottom:2}}>
            HTML v3.20260721.1310 · Script {(data&&data.scriptVersion)||"—"}
          </div>
          <div style={{display:"flex",gap:5,justifyContent:"flex-end"}}>
            <button onClick={carregar} disabled={load} style={{fontSize:9,color:"#fff",background:C.blue,border:"none",borderRadius:5,padding:"4px 10px",cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>
              {load?"…":"↻ Atualizar"}
            </button>
            <button onClick={async()=>{await api({action:"reloadCode"});alert("Script recarregado!");}} style={{fontSize:9,color:C.textMuted,background:"none",border:"1px solid "+C.border,borderRadius:5,padding:"3px 7px",cursor:"pointer",fontFamily:"inherit"}}>
              ⟳ Script
            </button>
          </div>
        </div>
      </div>

      {/* Tabs pill-style no topo -- cada aba com cor pastel propria, no
          mesmo espirito leve da grade de Ferramentas (nada de preenchimento
          solido saturado -- fundo clarinho + texto na cor, igual os cards). */}
      <div style={{display:"flex",gap:4,marginBottom:20,background:C.surface,
        border:"1px solid "+C.border,borderRadius:10,padding:4}}>
        {TABS.map(t=>{const cor=TAB_CORES[t.id]||C.accent;const ativo=tab===t.id;return <button key={t.id} onClick={()=>navegar(t.id)} style={{
          flex:1,padding:"8px 4px",borderRadius:7,border:"none",cursor:"pointer",
          fontFamily:"inherit",fontSize:11,fontWeight:700,transition:"all .2s",whiteSpace:"nowrap",
          background:ativo?cor.bg:"transparent",
          color:ativo?cor.cor:C.textSub}}>
          {t.l}
        </button>;})}
      </div>

      {/* Conteúdo */}
      {load&&<div style={{textAlign:"center",padding:"40px 0",color:C.textMuted,display:"flex",flexDirection:"column",gap:10,alignItems:"center"}}>
        <div style={{width:26,height:26,border:"3px solid "+C.border,borderTopColor:C.accent,borderRadius:"50%",animation:"spin .8s linear infinite"}}/>
        <span style={{fontSize:13}}>Atualizando...</span>
      </div>}
      {err&&<div style={{background:C.redLight,borderRadius:10,padding:"12px 16px",color:C.red,fontSize:13,marginBottom:12}}>
        {err}<button onClick={carregar} style={{display:"block",marginTop:8,color:C.accent,fontSize:12,background:"none",border:"none",cursor:"pointer",padding:0}}>Tentar novamente</button>
      </div>}
      {!load&&!err&&data&&(
        tab==="dashboard"   ? <Dashboard data={data}/> :
        tab==="fluxo"       ? <Fluxo data={data} onUpdate={setData} destaque={destaque} onIrPara={irPara}/> :
        tab==="historico"   ? <Historico data={data} onUpdate={setData} destaque={destaque} onIrPara={irPara}/> :
        tab==="timeline"    ? <Timeline data={data}/> :
        tab==="ferramentas" ? <Ferramentas onIrPara={t=>{navegar(t);}}/> :
        tab==="recorr"      ? <Recorrencias data={data} onUpdate={setData}/> :
        tab==="cartoes"     ? <Cartoes data={data} onUpdate={setData} destaque={destaque} onIrPara={irPara}/> :
        tab==="dcp"         ? <DCPTab data={data} onUpdate={setData} onIrPara={irPara}/> :
        tab==="conversar"   ? <Card style={{padding:"16px 18px"}}><Conversar data={data} onUpdate={setData} initTxt={chatInit} onInitDone={()=>setChatInit(null)} msgs={msgs} setMsgs={setMsgs}/></Card> :
        tab==="emprestimos" ? <EmprestimosPassivos data={data} onUpdate={setData}/> :
        tab==="parcelas"    ? <ComprasParceladas data={data}/> :
        tab==="receitas"    ? <FontesReceita data={data} onUpdate={setData}/> :
        tab==="envelopes"   ? <EnvelopesCustom data={data} onUpdate={setData}/> :
        tab==="conciliacao" ? <ConciliacaoHub data={data} onUpdate={setData} onIrPara={irPara}/> :
        tab==="perfil"      ? <PerfilApelidos data={data} onUpdate={setData}/> :
        tab==="config"      ? <ConfiguracoesGerais data={data} onUpdate={setData} onIrPara={irPara}/> :
        tab==="cofres"      ? <Cofres data={data} onUpdate={setData}/> : null
      )}
    </div>
  </div>;
}
</script>
<script>
(function(){
  var root=document.getElementById("root");
  function st(msg){root.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100dvh;flex-direction:column;gap:12px;color:#9CA3AF;font-size:13px"><div style="width:26px;height:26px;border:3px solid #E5E7EB;border-top-color:#D97706;border-radius:50%;animation:spin .8s linear infinite"></div>'+msg+'</div>';}
  function ld(src){return new Promise((res,rej)=>{var s=document.createElement("script");s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);});}
  async function boot(){
    try{
      st("Carregando React...");
      await ld("https://unpkg.com/react@18.2.0/umd/react.production.min.js");
      await ld("https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js");
      st("Compilando...");
      await ld("https://unpkg.com/@babel/standalone@7.23.5/babel.min.js");
      var src=document.getElementById("app-source").textContent;
      var code=Babel.transform(src,{presets:["react"]}).code;
      var {useState,useEffect,useMemo,useRef}=React;
      var fn=new Function("React","ReactDOM","useState","useEffect","useMemo","useRef",code+"\nreturn Tesouraria;");
      var App=fn(React,ReactDOM,useState,useEffect,useMemo,useRef);
      class EB extends React.Component{
        constructor(p){super(p);this.state={err:null};}
        static getDerivedStateFromError(e){return{err:e};}
        render(){return this.state.err?React.createElement("div",{style:{padding:20,color:"red",fontSize:13}},"Erro: "+this.state.err.message):this.props.children;}
      }
      root.innerHTML="";
      ReactDOM.createRoot(root).render(React.createElement(EB,null,React.createElement(App)));
      // HTML v3.20260721.1310
    }catch(e){root.innerHTML="<div style='padding:20px;color:red;font-size:13px'>Erro: "+e.message+"</div>";}
  }
  boot();
})();
</script>
</body>
